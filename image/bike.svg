<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200" width="220" height="200">
  <!-- Soft mint backdrop circle -->
  <circle cx="110" cy="100" r="92" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="60%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </radialGradient>
  </defs>
  <!-- Rear wheel -->
  <g>
    <circle cx="58" cy="142" r="34" fill="none" stroke="#0F172A" stroke-width="5"/>
    <circle cx="58" cy="142" r="5" fill="#0F172A"/>
    <g stroke="#94A3B8" stroke-width="1.5">
      <line x1="58" y1="142" x2="58" y2="108"/>
      <line x1="58" y1="142" x2="92" y2="142"/>
      <line x1="58" y1="142" x2="24" y2="142"/>
      <line x1="58" y1="142" x2="34" y2="162"/>
      <line x1="58" y1="142" x2="82" y2="162"/>
      <line x1="58" y1="142" x2="34" y2="122"/>
      <line x1="58" y1="142" x2="82" y2="122"/>
    </g>
  </g>
  <!-- Front wheel -->
  <g>
    <circle cx="162" cy="142" r="34" fill="none" stroke="#0F172A" stroke-width="5"/>
    <circle cx="162" cy="142" r="5" fill="#0F172A"/>
    <g stroke="#94A3B8" stroke-width="1.5">
      <line x1="162" y1="142" x2="162" y2="108"/>
      <line x1="162" y1="142" x2="196" y2="142"/>
      <line x1="162" y1="142" x2="128" y2="142"/>
      <line x1="162" y1="142" x2="138" y2="162"/>
      <line x1="162" y1="142" x2="186" y2="162"/>
      <line x1="162" y1="142" x2="138" y2="122"/>
      <line x1="162" y1="142" x2="186" y2="122"/>
    </g>
  </g>
  <!-- Frame (green) -->
  <g stroke="#16A34A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Top tube -->
    <line x1="78" y1="92" x2="138" y2="92"/>
    <!-- Down tube -->
    <line x1="78" y1="92" x2="58" y2="142"/>
    <!-- Seat tube -->
    <line x1="138" y1="92" x2="115" y2="142"/>
    <!-- Chain stay -->
    <line x1="115" y1="142" x2="58" y2="142"/>
    <!-- Seat stay -->
    <line x1="138" y1="92" x2="58" y2="142"/>
    <!-- Front fork to handlebar -->
    <line x1="138" y1="92" x2="162" y2="142"/>
    <line x1="138" y1="92" x2="148" y2="72"/>
  </g>
  <!-- Saddle -->
  <rect x="124" y="78" width="32" height="6" rx="3" fill="#0F172A"/>
  <!-- Handlebar -->
  <g stroke="#0F172A" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="138" y1="72" x2="160" y2="72"/>
    <line x1="148" y1="72" x2="148" y2="92"/>
  </g>
  <!-- Pedal crank -->
  <g stroke="#0F172A" stroke-width="3" stroke-linecap="round">
    <line x1="115" y1="142" x2="100" y2="158"/>
    <line x1="115" y1="142" x2="130" y2="126"/>
  </g>
  <circle cx="115" cy="142" r="6" fill="#FFFFFF" stroke="#0F172A" stroke-width="3"/>
</svg>
