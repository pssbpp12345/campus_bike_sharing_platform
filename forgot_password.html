<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Bike Sharing — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/api-config.js"></script>
  <link rel="stylesheet" href="Login.css" />
  <style>
    .fp-steps {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
    }
    .fp-step-dot {
      width: 26px; height: 4px;
      border-radius: 999px;
      background: var(--line);
      transition: background 0.25s ease;
    }
    .fp-step-dot.is-active { background: linear-gradient(90deg, var(--blue), var(--green)); }
    .fp-step-dot.is-done   { background: var(--green); }

    .fp-otp-input {
      letter-spacing: 0.5em;
      font-size: 22px;
      text-align: center;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .fp-resend-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 4px 0 18px;
      font-size: 13px;
      color: var(--muted);
    }
    .fp-resend-btn {
      background: none;
      border: 0;
      color: var(--blue);
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      font-size: 13px;
    }
    .fp-resend-btn:disabled { color: var(--muted); cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="cbs-scroll-progress" id="cbs-scroll-progress"></div>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;
    const API_BASE = window.API_BASE_URL || "/api";
    const RESEND_COOLDOWN = 60;     // seconds — kept in sync with the backend default
    const MAX_ATTEMPTS    = 3;       // matches OTP_MAX_ATTEMPTS_WINDOW

    function ForgotPasswordPage() {
      // step: 1 = email, 2 = OTP, 3 = new password, 4 = done
      const [step, setStep] = useState(1);

      const [email, setEmail]     = useState("");
      const [otp, setOtp]         = useState("");
      const [pw1, setPw1]         = useState("");
      const [pw2, setPw2]         = useState("");
      const [showPw, setShowPw]   = useState(false);

      const [error, setError]     = useState("");
      const [info, setInfo]       = useState("");
      const [loading, setLoading] = useState(false);

      const [cooldown, setCooldown] = useState(0);     // seconds remaining before resend allowed
      const [attemptsLeft, setAttemptsLeft] = useState(MAX_ATTEMPTS);
      const tickRef = useRef(null);

      // Tick the cooldown down every second
      useEffect(() => {
        if (cooldown <= 0) return;
        tickRef.current = setInterval(() => setCooldown(c => Math.max(0, c - 1)), 1000);
        return () => clearInterval(tickRef.current);
      }, [cooldown]);

      const requestOtp = async (isResend = false) => {
        setError(""); setInfo("");
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError("Please enter a valid email address."); return; }
        setLoading(true);
        try {
          const res = await fetch(`${API_BASE}/auth/forgot-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            setError(data.error || `Couldn't send the OTP (server returned ${res.status}). Make sure the backend is restarted after the latest update.`);
            if (typeof data.cooldownSeconds === "number") setCooldown(data.cooldownSeconds);
            return;
          }
          setCooldown(typeof data.cooldownSeconds === "number" ? data.cooldownSeconds : RESEND_COOLDOWN);
          if (typeof data.attemptsLeft === "number") setAttemptsLeft(data.attemptsLeft);
          setInfo(data.message || "OTP sent. Check your inbox.");
          if (!isResend) setStep(2);
        } catch (e) {
          setError("Cannot reach the server. Make sure the backend is running.");
        } finally {
          setLoading(false);
        }
      };

      const verifyOtp = async () => {
        setError(""); setInfo("");
        if (!/^\d{6}$/.test(otp.trim())) { setError("Please enter the 6-digit OTP from your email."); return; }
        setLoading(true);
        try {
          const res = await fetch(`${API_BASE}/auth/verify-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, otp: otp.trim() }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) { setError(data.error || "Incorrect OTP."); return; }
          setStep(3);
        } catch (e) {
          setError("Cannot reach the server. Make sure the backend is running.");
        } finally {
          setLoading(false);
        }
      };

      const resetPassword = async () => {
        setError(""); setInfo("");
        if (pw1.length < 8) { setError("Password must be at least 8 characters long."); return; }
        if (pw1 !== pw2)    { setError("Passwords do not match."); return; }
        setLoading(true);
        try {
          const res = await fetch(`${API_BASE}/auth/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, otp: otp.trim(), newPassword: pw1 }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) { setError(data.error || "Couldn't reset the password."); return; }
          setStep(4);
          setTimeout(() => { window.location.href = "login.html?reset=1"; }, 1200);
        } catch (e) {
          setError("Cannot reach the server. Make sure the backend is running.");
        } finally {
          setLoading(false);
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (step === 1) requestOtp(false);
        else if (step === 2) verifyOtp();
        else if (step === 3) resetPassword();
      };

      const stepDot = (i) => (
        <span key={i} className={"fp-step-dot " + (step > i ? "is-done" : (step === i ? "is-active" : ""))}/>
      );

      return (
        <div className="cbs-app">
          <nav className="cbs-nav">
            <a href="index.html" className="cbs-logo" aria-label="Campus Bike Sharing — Home">
              <svg className="cbs-logo-icon" viewBox="0 0 48 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="12" cy="22" r="8" fill="none" stroke="#2D7FF9" strokeWidth="2.5" />
                <circle cx="36" cy="22" r="8" fill="none" stroke="#22C55E" strokeWidth="2.5" />
                <path d="M12 22 L22 8 L30 22 L36 22" fill="none" stroke="#2D7FF9" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                <path d="M22 8 L28 8" stroke="#22C55E" strokeWidth="2.5" strokeLinecap="round" />
              </svg>
              <span className="cbs-logo-text">Campus <span className="cbs-logo-accent">Bike Sharing</span></span>
            </a>
            <ul className="cbs-nav-links">
              <li><a href="index.html">Home</a></li>
              <li><a href="how-it-works.html">How It Works</a></li>
              <li><a href="about.html">About Us</a></li>
              <li><a href="contact.html">Contact</a></li>
            </ul>
            <a href="login.html" className="cbs-nav-cta">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
              Login
            </a>
            <button className="cbs-mobile-toggle" aria-label="Open menu"><span/><span/><span/></button>
          </nav>

          <main className="cbs-main">
            <section className="cbs-left">
              <div className="cbs-left-inner">
                <p className="cbs-eyebrow">CAMPUS BIKE SHARING PLATFORM</p>
                <h1 className="cbs-headline">Forgot your password?</h1>
                <p className="cbs-subheadline">No worries. We'll email you a 6-digit code so you can set a new one in under a minute.</p>
                <div className="cbs-accent-bar"/>
                <ul className="cbs-feature-list">
                  <li>
                    <span className="cbs-feat-icon cbs-feat-icon--blue">
                      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </span>
                    <div><strong>Step 1</strong><span>Enter your university email</span></div>
                  </li>
                  <li>
                    <span className="cbs-feat-icon cbs-feat-icon--green">
                      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </span>
                    <div><strong>Step 2</strong><span>Enter the 6-digit OTP (5-min validity)</span></div>
                  </li>
                  <li>
                    <span className="cbs-feat-icon cbs-feat-icon--blue">
                      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    </span>
                    <div><strong>Step 3</strong><span>Choose a new password</span></div>
                  </li>
                </ul>
              </div>
            </section>

            <section className="cbs-right">
              <div className="cbs-card">
                <div className="cbs-card-icon">
                  <svg viewBox="0 0 48 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <circle cx="14" cy="22" r="7" fill="none" stroke="#2D7FF9" strokeWidth="2.5"/>
                    <circle cx="34" cy="22" r="7" fill="none" stroke="#22C55E" strokeWidth="2.5"/>
                    <path d="M14 22 L22 10 L28 22 L34 22" fill="none" stroke="#22C55E" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </div>

                <div className="fp-steps" aria-hidden="true">{[1,2,3].map(stepDot)}</div>

                <h2 className="cbs-card-title">
                  {step === 1 && "Reset your password"}
                  {step === 2 && "Enter the OTP"}
                  {step === 3 && "Choose a new password"}
                  {step === 4 && "Password updated!"}
                </h2>
                <p className="cbs-card-subtitle">
                  {step === 1 && "We'll send a one-time code to your email."}
                  {step === 2 && `Code sent to ${email}. It expires in 5 minutes.`}
                  {step === 3 && "OTP verified. Set a new password."}
                  {step === 4 && "Redirecting you to login…"}
                </p>

                {error && (
                  <div className="cbs-error" role="alert">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <span>{error}</span>
                  </div>
                )}
                {info && !error && (
                  <div className="cbs-success" role="status">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    <span>{info}</span>
                  </div>
                )}

                {step !== 4 && (
                  <form onSubmit={handleSubmit} noValidate>
                    {step === 1 && (
                      <div className="cbs-field">
                        <label htmlFor="email">University Email</label>
                        <div className="cbs-input-wrap">
                          <svg className="cbs-input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                          <input id="email" type="email" placeholder="you@university.edu" value={email} onChange={(e)=>setEmail(e.target.value)} autoComplete="email" autoFocus/>
                        </div>
                      </div>
                    )}

                    {step === 2 && (
                      <>
                        <div className="cbs-field">
                          <label htmlFor="otp">6-digit code</label>
                          <div className="cbs-input-wrap">
                            <svg className="cbs-input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input id="otp" type="text" inputMode="numeric" pattern="\d{6}" maxLength={6} className="fp-otp-input" placeholder="••••••" value={otp} onChange={(e)=>setOtp(e.target.value.replace(/\D/g,"").slice(0,6))} autoComplete="one-time-code" autoFocus/>
                          </div>
                        </div>
                        <div className="fp-resend-row">
                          <span>{cooldown > 0 ? `Resend available in ${cooldown}s` : "Didn't get the code?"}</span>
                          <button type="button" className="fp-resend-btn" onClick={() => requestOtp(true)} disabled={cooldown > 0 || attemptsLeft <= 0 || loading}>
                            {attemptsLeft <= 0 ? "Resend limit reached" : "Resend OTP"}
                          </button>
                        </div>
                      </>
                    )}

                    {step === 3 && (
                      <>
                        <div className="cbs-field">
                          <label htmlFor="pw1">New password</label>
                          <div className="cbs-input-wrap">
                            <svg className="cbs-input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input id="pw1" type={showPw ? "text" : "password"} placeholder="At least 8 characters" value={pw1} onChange={(e)=>setPw1(e.target.value)} autoComplete="new-password" autoFocus/>
                            <button type="button" className="cbs-eye-btn" onClick={() => setShowPw(s => !s)} aria-label={showPw ? "Hide password" : "Show password"}>
                              {showPw ? (
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                              ) : (
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                              )}
                            </button>
                          </div>
                        </div>
                        <div className="cbs-field">
                          <label htmlFor="pw2">Confirm new password</label>
                          <div className="cbs-input-wrap">
                            <svg className="cbs-input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input id="pw2" type={showPw ? "text" : "password"} placeholder="Re-enter password" value={pw2} onChange={(e)=>setPw2(e.target.value)} autoComplete="new-password"/>
                          </div>
                        </div>
                      </>
                    )}

                    <button type="submit" className="cbs-btn cbs-btn-primary" disabled={loading}>
                      {loading ? <span className="cbs-spinner"/> : (
                        <>
                          <span>
                            {step === 1 && "Send OTP"}
                            {step === 2 && "Verify OTP"}
                            {step === 3 && "Reset password"}
                          </span>
                          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                        </>
                      )}
                    </button>

                    <p className="cbs-switch-link" style={{marginTop: 18}}>
                      Remembered it? <a href="login.html">Back to login</a>
                    </p>
                  </form>
                )}

                {step === 4 && (
                  <div style={{textAlign:"center",padding:"8px 0 16px"}}>
                    <div style={{width:64,height:64,borderRadius:"50%",margin:"6px auto 14px",background:"linear-gradient(135deg,var(--green),#16A34A)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",boxShadow:"0 12px 28px rgba(34,197,94,0.30)"}}>
                      <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <p style={{color:"var(--ink-soft)",fontSize:15,margin:"0 0 16px"}}>You can now sign in with your new password.</p>
                    <a href="login.html" className="cbs-btn cbs-btn-secondary" style={{display:"inline-flex",width:"auto",padding:"12px 22px"}}>
                      <span>Go to login</span>
                    </a>
                  </div>
                )}
              </div>
            </section>
          </main>

          <footer className="cbs-footer">
            <span>© 2026 Campus Bike Sharing Platform. All rights reserved.</span>
            <div className="cbs-footer-links">
              <a href="Privacy_policy.html">Privacy Policy</a>
              <span className="cbs-footer-sep">|</span>
              <a href="Terms_of_use.html">Terms of Use</a>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ForgotPasswordPage />);
  </script>

  <button class="cbs-home-totop" id="cbs-home-totop" aria-label="Back to top">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
  </button>
  <script>
    (function () {
      var bar = document.getElementById("cbs-scroll-progress");
      var totop = document.getElementById("cbs-home-totop");
      function onScroll() {
        var h = document.documentElement.scrollHeight - window.innerHeight;
        var sc = window.scrollY || window.pageYOffset;
        var pct = h > 0 ? (sc / h) * 100 : 0;
        if (bar) bar.style.width = pct + "%";
        var nav = document.querySelector(".cbs-nav");
        if (nav) nav.classList.toggle("scrolled", sc > 8);
        if (totop) totop.classList.toggle("is-visible", sc > 600);
      }
      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();
      if (totop) totop.addEventListener("click", function () { window.scrollTo({ top: 0, behavior: "smooth" }); });

      // Mobile menu toggle (delegation)
      document.addEventListener("click", function (e) {
        var t = e.target.closest && e.target.closest(".cbs-mobile-toggle");
        var nav = document.querySelector(".cbs-nav");
        var btn = document.querySelector(".cbs-mobile-toggle");
        if (t) {
          e.stopPropagation();
          if (nav) {
            var open = nav.classList.toggle("is-open");
            t.classList.toggle("is-open", open);
          }
        } else if (e.target.closest && e.target.closest(".cbs-nav-links a")) {
          if (nav) nav.classList.remove("is-open");
          if (btn) btn.classList.remove("is-open");
        } else if (nav && nav.classList.contains("is-open") && !nav.contains(e.target)) {
          nav.classList.remove("is-open");
          if (btn) btn.classList.remove("is-open");
        }
      });
    })();
  </script>
</body>
</html>
