<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ride History | Campus Bike Sharing</title>
  <link rel="stylesheet" href="../../Login.css">
  <link rel="stylesheet" href="student-shared.css">
  <link rel="stylesheet" href="ride-history.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="env,react" src="student-shared.js"></script>
  <script type="text/babel" data-presets="env,react">
    const { useEffect, useMemo, useState } = React;
    const Icon = window.StudentIcons;
    const PRICE_FMT = new Intl.NumberFormat("en-AU", { style: "currency", currency: "AUD" });
    const fmtDate = (s) => s ? new Date(s).toLocaleDateString("en-AU", { day:"numeric", month:"short", year:"numeric" }) : "—";
    const fmtTime = (s) => s ? new Date(s).toLocaleTimeString("en-AU", { hour:"2-digit", minute:"2-digit" }) : "—";

    const TABS = [
      { v: "all",       label: "All",       icon: <Icon.bike s={16}/> },
      { v: "upcoming",  label: "Upcoming",  icon: <Icon.calendar/> },
      { v: "active",    label: "Active",    icon: <Icon.bike s={16}/> },
      { v: "completed", label: "Completed", icon: <Icon.check/> },
      { v: "cancelled", label: "Cancelled", icon: <Icon.alert/> },
    ];

    function StatCard({ tone, icon, label, value, sub }) {
      return (
        <div className={`rh-stat-card tone-${tone}`} data-testid={`stat-${label.toLowerCase().replace(/\s+/g, "-")}`}>
          <div className="rh-stat-strip"/>
          <div className="rh-stat-row">
            <span className="rh-stat-label">{label}</span>
            <span className="rh-stat-icon">{icon}</span>
          </div>
          <div className="rh-stat-value">{value}</div>
          {sub && <div className="rh-stat-sub">{sub}</div>}
        </div>
      );
    }

    function Badge({ status }) {
      const labels = { completed: "Completed", active: "Live", upcoming: "Upcoming", cancelled: "Cancelled", expired: "Expired" };
      return <span className={`rh-badge ${status}${status === "active" ? " live" : ""}`}>{labels[status] || status}</span>;
    }
    function PayChip({ status }) {
      if (!status) return null;
      return <span className={`rh-pay ${status}`}>{status}</span>;
    }

    function RideActions({ ride, onView, onReceipt, onCancel, onEndRide }) {
      return (
        <div className="rh-actions">
          <button className="rh-action-btn" onClick={() => onView(ride)} data-testid={`view-${ride.ride_id}`}>View</button>
          {ride.status === "completed" && (
            <button className="rh-action-btn primary" onClick={() => onReceipt(ride)} data-testid={`receipt-${ride.ride_id}`}>
              <Icon.card/> Receipt
            </button>
          )}
          {ride.status === "upcoming" && (
            <button className="rh-action-btn danger" onClick={() => onCancel(ride)} data-testid={`cancel-${ride.ride_id}`}>Cancel</button>
          )}
          {ride.status === "active" && (
            <button className="rh-action-btn live" onClick={() => onEndRide(ride)} data-testid={`end-${ride.ride_id}`}>End Ride</button>
          )}
        </div>
      );
    }

    /* ============ MODALS ============ */
    function RideDetailModal({ ride, onClose }) {
      if (!ride) return null;
      const rows = [
        ["Ride ID",       "#" + ride.ride_id],
        ["Bike",          `${ride.bike_code} (${ride.bike_type})`],
        ["Start station", ride.start_station],
        ["End station",   ride.end_station || "—"],
        ["Date",          fmtDate(ride.start_time)],
        ["Start time",    fmtTime(ride.start_time)],
        ["End time",      ride.end_time ? fmtTime(ride.end_time) : "—"],
        ["Duration",      ride.duration_minutes ? `${ride.duration_minutes} min` : "—"],
        ["Distance",      ride.distance_km ? `${Number(ride.distance_km).toFixed(2)} km` : "—"],
        ["Cost",          PRICE_FMT.format(Number(ride.cost) || 0)],
        ["Payment",       ride.payment_status ? <PayChip status={ride.payment_status}/> : "—"],
      ];
      return (
        <div className="d-overlay" onClick={onClose}>
          <div className="d-modal" onClick={e => e.stopPropagation()} data-testid="ride-detail-modal">
            <div className="d-modal-head" style={{display:"flex", justifyContent:"space-between", alignItems:"center", gap:12}}>
              <div><h3>Ride #{ride.ride_id}</h3><p>{fmtDate(ride.start_time)} · {ride.start_station}</p></div>
              <Badge status={ride.status}/>
            </div>
            <div className="d-modal-body">
              <div className="d-summary">
                {rows.map(([k, v]) => (
                  <div className="d-summary-row" key={k}><span className="k">{k}</span><span className="v">{v}</span></div>
                ))}
              </div>
              {ride.notes && (
                <div style={{marginTop:14, padding:"12px 14px", background:"var(--d-bg-soft)", borderRadius:12, fontSize:13, color:"var(--d-muted)", whiteSpace:"pre-wrap"}}>
                  <strong style={{color:"var(--d-ink)"}}>Notes:</strong> {ride.notes}
                </div>
              )}
            </div>
            <div className="d-modal-foot">
              <button className="d-btn d-btn-secondary" onClick={onClose} data-testid="close-detail">Close</button>
            </div>
          </div>
        </div>
      );
    }

    function CancelModal({ ride, onClose, onConfirm }) {
      const [reason, setReason] = useState("");
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");
      if (!ride) return null;
      const submit = async () => {
        if (reason.trim().length < 12) { setErr("Please provide at least 12 characters."); return; }
        setBusy(true); setErr("");
        try { await onConfirm(ride, reason.trim()); } catch (e) { setErr(e.message || "Could not cancel."); } finally { setBusy(false); }
      };
      return (
        <div className="d-overlay" onClick={onClose}>
          <div className="d-modal" onClick={e => e.stopPropagation()}>
            <div className="d-modal-head"><h3>Cancel Booking #{ride.ride_id}?</h3><p>Tell us why so we can improve the platform.</p></div>
            <div className="d-modal-body">
              <textarea className="d-textarea" placeholder="Reason (12+ characters)…"
                value={reason} onChange={e => setReason(e.target.value)} data-testid="cancel-reason"/>
              {err && <div style={{color:"var(--d-red)", fontWeight:600, fontSize:13, marginTop:8}}>{err}</div>}
            </div>
            <div className="d-modal-foot">
              <button className="d-btn d-btn-secondary" onClick={onClose} disabled={busy}>Back</button>
              <button className="d-btn" style={{background:"var(--d-red)", color:"#fff"}} onClick={submit} disabled={busy} data-testid="confirm-cancel">
                {busy ? "Cancelling…" : "Confirm Cancellation"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function ReceiptModal({ receipt, onClose, pushToast }) {
      if (!receipt) return null;
      const r = receipt;
      const downloadHtml = () => {
        const html = document.querySelector(".rh-print-area").outerHTML;
        const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${r.receipt_number}</title>
<style>
  body{font-family:-apple-system,Inter,Segoe UI,Roboto,sans-serif;margin:0;padding:20px;background:#F8FAFC;color:#0F172A}
  .rh-receipt-modal{background:#fff;border-radius:22px;max-width:640px;margin:0 auto;overflow:hidden;box-shadow:0 12px 40px rgba(15,23,42,.12)}
  .rh-receipt-head{padding:20px 24px;background:#0F172A;color:#fff;display:flex;justify-content:space-between;align-items:center}
  .rh-receipt-head .brand{font-weight:800;font-size:18px}
  .rh-receipt-head .accent{color:#22C55E}
  .rh-receipt-head .label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#94A3B8}
  .rh-receipt-head .num{font-weight:800;font-size:14px}
  .rh-receipt-body{padding:22px 24px}
  .rh-receipt-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;margin-bottom:16px;font-size:13px}
  .rh-receipt-meta .lbl{color:#64748B;font-weight:600}
  .rh-receipt-meta .val{font-weight:700}
  .rh-receipt-section{border-top:1px dashed #E2E8F0;padding-top:14px;margin-top:14px}
  .rh-receipt-section h4{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#64748B;margin:0 0 8px}
  .rh-receipt-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px}
  .rh-receipt-row .k{color:#64748B}.rh-receipt-row .v{font-weight:700}
  .rh-receipt-total{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding:14px 16px;background:#DCFCE7;border-radius:14px}
  .rh-receipt-total .k{font-weight:800;color:#15803D;font-size:14px;letter-spacing:.5px;text-transform:uppercase}
  .rh-receipt-total .v{font-size:24px;font-weight:800;color:#15803D}
  .rh-receipt-foot{display:none}
</style></head><body>${html}</body></html>`;
        const blob = new Blob([doc], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `${r.receipt_number}.html`; a.click();
        URL.revokeObjectURL(url);
        pushToast && pushToast("Receipt downloaded", `${r.receipt_number}.html saved to Downloads`);
      };
      const printReceipt = () => window.print();
      return (
        <div className="d-overlay" onClick={onClose}>
          <div className="rh-receipt-modal rh-print-area" onClick={e => e.stopPropagation()} data-testid="receipt-modal">
            <div className="rh-receipt-head">
              <div className="brand">Campus <span className="accent">Bike Sharing</span></div>
              <div style={{textAlign:"right"}}>
                <div className="label">Receipt</div>
                <div className="num" data-testid="receipt-number">{r.receipt_number}</div>
              </div>
            </div>
            <div className="rh-receipt-body">
              <div className="rh-receipt-meta">
                <div><div className="lbl">Issued to</div><div className="val">{r.student_name}</div></div>
                <div><div className="lbl">Date issued</div><div className="val">{fmtDate(r.issued_at)}</div></div>
                <div><div className="lbl">Email</div><div className="val">{r.student_email}</div></div>
                <div><div className="lbl">Ride ID</div><div className="val">#{r.ride_id}</div></div>
              </div>
              <div className="rh-receipt-section">
                <h4>Trip details</h4>
                <div className="rh-receipt-row"><span className="k">Bike</span><span className="v">{r.bike_code} ({r.bike_type})</span></div>
                <div className="rh-receipt-row"><span className="k">Start station</span><span className="v">{r.start_station}</span></div>
                <div className="rh-receipt-row"><span className="k">End station</span><span className="v">{r.end_station || "—"}</span></div>
                <div className="rh-receipt-row"><span className="k">Start time</span><span className="v">{fmtDate(r.start_time)} · {fmtTime(r.start_time)}</span></div>
                <div className="rh-receipt-row"><span className="k">End time</span><span className="v">{r.end_time ? `${fmtDate(r.end_time)} · ${fmtTime(r.end_time)}` : "—"}</span></div>
                <div className="rh-receipt-row"><span className="k">Duration</span><span className="v">{r.duration_minutes} min</span></div>
                <div className="rh-receipt-row"><span className="k">Distance</span><span className="v">{Number(r.distance_km).toFixed(2)} km</span></div>
              </div>
              <div className="rh-receipt-section">
                <h4>Charges</h4>
                <div className="rh-receipt-row"><span className="k">Unlock fee</span><span className="v">{PRICE_FMT.format(r.unlock_fee)}</span></div>
                <div className="rh-receipt-row"><span className="k">Minute charge ({r.duration_minutes} × {PRICE_FMT.format(r.per_minute_fee)})</span><span className="v">{PRICE_FMT.format(r.minute_charge)}</span></div>
                <div className="rh-receipt-row"><span className="k">Payment method</span><span className="v" style={{textTransform:"capitalize"}}>{(r.payment_method || "credit card").replace("_", " ")}</span></div>
                <div className="rh-receipt-row"><span className="k">Payment status</span><span className="v"><PayChip status={r.payment_status}/></span></div>
                {r.transaction_reference && (
                  <div className="rh-receipt-row"><span className="k">Transaction ref.</span><span className="v" style={{fontFamily:"monospace", fontSize:12}}>{r.transaction_reference.slice(0, 28)}</span></div>
                )}
              </div>
              <div className="rh-receipt-total" data-testid="receipt-total">
                <span className="k">Total paid</span>
                <span className="v">{PRICE_FMT.format(r.total_paid)}</span>
              </div>
            </div>
            <div className="rh-receipt-foot">
              <span className="note">Thanks for choosing campus-friendly transport.</span>
              <div className="actions">
                <button className="d-btn d-btn-secondary" onClick={onClose} data-testid="receipt-close">Close</button>
                <button className="d-btn d-btn-secondary" onClick={printReceipt} data-testid="receipt-print">Print / Save as PDF</button>
                <button className="d-btn d-btn-primary" onClick={downloadHtml} data-testid="receipt-download">Download</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ============ MAIN PAGE ============ */
    function App() {
      const { user, requireAuth, logout, pushToast, toasts } = window.useStudentAuth();
      const [data, setData] = useState(null);
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(true);

      const [tab, setTab]       = useState("all");
      const [sort, setSort]     = useState("newest");
      const [q, setQ]           = useState("");
      const [from, setFrom]     = useState("");
      const [to, setTo]         = useState("");

      const [detail, setDetail]   = useState(null);
      const [cancelFor, setCancelFor] = useState(null);
      const [receipt, setReceipt] = useState(null);

      useEffect(() => { if (!requireAuth()) return; load(); }, []);
      useEffect(() => { load(); }, [sort, from, to, q]);

      const load = async () => {
        const token = localStorage.getItem("cbs_token");
        if (!token) return;
        setLoading(true); setError("");
        try {
          const params = new URLSearchParams({ tab: "all", sort });
          if (q) params.set("q", q);
          if (from) params.set("from", from);
          if (to) params.set("to", to);
          const r = await fetch("/api/student/rides?" + params.toString(), { headers: { Authorization: "Bearer " + token } });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error || "Failed to load rides");
          setData(d);
        } catch (e) { setError(e.message); setData({ rides: [], summary: null }); }
        finally { setLoading(false); }
      };

      const handleView = (ride) => setDetail(ride);
      const handleCancel = (ride) => setCancelFor(ride);
      const handleEndRide = async (ride) => {
        const token = localStorage.getItem("cbs_token");
        try {
          const r = await fetch("/api/rides/end", { method: "POST", headers: { "Content-Type": "application/json", Authorization: "Bearer " + token }, body: JSON.stringify({ bookingId: ride.ride_id }) });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error || "Could not end ride.");
          pushToast("Ride ended", `Duration: ${d.duration_minutes} min`); load();
        } catch (e) { pushToast("Could not end ride", e.message, "error"); }
      };
      const confirmCancel = async (ride, reason) => {
        const token = localStorage.getItem("cbs_token");
        const r = await fetch(`/api/student/rides/${ride.ride_id}/cancel`, { method: "POST", headers: { "Content-Type": "application/json", Authorization: "Bearer " + token }, body: JSON.stringify({ reason }) });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || "Could not cancel.");
        setCancelFor(null); pushToast("Booking cancelled", `Ride #${ride.ride_id} has been cancelled.`); load();
      };
      const handleReceipt = async (ride) => {
        const token = localStorage.getItem("cbs_token");
        try {
          const r = await fetch(`/api/student/rides/${ride.ride_id}/receipt`, { headers: { Authorization: "Bearer " + token } });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error || "Receipt unavailable.");
          setReceipt(d.receipt);
        } catch (e) { pushToast("Could not load receipt", e.message, "error"); }
      };

      const resetFilters = () => { setTab("all"); setSort("newest"); setQ(""); setFrom(""); setTo(""); };

      const rides    = data?.rides || [];
      const summary  = data?.summary || { total_completed:0, upcoming:0, active:0, cancelled:0, total_distance_km:0, total_spend:0, co2_saved_kg:0 };
      const counts   = useMemo(() => {
        const c = { all: rides.length, upcoming: 0, active: 0, completed: 0, cancelled: 0 };
        rides.forEach(r => { if (c[r.status] !== undefined) c[r.status]++; });
        return c;
      }, [rides]);
      const visible = useMemo(() => tab === "all" ? rides : rides.filter(r => r.status === tab), [rides, tab]);
      const activeRide = useMemo(() => rides.find(r => r.status === "active"), [rides]);

      return (
        <div className="d-shell">
          <window.StudentTopbar active="" user={user} onLogout={logout} pushToast={pushToast}/>
          <div className="d-main">
            <window.StudentSidebar active="rides"/>
            <main className="s-content">
              <header className="s-page-head">
                <div>
                  <h1>Ride History</h1>
                  <p>All your bookings, current rides and past trips in one place.</p>
                </div>
              </header>

              {/* Active ride banner */}
              {activeRide && (
                <div className="rh-active-banner" data-testid="active-banner">
                  <span className="ico"><Icon.bike s={26}/></span>
                  <div>
                    <h4>You're on a ride right now</h4>
                    <p>Bike {activeRide.bike_code} · started at {fmtTime(activeRide.start_time)} · {activeRide.start_station}</p>
                  </div>
                  <div className="actions">
                    <button className="rh-action-btn" onClick={() => setDetail(activeRide)}>Details</button>
                    <button className="rh-action-btn live" onClick={() => handleEndRide(activeRide)} data-testid="banner-end-ride">End Ride</button>
                  </div>
                </div>
              )}

              {/* Summary */}
              <section className="rh-summary-grid" data-testid="summary-grid">
                <StatCard tone="green"  icon={<Icon.check/>}      label="Completed Rides" value={summary.total_completed}/>
                <StatCard tone="amber"  icon={<Icon.calendar/>}   label="Upcoming"         value={summary.upcoming}/>
                <StatCard tone="blue"   icon={<Icon.bike s={18}/>} label="Active"          value={summary.active}/>
                <StatCard tone="violet" icon={<Icon.wallet s={18}/>} label="Total Spend"  value={PRICE_FMT.format(summary.total_spend)}/>
                <StatCard tone="leaf"   icon={<Icon.leaf s={18}/>} label="CO₂ Saved"       value={`${summary.co2_saved_kg} kg`} sub="vs. driving a car"/>
                <StatCard tone="blue"   icon={<Icon.route s={18}/>} label="Total Distance" value={`${summary.total_distance_km} km`}/>
              </section>

              {/* Tabs + filters + list */}
              <section className="d-card rh-tabs-card" data-testid="rides-card">
                <div className="rh-tabs" data-testid="rides-tabs">
                  {TABS.map(t => (
                    <button key={t.v} className={"rh-tab" + (tab === t.v ? " active" : "")}
                      onClick={() => setTab(t.v)} data-testid={`tab-${t.v}`}>
                      {t.icon}{t.label}
                      <span className="rh-tab-count">{counts[t.v] || 0}</span>
                    </button>
                  ))}
                </div>

                <div className="rh-toolbar">
                  <div className="d-search s-toolbar-search">
                    <Icon.search/>
                    <input placeholder="Search ride #, bike, station…" value={q} onChange={e => setQ(e.target.value)} data-testid="rh-search"/>
                  </div>
                  <select className="s-select" value={sort} onChange={e => setSort(e.target.value)} data-testid="rh-sort">
                    <option value="newest">Newest first</option>
                    <option value="oldest">Oldest first</option>
                  </select>
                  <input type="date" className="s-select" value={from} onChange={e => setFrom(e.target.value)} data-testid="rh-from"/>
                  <input type="date" className="s-select" value={to}   onChange={e => setTo(e.target.value)}   data-testid="rh-to"/>
                  <button className="rh-reset" onClick={resetFilters} data-testid="rh-reset">Reset filters</button>
                </div>

                {/* Loading */}
                {loading && (
                  <div className="s-skeleton-list" data-testid="rh-loading">
                    {Array.from({length:5}).map((_, i) => <div key={i} className="s-skeleton-row"/>)}
                  </div>
                )}

                {/* Error */}
                {!loading && error && (
                  <div className="s-empty" data-testid="rh-error">
                    <div className="s-empty-icon" style={{color:"var(--d-red)"}}><Icon.alert/></div>
                    <h3>Could not load rides</h3>
                    <p>{error}</p>
                    <button className="d-btn d-btn-primary" onClick={load}>Try again</button>
                  </div>
                )}

                {/* Empty */}
                {!loading && !error && visible.length === 0 && (
                  <div className="s-empty" data-testid="rh-empty">
                    <div className="s-empty-icon"><Icon.bike s={40}/></div>
                    <h3>{rides.length === 0 ? "No rides yet" : "Nothing here"}</h3>
                    <p>{rides.length === 0 ? "Book your first bike to start your green commute." : "No rides match this tab or your filters."}</p>
                    {rides.length === 0 && <a className="d-btn d-btn-primary" href="Student_dashboard.html">Book a bike</a>}
                  </div>
                )}

                {/* Table (desktop) */}
                {!loading && !error && visible.length > 0 && (
                  <>
                    <div className="rh-table-wrap" style={{overflowX:"auto"}} data-testid="rh-table">
                      <table className="rh-table">
                        <thead>
                          <tr>
                            <th>Ride</th><th>Bike</th><th>Route</th><th>Date / time</th>
                            <th>Duration</th><th>Distance</th><th>Cost</th><th>Payment</th><th>Status</th>
                            <th style={{textAlign:"right"}}>Actions</th>
                          </tr>
                        </thead>
                        <tbody>
                          {visible.map(r => (
                            <tr key={r.ride_id} data-testid={`row-${r.ride_id}`}>
                              <td><span className="rh-id"><span className="hash">#</span><strong>{r.ride_id}</strong></span></td>
                              <td><span className="rh-bike-pill"><Icon.bike s={12}/>{r.bike_code}</span></td>
                              <td>
                                <div className="rh-route">
                                  <span className="rh-from"><span className="dot"/>{r.start_station}</span>
                                  <span className="rh-arrow">→</span>
                                  <span className="rh-to"><span className="dot"/>{r.end_station || "—"}</span>
                                </div>
                              </td>
                              <td className="rh-meta-cell">
                                <div className="top">{fmtDate(r.start_time)}</div>
                                <div className="sub">{fmtTime(r.start_time)}{r.end_time ? " – " + fmtTime(r.end_time) : ""}</div>
                              </td>
                              <td>{r.duration_minutes ? `${r.duration_minutes} min` : "—"}</td>
                              <td>{r.distance_km ? `${Number(r.distance_km).toFixed(2)} km` : "—"}</td>
                              <td className="rh-cost-cell">{PRICE_FMT.format(Number(r.cost) || 0)}</td>
                              <td>{r.payment_status ? <PayChip status={r.payment_status}/> : <span className="s-muted">—</span>}</td>
                              <td><Badge status={r.status}/></td>
                              <td><RideActions ride={r} onView={handleView} onReceipt={handleReceipt} onCancel={handleCancel} onEndRide={handleEndRide}/></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>

                    {/* Mobile cards */}
                    <div className="rh-card-list" data-testid="rh-card-list">
                      {visible.map(r => (
                        <div key={r.ride_id} className="rh-card" data-testid={`card-${r.ride_id}`}>
                          <div className="rh-card-head">
                            <div className="rh-card-id">#{r.ride_id} · {r.bike_code}</div>
                            <Badge status={r.status}/>
                          </div>
                          <div className="rh-route">
                            <span className="rh-from"><span className="dot"/>{r.start_station}</span>
                            <span className="rh-arrow">→</span>
                            <span className="rh-to"><span className="dot"/>{r.end_station || "—"}</span>
                          </div>
                          <div className="rh-card-meta">
                            <span>{fmtDate(r.start_time)}</span>
                            <span>{r.duration_minutes ? `${r.duration_minutes} min` : "—"}</span>
                            <span>{r.distance_km ? `${Number(r.distance_km).toFixed(2)} km` : "—"}</span>
                            {r.payment_status && <PayChip status={r.payment_status}/>}
                          </div>
                          <div className="rh-card-foot">
                            <span className="rh-cost-cell">{PRICE_FMT.format(Number(r.cost) || 0)}</span>
                            <RideActions ride={r} onView={handleView} onReceipt={handleReceipt} onCancel={handleCancel} onEndRide={handleEndRide}/>
                          </div>
                        </div>
                      ))}
                    </div>
                  </>
                )}
              </section>
            </main>
          </div>

          {detail    && <RideDetailModal ride={detail}    onClose={() => setDetail(null)}/>}
          {cancelFor && <CancelModal ride={cancelFor} onClose={() => setCancelFor(null)} onConfirm={confirmCancel}/>}
          {receipt   && <ReceiptModal receipt={receipt} onClose={() => setReceipt(null)} pushToast={pushToast}/>}
          <window.StudentToastStack toasts={toasts}/>
        </div>
      );
    }

    setTimeout(() => ReactDOM.createRoot(document.getElementById("root")).render(<App/>), 50);
  </script>
</body>
</html>
