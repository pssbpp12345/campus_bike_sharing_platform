<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard | Campus Bike Sharing</title>
  <link rel="stylesheet" href="../../Login.css">

  <!-- Inter font for body, Plus Jakarta Sans for headings -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- React + Babel (in-browser JSX so we don't need a build step) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Maps loader: call __initGmaps as the callback so React can wait for window.google -->
  <script>
    window.__initGmaps = function () {
      window.__gmapsReady = true;
      window.dispatchEvent(new Event("gmapsReady"));
    };
    window.__gmapsError = function (e) {
      console.error("[gmaps]", e);
      window.__gmapsFailed = true;
      window.dispatchEvent(new Event("gmapsError"));
    };
    window.gm_authFailure = function () { window.__gmapsError("Authentication failed for the API key"); };
  </script>
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB6PW601u22m34P5Vcl5d4DBXgQxOYSV2U&callback=__initGmaps&loading=async&libraries=places"
    onerror="window.__gmapsError('Failed to load Google Maps script')"></script>

  <style>
    /* Student Dashboard — page-specific design system */
    :root {
      --d-bg:        #F8FAFC;
      --d-bg-soft:   #F1F5F9;
      --d-card:      #FFFFFF;
      --d-ink:       #0F172A;
      --d-muted:     #64748B;
      --d-border:    #E2E8F0;
      --d-border-2:  #CBD5E1;

      --d-primary:   #2D7FF9;
      --d-primary-d: #1E5BC6;
      --d-green:     #22C55E;
      --d-green-d:   #15803D;
      --d-green-soft:#DCFCE7;
      --d-amber:     #F59E0B;
      --d-amber-soft:#FEF3C7;
      --d-red:       #EF4444;

      --d-shadow:    0 1px 2px rgba(15, 23, 42, .04), 0 8px 24px rgba(15, 23, 42, .06);
      --d-shadow-lg: 0 12px 40px rgba(15, 23, 42, .12);

      --d-radius-sm: 10px;
      --d-radius:    16px;
      --d-radius-lg: 22px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--d-bg);
      color: var(--d-ink);
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 { font-family: "Plus Jakarta Sans", "Inter", sans-serif; margin: 0; color: var(--d-ink); }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* Top app bar */
    .d-shell { display: flex; flex-direction: column; min-height: 100vh; }
    .d-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: var(--d-card);
      border-bottom: 1px solid var(--d-border);
      position: sticky; top: 0; z-index: 50;
    }
    .d-brand { display: flex; align-items: center; gap: 12px; }
    .d-brand-logo {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      color: var(--d-green);
    }
    .d-brand-name {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 800; font-size: 22px; letter-spacing: -.3px;
    }
    .d-brand-name .accent { color: var(--d-green); }

    .d-nav { display: flex; align-items: center; gap: 4px; }
    .d-nav-item {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      color: var(--d-muted);
      font-weight: 600; font-size: 14px;
      border-radius: var(--d-radius-sm);
      cursor: pointer;
      border: none; background: transparent;
      position: relative;
      transition: color .15s, background .15s;
    }
    .d-nav-item:hover { color: var(--d-ink); background: var(--d-bg-soft); }
    .d-nav-item.active { color: var(--d-ink); }
    .d-nav-item.active::after {
      content: ""; position: absolute; left: 14px; right: 14px; bottom: 4px;
      height: 3px; border-radius: 2px; background: var(--d-green);
    }
    .d-icon-btn {
      width: 42px; height: 42px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 12px; background: transparent; border: none; cursor: pointer;
      color: var(--d-muted); position: relative;
      transition: color .15s, background .15s;
    }
    .d-icon-btn:hover { color: var(--d-ink); background: var(--d-bg-soft); }
    .d-icon-btn .badge {
      position: absolute; top: 6px; right: 6px;
      min-width: 18px; height: 18px; padding: 0 5px;
      background: var(--d-red); color: #FFFFFF;
      border-radius: 999px; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 2px var(--d-card);
    }

    /* Main shell */
    .d-main { display: flex; flex: 1; min-height: 0; }
    .d-sidebar {
      width: 80px; flex-shrink: 0;
      background: var(--d-card);
      border-right: 1px solid var(--d-border);
      padding: 22px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .d-side-btn {
      width: 52px; height: 52px;
      border: none; background: transparent; cursor: pointer;
      border-radius: 14px;
      color: var(--d-muted);
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s, transform .15s;
    }
    .d-side-btn:hover { color: var(--d-green); background: var(--d-green-soft); }
    .d-side-btn.active { color: var(--d-green); background: var(--d-green-soft); }
    .d-side-btn:active { transform: scale(.95); }
    .d-side-spacer { flex: 1; }

    .d-content {
      flex: 1; min-width: 0;
      padding: 24px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      align-content: start;
    }
    .d-card {
      background: var(--d-card);
      border: 1px solid var(--d-border);
      border-radius: var(--d-radius-lg);
      box-shadow: var(--d-shadow);
    }

    /* Left column: Station Details */
    .d-left { display: flex; flex-direction: column; gap: 20px; min-width: 0; }
    .d-section-h {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 24px 12px;
    }
    .d-section-h h2 {
      font-size: 22px; font-weight: 800; letter-spacing: -.4px;
      position: relative; padding-bottom: 8px;
    }
    .d-section-h h2::after {
      content: ""; position: absolute; left: 0; bottom: 0;
      width: 36px; height: 3px; border-radius: 2px; background: var(--d-green);
    }
    .d-station-body { padding: 0 24px 22px; }
    .d-station-head { display: flex; gap: 14px; align-items: flex-start; padding: 4px 0 16px; }
    .d-station-icon {
      flex-shrink: 0; width: 56px; height: 56px;
      background: var(--d-green-soft); color: var(--d-green);
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
    }
    .d-station-title-row h3 { font-size: 18px; font-weight: 800; letter-spacing: -.2px; }
    .d-status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 6px; padding: 3px 10px;
      background: var(--d-green-soft); color: var(--d-green-d);
      font-size: 11px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase;
      border-radius: 999px;
    }
    .d-station-title-row .meta {
      display: flex; align-items: center; gap: 6px;
      color: var(--d-muted); font-size: 13px; margin-top: 8px;
    }

    .d-availability-card {
      background: linear-gradient(135deg, #ECFDF5 0%, #F0FDF4 100%);
      border: 1px solid #BBF7D0;
      border-radius: var(--d-radius);
      padding: 16px;
      display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px;
    }
    .d-availability-card .label { font-size: 13px; color: var(--d-muted); font-weight: 600; }
    .d-availability-card .count {
      font-family: "Plus Jakarta Sans", sans-serif; font-weight: 800; font-size: 30px; line-height: 1;
      letter-spacing: -.5px; margin-top: 6px;
    }
    .d-availability-card .count .total { color: var(--d-muted); font-weight: 600; font-size: 18px; }
    .d-progress { height: 8px; background: rgba(34, 197, 94, .15); border-radius: 999px; overflow: hidden; margin-top: 10px; }
    .d-progress > div {
      height: 100%; background: linear-gradient(90deg, var(--d-green) 0%, #16A34A 100%);
      border-radius: 999px; transition: width .4s;
    }
    .d-availability-card .pct { font-size: 12px; color: var(--d-green-d); font-weight: 700; margin-top: 6px; }
    .d-availability-icon {
      width: 56px; height: 56px;
      background: rgba(255, 255, 255, .8); color: var(--d-green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(34, 197, 94, .25);
    }

    .d-stat-list { display: flex; flex-direction: column; margin-top: 18px; gap: 0; }
    .d-stat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0;
      border-top: 1px solid var(--d-border);
      font-size: 14px;
    }
    .d-stat-row:first-child { border-top: 0; }
    .d-stat-row .lhs { display: flex; align-items: center; gap: 10px; color: var(--d-muted); }
    .d-stat-row .icn { color: var(--d-primary); }
    .d-stat-row .val { font-weight: 700; color: var(--d-ink); }

    .d-cta {
      width: 100%; margin-top: 20px;
      height: 52px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, var(--d-green) 0%, #16A34A 100%);
      color: #FFFFFF; font-weight: 700; font-size: 15px;
      border: none; border-radius: 14px; cursor: pointer;
      box-shadow: 0 8px 22px rgba(34, 197, 94, .35);
      transition: transform .12s, box-shadow .15s;
    }
    .d-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(34, 197, 94, .4); }
    .d-cta:active { transform: translateY(0); }
    .d-cta:disabled { background: #94A3B8; box-shadow: none; cursor: not-allowed; transform: none; }

    /* Quick actions card */
    .d-qa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 4px 24px 22px; }
    .d-qa-btn {
      background: var(--d-card);
      border: 1px solid var(--d-border);
      border-radius: var(--d-radius);
      padding: 16px 12px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      cursor: pointer;
      color: var(--d-ink);
      font-weight: 600; font-size: 13px;
      transition: border-color .15s, transform .12s, box-shadow .15s;
    }
    .d-qa-btn:hover { border-color: var(--d-border-2); transform: translateY(-2px); box-shadow: var(--d-shadow); }
    .d-qa-btn .icn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .d-qa-refresh .icn { color: var(--d-green); background: var(--d-green-soft); }
    .d-qa-issue   .icn { color: var(--d-amber); background: var(--d-amber-soft); }

    /* Right column: Map */
    .d-right { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
    .d-map-card { padding: 0; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
    .d-map-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 24px 16px; gap: 16px; flex-wrap: wrap;
      position: relative;
    }
    .d-map-head h2 {
      font-size: 22px; font-weight: 800; letter-spacing: -.4px;
      display: flex; align-items: center; gap: 10px;
    }
    .d-map-tools { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 240px; justify-content: flex-end; position: relative; }
    .d-search {
      flex: 1; max-width: 360px;
      height: 44px;
      display: flex; align-items: center; gap: 10px;
      padding: 0 14px;
      background: var(--d-bg-soft);
      border: 1px solid var(--d-border);
      border-radius: 12px;
      transition: border-color .15s, background .15s;
    }
    .d-search:focus-within { border-color: var(--d-primary); background: var(--d-card); }
    .d-search input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 14px; color: var(--d-ink); font-family: inherit;
    }
    .d-search input::placeholder { color: var(--d-muted); }
    .d-filter-btn {
      height: 44px; padding: 0 16px;
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--d-card); border: 1px solid var(--d-border);
      border-radius: 12px; color: var(--d-ink);
      font-weight: 600; font-size: 14px; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .d-filter-btn:hover { border-color: var(--d-border-2); }
    .d-filter-btn.active { background: var(--d-primary); color: #FFFFFF; border-color: var(--d-primary); }

    .d-filter-pop {
      position: absolute; right: 0; top: calc(100% + 8px);
      background: var(--d-card); border: 1px solid var(--d-border);
      border-radius: 14px; box-shadow: var(--d-shadow-lg);
      padding: 8px; min-width: 220px; z-index: 30;
    }
    .d-filter-pop button {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 10px 12px; border-radius: 10px;
      background: transparent; border: none; cursor: pointer;
      font-size: 14px; color: var(--d-ink); font-weight: 500; font-family: inherit;
    }
    .d-filter-pop button:hover { background: var(--d-bg-soft); }
    .d-filter-pop button.sel { color: var(--d-primary); font-weight: 700; }

    .d-map-wrap { position: relative; flex: 1; min-height: 540px; }
    #d-map { width: 100%; height: 100%; min-height: 540px; }
    .d-map-loading, .d-map-error {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: linear-gradient(135deg, #E0F2FE 0%, #ECFDF5 100%);
      color: var(--d-muted); font-weight: 600; padding: 24px; text-align: center;
    }
    .d-map-spin {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 3px solid rgba(45, 127, 249, .2);
      border-top-color: var(--d-primary);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .d-recenter {
      position: absolute; right: 16px; top: 16px;
      width: 42px; height: 42px;
      background: #FFFFFF; border: 1px solid var(--d-border);
      border-radius: 12px; cursor: pointer; color: var(--d-ink);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--d-shadow); z-index: 5;
    }
    .d-recenter:hover { background: var(--d-bg-soft); }

    .d-legend {
      position: absolute; right: 16px; bottom: 16px;
      background: var(--d-card);
      border: 1px solid var(--d-border);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: var(--d-shadow);
      z-index: 5;
      min-width: 200px;
    }
    .d-legend h4 { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; color: var(--d-muted); margin-bottom: 8px; }
    .d-legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--d-ink); padding: 3px 0; }
    .d-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Notifications dropdown */
    .d-notif-wrap { position: relative; }
    .d-notif-panel {
      position: absolute; right: 0; top: calc(100% + 12px);
      width: 380px; max-width: calc(100vw - 32px);
      background: var(--d-card);
      border: 1px solid var(--d-border);
      border-radius: 18px;
      box-shadow: var(--d-shadow-lg);
      overflow: hidden;
      z-index: 100;
      animation: notifIn .18s ease-out;
    }
    @keyframes notifIn {
      from { opacity: 0; transform: translateY(-6px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .d-notif-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--d-border);
    }
    .d-notif-head h3 { font-size: 16px; font-weight: 800; }
    .d-notif-mark {
      background: transparent; border: none; cursor: pointer;
      color: var(--d-primary); font-weight: 600; font-size: 13px; font-family: inherit;
    }
    .d-notif-mark:hover { text-decoration: underline; }
    .d-notif-list { max-height: 420px; overflow: auto; }
    .d-notif-item {
      display: flex; gap: 12px; padding: 14px 18px;
      border-bottom: 1px solid var(--d-border);
      cursor: pointer; transition: background .12s;
    }
    .d-notif-item:hover { background: var(--d-bg-soft); }
    .d-notif-item:last-child { border-bottom: none; }
    .d-notif-item.unread { background: linear-gradient(90deg, #EFF6FF, transparent); }
    .d-notif-icon {
      flex-shrink: 0; width: 36px; height: 36px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .d-notif-icon.success { background: var(--d-green-soft); color: var(--d-green-d); }
    .d-notif-icon.info    { background: #DBEAFE; color: #1E3A8A; }
    .d-notif-icon.warn    { background: var(--d-amber-soft); color: #92400E; }
    .d-notif-body { flex: 1; min-width: 0; }
    .d-notif-title { font-size: 14px; font-weight: 700; color: var(--d-ink); margin-bottom: 2px; }
    .d-notif-text  { font-size: 13px; color: var(--d-muted); line-height: 1.45; }
    .d-notif-time  { font-size: 12px; color: var(--d-muted); margin-top: 4px; }
    .d-notif-empty { padding: 32px 18px; text-align: center; color: var(--d-muted); font-size: 13px; }

    /* User menu */
    .d-user-wrap { position: relative; }
    .d-user-btn {
      width: 42px; height: 42px;
      border: 2px solid transparent; cursor: pointer; padding: 0;
      border-radius: 50%; background: transparent;
      transition: border-color .15s, transform .12s;
    }
    .d-user-btn:hover { border-color: var(--d-border-2); transform: translateY(-1px); }
    .d-user-btn.open { border-color: var(--d-primary); }
    .d-user-avatar {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--d-primary) 0%, #5B9BFF 100%);
      color: #FFFFFF;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 800; font-size: 15px;
      letter-spacing: -.2px;
      box-shadow: 0 4px 12px rgba(45, 127, 249, .35);
    }
    .d-user-avatar.lg { width: 52px; height: 52px; font-size: 19px; flex-shrink: 0; }
    .d-user-panel {
      position: absolute; right: 0; top: calc(100% + 12px);
      width: 300px; max-width: calc(100vw - 32px);
      background: var(--d-card);
      border: 1px solid var(--d-border);
      border-radius: 18px;
      box-shadow: var(--d-shadow-lg);
      overflow: hidden;
      z-index: 100;
      animation: notifIn .18s ease-out;
    }
    .d-user-head {
      display: flex; gap: 14px; align-items: center;
      padding: 18px;
      background: linear-gradient(135deg, #EFF6FF 0%, #ECFDF5 100%);
      border-bottom: 1px solid var(--d-border);
    }
    .d-user-head .name { font-size: 15px; font-weight: 800; color: var(--d-ink); letter-spacing: -.2px; }
    .d-user-head .email { font-size: 12px; color: var(--d-muted); margin-top: 2px; word-break: break-all; }
    .d-user-head .role-pill {
      display: inline-block; margin-top: 6px;
      padding: 2px 9px;
      background: var(--d-green-soft); color: var(--d-green-d);
      font-size: 10px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase;
      border-radius: 999px;
    }
    .d-user-list { padding: 8px; }
    .d-user-list button {
      display: flex; align-items: center; gap: 12px; width: 100%;
      padding: 11px 12px; border-radius: 10px;
      background: transparent; border: none; cursor: pointer;
      color: var(--d-ink); font-family: inherit; font-size: 14px; font-weight: 500;
      text-align: left;
    }
    .d-user-list button:hover { background: var(--d-bg-soft); }
    .d-user-list button .ico { color: var(--d-muted); display: inline-flex; }
    .d-user-foot { padding: 8px; border-top: 1px solid var(--d-border); }
    .d-user-foot button {
      display: flex; align-items: center; gap: 12px; width: 100%;
      padding: 11px 12px; border-radius: 10px;
      background: transparent; border: none; cursor: pointer;
      color: var(--d-red); font-family: inherit; font-size: 14px; font-weight: 600;
      text-align: left;
    }
    .d-user-foot button:hover { background: rgba(239, 68, 68, .08); }

    /* Modal */
    .d-overlay {
      position: fixed; inset: 0; background: rgba(15, 23, 42, .55);
      display: flex; align-items: center; justify-content: center;
      padding: 16px; z-index: 200;
      animation: fade .15s;
    }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .d-modal {
      background: var(--d-card);
      border-radius: 22px;
      width: 100%; max-width: 460px;
      box-shadow: var(--d-shadow-lg);
      overflow: hidden;
      animation: pop .2s cubic-bezier(.18,.89,.32,1.28);
    }
    @keyframes pop { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .d-modal-head { padding: 22px 24px 6px; }
    .d-modal-head h3 { font-size: 20px; font-weight: 800; letter-spacing: -.3px; }
    .d-modal-head p { color: var(--d-muted); font-size: 14px; margin: 6px 0 0; }
    .d-modal-body { padding: 14px 24px 18px; }
    .d-modal-foot {
      padding: 12px 24px 22px;
      display: flex; gap: 10px; justify-content: flex-end;
    }
    .d-input, .d-textarea {
      width: 100%; padding: 12px 14px;
      background: var(--d-bg-soft); border: 1px solid var(--d-border);
      border-radius: 12px; color: var(--d-ink); font-family: inherit; font-size: 14px;
      outline: none; transition: border-color .12s, background .12s;
    }
    .d-input:focus, .d-textarea:focus { border-color: var(--d-primary); background: var(--d-card); }

      padding: 11px 18px; border-radius: 12px; font-weight: 700; font-size: 14px;
      cursor: pointer; border: 1px solid transparent; transition: transform .12s, box-shadow .15s;
      font-family: inherit;
    }
    .d-btn:active { transform: translateY(1px); }
    .d-btn-secondary { background: var(--d-card); color: var(--d-ink); border-color: var(--d-border); }
    .d-btn-secondary:hover { border-color: var(--d-border-2); }
    .d-btn-primary {
      background: linear-gradient(135deg, var(--d-green) 0%, #16A34A 100%);
      color: #FFFFFF; box-shadow: 0 6px 16px rgba(34, 197, 94, .35);
    }
    .d-btn-primary:hover { box-shadow: 0 8px 20px rgba(34, 197, 94, .45); }
    .d-btn-primary:disabled { background: #94A3B8; box-shadow: none; cursor: not-allowed; }
    .d-summary {
      background: var(--d-bg-soft); border: 1px solid var(--d-border);
      border-radius: 14px; padding: 14px 16px; margin-top: 6px;
    }
    .d-summary-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
    .d-summary-row .k { color: var(--d-muted); }
    .d-summary-row .v { font-weight: 700; color: var(--d-ink); }

    /* Booking calendar */
    .d-modal.book { max-width: 760px; }
    .d-book-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
    .d-book-col h4 {
      font-size: 12px; font-weight: 800; letter-spacing: .5px;
      text-transform: uppercase; color: var(--d-muted);
      margin-bottom: 10px;
    }

    .d-cal-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; gap: 8px;
    }
    .d-cal-month {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 800; font-size: 16px; color: var(--d-ink);
      letter-spacing: -.2px;
    }
    .d-cal-nav { display: flex; gap: 4px; }
    .d-cal-nav button {
      width: 32px; height: 32px;
      border: 1px solid var(--d-border); background: var(--d-card);
      border-radius: 8px; cursor: pointer; color: var(--d-ink);
      display: flex; align-items: center; justify-content: center;
      transition: border-color .12s, background .12s;
    }
    .d-cal-nav button:hover:not(:disabled) { border-color: var(--d-primary); color: var(--d-primary); }
    .d-cal-nav button:disabled { opacity: .35; cursor: not-allowed; }

    .d-cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    }
    .d-cal-dow {
      text-align: center; font-size: 10px; color: var(--d-muted);
      padding: 6px 0 4px; font-weight: 800; letter-spacing: .5px;
    }
    .d-cal-cell {
      aspect-ratio: 1;
      border: none; background: transparent;
      border-radius: 10px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; padding: 0;
      font-family: inherit; font-weight: 600; font-size: 14px; color: var(--d-ink);
      position: relative;
      transition: background .12s, color .12s, transform .12s;
    }
    .d-cal-cell:hover:not(:disabled):not(.selected) { background: var(--d-bg-soft); }
    .d-cal-cell.muted { color: var(--d-border-2); }
    .d-cal-cell.today { color: var(--d-primary); font-weight: 800; }
    .d-cal-cell.today::after {
      content: ""; position: absolute; bottom: 6px;
      width: 4px; height: 4px; border-radius: 50%; background: var(--d-primary);
    }
    .d-cal-cell.selected {
      background: linear-gradient(135deg, var(--d-green) 0%, #16A34A 100%);
      color: #FFFFFF; box-shadow: 0 4px 12px rgba(34, 197, 94, .35);
    }
    .d-cal-cell.selected.today { color: #FFFFFF; }
    .d-cal-cell.selected.today::after { background: #FFFFFF; }
    .d-cal-cell:disabled { color: var(--d-border-2); cursor: not-allowed; opacity: .55; }

    .d-time-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
      max-height: 240px; overflow-y: auto;
      padding: 2px 4px 2px 0;
      scrollbar-width: thin;
    }
    .d-time-grid::-webkit-scrollbar { width: 6px; }
    .d-time-grid::-webkit-scrollbar-thumb { background: var(--d-border-2); border-radius: 4px; }
    .d-time-slot {
      padding: 9px 4px;
      border: 1px solid var(--d-border); background: var(--d-card);
      border-radius: 9px;
      font-family: inherit;
      font-size: 12px; font-weight: 700; color: var(--d-ink);
      cursor: pointer; text-align: center;
      transition: border-color .12s, background .12s, color .12s, transform .12s;
    }
    .d-time-slot:hover:not(:disabled):not(.selected) {
      border-color: var(--d-primary); color: var(--d-primary);
      transform: translateY(-1px);
    }
    .d-time-slot.selected {
      background: linear-gradient(135deg, var(--d-primary) 0%, #5B9BFF 100%);

      box-shadow: 0 4px 12px rgba(45, 127, 249, .35);

      cursor: not-allowed; opacity: .55;
    }
    .d-time-slot.past { color: var(--d-muted); background: var(--d-bg-soft); }
    .d-time-slot.conflict {
      background: #FEF2F2; color: #B91C1C; border-color: #FECACA;
      text-decoration: line-through;
    }
    .d-time-slot.conflict::before {
      content: "•"; margin-right: 2px; text-decoration: none; display: inline-block;
    }

    .d-duration-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px;
    }
    .d-duration-pill {
      padding: 8px 14px; border-radius: 999px;
      border: 1px solid var(--d-border); background: var(--d-card);
      font-family: inherit; font-size: 13px; font-weight: 600; color: var(--d-ink);
      cursor: pointer;
      transition: all .12s;
    }
    .d-duration-pill:hover:not(.selected) { border-color: var(--d-border-2); }
    .d-duration-pill.selected {
      background: var(--d-ink); color: #FFFFFF; border-color: var(--d-ink);
    }

    .d-conflict {
      display: flex; gap: 10px; align-items: flex-start;
      background: #FEF2F2; border: 1px solid #FECACA; color: #991B1B;
      padding: 11px 14px; border-radius: 12px;
      font-size: 13px; line-height: 1.45;
      margin-top: 10px;
    }
    .d-conflict .ico { color: #B91C1C; flex-shrink: 0; margin-top: 1px; }

    .d-empty-slots {
      grid-column: 1 / -1;
      padding: 20px 12px; text-align: center;
      color: var(--d-muted); font-size: 13px;
      border: 1px dashed var(--d-border); border-radius: 10px;
    }

    .d-co2-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px;
      background: var(--d-green-soft); color: var(--d-green-d);
      font-size: 11px; font-weight: 700;
    }

    @media (max-width: 720px) {
      .d-modal.book { max-width: 100%; }
      .d-book-grid { grid-template-columns: 1fr; gap: 16px; }
      .d-time-grid { max-height: 180px; }
    }

    /* Toasts */
    .d-toast-wrap {
      position: fixed; right: 20px; bottom: 20px; z-index: 250;
      display: flex; flex-direction: column; gap: 10px;
    }
    .d-toast {
      min-width: 280px; max-width: 360px;
      background: var(--d-card); border: 1px solid var(--d-border);
      border-radius: 14px; padding: 14px 16px;
      display: flex; gap: 12px; align-items: flex-start;
      box-shadow: var(--d-shadow-lg);
      animation: toastIn .25s ease-out;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .d-toast .ico { color: var(--d-green); flex-shrink: 0; }
    .d-toast .body { flex: 1; }
    .d-toast .title { font-weight: 700; font-size: 14px; }
    .d-toast .text { font-size: 13px; color: var(--d-muted); margin-top: 2px; }

    /* Responsive */
    @media (max-width: 1100px) { .d-content { grid-template-columns: 320px 1fr; } }
    @media (max-width: 900px) {
      .d-nav-text { display: none; }
      .d-nav-item.active::after { display: none; }
      .d-content { grid-template-columns: 1fr; padding: 16px; }
      .d-sidebar {
        position: fixed; left: 0; bottom: 0; right: 0; top: auto; width: 100%;
        flex-direction: row; justify-content: space-around;
        padding: 8px 12px; border-right: none; border-top: 1px solid var(--d-border);
        z-index: 60;
      }
      .d-side-spacer { display: none; }
      .d-content { padding-bottom: 88px; }
      .d-map-wrap { min-height: 420px; }
      #d-map { min-height: 420px; }
    }
    @media (max-width: 640px) {
      .d-topbar { padding: 12px 16px; }
      .d-brand-name { font-size: 18px; }
      .d-nav { gap: 0; }
      .d-nav-item { padding: 8px; }
      .d-section-h, .d-station-body, .d-qa-grid { padding-left: 18px; padding-right: 18px; }
      .d-map-head { padding: 18px 18px 12px; }
      .d-map-tools { width: 100%; }
      .d-search { max-width: none; }
      .d-legend { right: 8px; bottom: 8px; min-width: 0; padding: 8px 10px; }
    }

      building:() => <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 9h6M9 13h6M9 17h6"/></svg>,
      settings:() => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      mail:    () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
      chevL:   () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
      chevR:   () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
      leaf:    () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19.2 2.96c1.4 9.3 -1.6 16.04 -8.2 17.04Z"/><path d="M2 21c0 -3 1.85 -5.36 5.08 -6"/></svg>,
    };

    /* Helpers */
    const fmtRelative = (ts) => {
      const diff = Math.max(1, Math.floor((Date.now() - ts) / 1000));
      if (diff < 60) return diff + "s ago";
      if (diff < 3600) return Math.floor(diff/60) + "m ago";
      if (diff < 86400) return Math.floor(diff/3600) + "h ago";
      return Math.floor(diff/86400) + "d ago";
    };
    const availabilityClass = (b, c) => {
      if (b === 0) return "empty";
      const r = b/c;
      if (r >= 0.5) return "high";
      if (r >= 0.25) return "medium";
      return "low";
    };
    const availabilityColor = (cls) => ({ high: "#22C55E", medium: "#84CC16", low: "#2D7FF9", empty: "#94A3B8" })[cls];

    /* User menu dropdown */
    function UserMenu({ user, firstName, onAction, onLogout }) {
      const role = (user && user.role ? user.role : "Student");
      const email = (user && user.email) || "you@university.edu";
      const fullName = (user && (user.full_name || user.name)) || firstName;
      return (
        <div className="d-user-panel" onClick={e => e.stopPropagation()}>
          <div className="d-user-head">
            <div className="d-user-avatar lg">{firstName.charAt(0).toUpperCase()}</div>
            <div style={{minWidth:0, flex:1}}>
              <div className="name">{fullName}</div>
              <div className="email">{email}</div>
              <span className="role-pill">{role}</span>
            </div>
          </div>
          <div className="d-user-list">
            <button onClick={() => onAction("profile")}><span className="ico"><Icon.person/></span>View Profile</button>
            <button onClick={() => onAction("bookings")}><span className="ico"><Icon.calendar/></span>My Bookings</button>
            <button onClick={() => onAction("history")}><span className="ico"><Icon.bike s={18}/></span>Ride History</button>
            <button onClick={() => onAction("settings")}><span className="ico"><Icon.settings/></span>Account Settings</button>
            <button onClick={() => onAction("inbox")}><span className="ico"><Icon.mail/></span>Messages</button>
            <button onClick={() => onAction("help")}><span className="ico"><Icon.help/></span>Help &amp; Support</button>
          </div>
          <div className="d-user-foot">
            <button onClick={onLogout}><Icon.logout/>Sign out</button>
          </div>
        </div>
      );
    }

    /* Notification dropdown */
    function NotifPanel({ notifications, onMarkAll, onClickItem }) {
      return (
        <div className="d-notif-panel" onClick={e => e.stopPropagation()}>
          <div className="d-notif-head">
            <h3>Notifications</h3>
            <button className="d-notif-mark" onClick={onMarkAll}>Mark all as read</button>
          </div>
          <div className="d-notif-list">
            {notifications.length === 0 && (<div className="d-notif-empty">You're all caught up.</div>)}
            {notifications.map(n => (
              <div key={n.id} className={"d-notif-item" + (n.unread ? " unread" : "")} onClick={() => onClickItem(n)}>
                <div className={"d-notif-icon " + n.kind}>
                  {n.kind === "success" ? <Icon.check/> : n.kind === "warn" ? <Icon.alert/> : <Icon.info/>}
                </div>
                <div className="d-notif-body">
                  <div className="d-notif-title">{n.title}</div>
                  <div className="d-notif-text">{n.text}</div>
                  <div className="d-notif-time">{fmtRelative(n.when)}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── Pricing (Sydney bike-share style) ──────────────── */
    const PRICING = {
      unlockFee: 1.00,
      perMinute: 0.20,
      currency: "AUD",
      symbol: "$",
    };
    function calcCost(durationMin) {
      return PRICING.unlockFee + PRICING.perMinute * durationMin;
    }
    function fmtPrice(amount) {
      return PRICING.symbol + amount.toFixed(2);
    }

    /* ── Booking calendar helpers ────────────────────────── */
    // Parse "6:00 AM – 10:00 PM" (or "24 hours") → [openHour, closeHour]
    function parseHours(str) {
      if (!str) return [6, 22];
      if (/24/.test(str)) return [0, 24];
      const m = str.match(/(\d+):(\d+)\s*(AM|PM)\s*[–-]\s*(\d+):(\d+)\s*(AM|PM)/i);
      if (!m) return [6, 22];
      const to24 = (h, mer) => ((parseInt(h, 10) % 12) + (/PM/i.test(mer) ? 12 : 0));
      return [to24(m[1], m[3]), to24(m[4], m[6])];
    }
    function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
    function sameDay(a, b) { return startOfDay(a).getTime() === startOfDay(b).getTime(); }
    function fmtHM(h, m) { const d = new Date(); d.setHours(h, m, 0, 0); return d.toLocaleTimeString("en-AU", { hour: "numeric", minute: "2-digit", hour12: true }); }
    function buildMonthGrid(year, month) {
      const first = new Date(year, month, 1);
      const startWeekday = first.getDay(); // 0 = Sunday
      const daysIn = new Date(year, month + 1, 0).getDate();
      const cells = [];
      // Leading days from previous month
      for (let i = startWeekday - 1; i >= 0; i--) cells.push({ d: new Date(year, month, -i), inMonth: false });
      for (let i = 1; i <= daysIn; i++) cells.push({ d: new Date(year, month, i), inMonth: true });
      while (cells.length % 7 !== 0) cells.push({ d: new Date(year, month, daysIn + (cells.length % 7)), inMonth: false });
      // Pad to 6 rows for stable height
      while (cells.length < 42) {
        const last = cells[cells.length - 1].d;
        cells.push({ d: new Date(last.getFullYear(), last.getMonth(), last.getDate() + 1), inMonth: false });
      }
      return cells;
    }
    const DURATIONS = [
      { v: 30,  label: "30 min" },
      { v: 60,  label: "1 hr" },
      { v: 120, label: "2 hr" },
      { v: 240, label: "4 hr" },
      { v: 480, label: "All day" },
    ];

    /* ── Booking modal with calendar + time-slot picker ───── */
    function BookingModal({ station, existingBookings, onClose, onConfirm }) {
      // Initial selected date = today
      const today = useMemo(() => startOfDay(new Date()), []);
      const [viewYM, setViewYM] = useState(() => ({ y: today.getFullYear(), m: today.getMonth() }));
      const [selectedDay, setSelectedDay] = useState(today);
      const [selectedTime, setSelectedTime] = useState(null); // "HH:MM"
      const [duration, setDuration] = useState(60);
      const [paymentLoading, setPaymentLoading] = useState(false);

      const [openH, closeH] = useMemo(() => parseHours(station && station.hours), [station]);

      // Generate 30-minute slots within station hours
      const slots = useMemo(() => {
        const arr = [];
        const lastSlotMin = (closeH * 60) - duration; // can't start a ride that ends after closing
        for (let mins = openH * 60; mins <= lastSlotMin; mins += 30) {
          arr.push({ h: Math.floor(mins / 60), m: mins % 60 });
        }
        return arr;
      }, [openH, closeH, duration]);

      // Detect conflicts: existing bookings that overlap the slot+duration on selectedDay
      const conflictsBy = useMemo(() => {
        const out = {};
        if (!station) return out;
        slots.forEach(s => {
          const start = new Date(selectedDay);
          start.setHours(s.h, s.m, 0, 0);
          const end = new Date(start.getTime() + duration * 60000);
          const conflict = existingBookings.find(b =>
            new Date(b.start) < end && start < new Date(b.end)
          );
          out[s.h * 60 + s.m] = conflict || null;
        });
        return out;
      }, [slots, selectedDay, duration, existingBookings, station]);

      // Auto-pick the first available future slot when day/duration changes
      useEffect(() => {
        if (!slots.length) { setSelectedTime(null); return; }
        const isToday = sameDay(selectedDay, new Date());
        const nowMin = isToday ? (new Date().getHours() * 60 + new Date().getMinutes()) : -Infinity;
        const firstOk = slots.find(s => {
          const slotMin = s.h * 60 + s.m;
          if (slotMin <= nowMin) return false;
          if (conflictsBy[slotMin]) return false;
          return true;
        });
        if (firstOk) setSelectedTime(`${String(firstOk.h).padStart(2,"0")}:${String(firstOk.m).padStart(2,"0")}`);
        else setSelectedTime(null);
      }, [slots, selectedDay, duration]); // eslint-disable-line

      if (!station) return null;

      const monthCells = useMemo(() => buildMonthGrid(viewYM.y, viewYM.m), [viewYM]);
      const monthLabel = new Date(viewYM.y, viewYM.m, 1).toLocaleDateString("en-AU", { month: "long", year: "numeric" });

      // Disable navigating before current month
      const canGoPrev = (viewYM.y > today.getFullYear()) || (viewYM.y === today.getFullYear() && viewYM.m > today.getMonth());
      // Limit forward navigation to 3 months ahead
      const maxDate = new Date(today.getFullYear(), today.getMonth() + 3, 1);
      const canGoNext = (viewYM.y < maxDate.getFullYear()) || (viewYM.y === maxDate.getFullYear() && viewYM.m < maxDate.getMonth());

      const isToday = sameDay(selectedDay, new Date());
      const nowMin = isToday ? (new Date().getHours() * 60 + new Date().getMinutes()) : -Infinity;

      const computedConflict = (() => {
        if (!selectedTime) return null;
        const [hh, mm] = selectedTime.split(":").map(Number);
        return conflictsBy[hh * 60 + mm] || null;
      })();

      const startDt = (() => {
        if (!selectedTime) return null;
        const [hh, mm] = selectedTime.split(":").map(Number);
        const d = new Date(selectedDay);
        d.setHours(hh, mm, 0, 0);
        return d;
      })();
      const endDt = startDt ? new Date(startDt.getTime() + duration * 60000) : null;
      const co2 = (duration / 60 * 0.6).toFixed(1); // ~0.6 kg / hr saved vs car

      const handleConfirm = async () => {
        if (!startDt || !endDt || computedConflict || paymentLoading) return;
        setPaymentLoading(true);
        try {
          await onConfirm({
            stationId: station.id,
            stationName: station.name,
            start: startDt.toISOString(),
            end: endDt.toISOString(),
            duration,
            type: station.type,
            cost: calcCost(duration),
          });
        } finally {
          setPaymentLoading(false);
        }
      };

      return (
        <div className="d-overlay" onClick={onClose}>
          <div className="d-modal book" onClick={e => e.stopPropagation()}>
            <div className="d-modal-head">
              <h3>Book a bike</h3>
              <p>{station.name} · {station.address}</p>
            </div>

            <div className="d-modal-body">
              <div className="d-book-grid">
                {/* LEFT: calendar */}
                <div className="d-book-col">
                  <h4>Pick a date</h4>
                  <div className="d-cal-head">
                    <span className="d-cal-month">{monthLabel}</span>
                    <div className="d-cal-nav">
                      <button title="Previous month" disabled={!canGoPrev}
                        onClick={() => setViewYM(v => v.m === 0 ? { y: v.y - 1, m: 11 } : { y: v.y, m: v.m - 1 })}>
                        <Icon.chevL/>
                      </button>
                      <button title="Next month" disabled={!canGoNext}
                        onClick={() => setViewYM(v => v.m === 11 ? { y: v.y + 1, m: 0 } : { y: v.y, m: v.m + 1 })}>
                        <Icon.chevR/>
                      </button>
                    </div>
                  </div>
                  <div className="d-cal-grid">
                    {["S","M","T","W","T","F","S"].map((d,i) => <div key={i} className="d-cal-dow">{d}</div>)}
                    {monthCells.map((c, i) => {
                      const past = c.d < today;
                      const isSel = sameDay(c.d, selectedDay);
                      const isToday = sameDay(c.d, new Date());
                      const cls = ["d-cal-cell"];
                      if (!c.inMonth) cls.push("muted");
                      if (isToday) cls.push("today");
                      if (isSel) cls.push("selected");
                      return (
                        <button key={i} className={cls.join(" ")} disabled={past || !c.inMonth}
                          onClick={() => { setSelectedDay(startOfDay(c.d)); }}>
                          {c.d.getDate()}
                        </button>
                      );
                    })}
                  </div>

                  <h4 style={{marginTop:18}}>Duration</h4>
                  <div className="d-duration-row">
                    {DURATIONS.map(d => (
                      <button key={d.v} className={"d-duration-pill" + (duration === d.v ? " selected" : "")}
                        onClick={() => setDuration(d.v)}>{d.label}</button>
                    ))}
                  </div>
                </div>

                {/* RIGHT: time slots + summary */}
                <div className="d-book-col">
                  <h4>Pick-up time · {fmtHM(openH, 0)} – {fmtHM(closeH % 24, 0)}</h4>
                  <div className="d-time-grid">
                    {slots.length === 0 && <div className="d-empty-slots">No slots available for this duration today.</div>}
                    {slots.map(s => {
                      const slotMin = s.h * 60 + s.m;
                      const past = slotMin <= nowMin;
                      const conflict = conflictsBy[slotMin];
                      const time = `${String(s.h).padStart(2,"0")}:${String(s.m).padStart(2,"0")}`;
                      const isSel = selectedTime === time;
                      const cls = ["d-time-slot"];
                      if (past) cls.push("past");
                      if (conflict) cls.push("conflict");
                      if (isSel) cls.push("selected");
                      return (
                        <button key={time} className={cls.join(" ")} disabled={past || !!conflict}
                          title={conflict ? `Already booked: ${conflict.stationName}` : (past ? "In the past" : "")}
                          onClick={() => setSelectedTime(time)}>
                          {fmtHM(s.h, s.m)}
                        </button>
                      );
                    })}
                  </div>

                  {computedConflict && (
                    <div className="d-conflict">
                      <span className="ico"><Icon.alert/></span>
                      <div>
                        <strong>This time clashes with another booking</strong> at {computedConflict.stationName}.
                        Pick a different slot or shorten the duration to avoid double-booking yourself.
                      </div>
                    </div>
                  )}

                  <div className="d-summary" style={{marginTop:14}}>
                    <div className="d-summary-row"><span className="k">Station</span><span className="v">{station.name}</span></div>
                    <div className="d-summary-row"><span className="k">Bike type</span><span className="v">{station.type}</span></div>
                    <div className="d-summary-row"><span className="k">Pick-up</span><span className="v">{startDt ? startDt.toLocaleString("en-AU", { weekday:"short", day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" }) : "—"}</span></div>
                    <div className="d-summary-row"><span className="k">Drop-off</span><span className="v">{endDt ? endDt.toLocaleString("en-AU", { hour:"2-digit", minute:"2-digit" }) : "—"}</span></div>
                    <div className="d-summary-row"><span className="k">Unlock fee</span><span className="v">{fmtPrice(PRICING.unlockFee)}</span></div>
                    <div className="d-summary-row"><span className="k">Ride time</span><span className="v">{duration} min × {PRICING.symbol}{PRICING.perMinute.toFixed(2)} = {fmtPrice(PRICING.perMinute * duration)}</span></div>
                    <div className="d-summary-row" style={{borderTop:"1px solid var(--d-border)", marginTop:6, paddingTop:10}}>
                      <span className="k" style={{fontWeight:700, color:"var(--d-ink)"}}>Total</span>
                      <span className="v" style={{fontSize:17, color:"var(--d-primary)"}}>{fmtPrice(calcCost(duration))}</span>
                    </div>
                    <div className="d-summary-row"><span className="k">Estimated impact</span><span className="v"><span className="d-co2-pill"><Icon.leaf/>~{co2} kg CO₂ saved</span></span></div>
                  </div>
                </div>
              </div>
            </div>

            <div className="d-modal-foot">
              <button className="d-btn d-btn-secondary" onClick={onClose}>Cancel</button>
              <button className="d-btn d-btn-primary" disabled={paymentLoading || !selectedTime || !!computedConflict || station.bikes === 0}
                onClick={handleConfirm}>
                {station.bikes === 0 ? "No bikes available" : (paymentLoading ? "Opening payment..." : "Continue to Payment")}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* Report-issue modal */
    function ReportModal({ station, onClose, onSubmit }) {
      const [category, setCategory] = useState("Damaged bike");
      const [details, setDetails] = useState("");
      return (
        <div className="d-overlay" onClick={onClose}>
          <div className="d-modal" onClick={e => e.stopPropagation()}>
            <div className="d-modal-head">
              <h3>Report an issue</h3>
              <p>{station ? station.name : "General feedback"}</p>
            </div>
            <div className="d-modal-body">
              <label style={{display:"block", fontSize:13, fontWeight:600, color:"var(--d-muted)", marginBottom:6}}>Category</label>
              <select className="d-input" value={category} onChange={e => setCategory(e.target.value)}>
                <option>Damaged bike</option>
                <option>Lock won't open / close</option>
                <option>Station full / empty</option>
                <option>Safety concern</option>
                <option>Other</option>
              </select>
              <label style={{display:"block", fontSize:13, fontWeight:600, color:"var(--d-muted)", margin:"14px 0 6px"}}>Details</label>
              <textarea className="d-textarea" placeholder="Tell us what happened…" value={details} onChange={e => setDetails(e.target.value)}/>
            </div>
            <div className="d-modal-foot">
              <button className="d-btn d-btn-secondary" onClick={onClose}>Cancel</button>
              <button className="d-btn d-btn-primary" disabled={!details.trim()} onClick={() => onSubmit({ category, details })}>Submit Report</button>
            </div>
          </div>
        </div>
      );
    }

    /* Toasts */
    function ToastStack({ toasts }) {
      if (!toasts.length) return null;
      return (
        <div className="d-toast-wrap">
          {toasts.map(t => (
            <div key={t.id} className="d-toast">
              <div className="ico"><Icon.check/></div>
              <div className="body">
                <div className="title">{t.title}</div>
                {t.text && <div className="text">{t.text}</div>}
              </div>
            </div>
          ))}
        </div>
      );
    }

    /* The map */
    function MapPanel({ stations, selectedId, onSelect }) {
      const mapEl = useRef(null);
      const mapRef = useRef(null);
      const markersRef = useRef([]);
      const onSelectRef = useRef(onSelect);
      useEffect(() => { onSelectRef.current = onSelect; }, [onSelect]);
      const [status, setStatus] = useState("loading");
      const [mapReady, setMapReady] = useState(false);

      useEffect(() => {
        if (window.__gmapsReady) { setStatus("ready"); return; }
        if (window.__gmapsFailed) { setStatus("error"); return; }
        const onReady = () => setStatus("ready");
        const onErr   = () => setStatus("error");
        window.addEventListener("gmapsReady", onReady);
        window.addEventListener("gmapsError", onErr);
        const t = setTimeout(() => { if (!window.__gmapsReady) setStatus("error"); }, 10000);
        return () => { window.removeEventListener("gmapsReady", onReady); window.removeEventListener("gmapsError", onErr); clearTimeout(t); };
      }, []);

      useEffect(() => {
        if (status !== "ready" || !mapEl.current || mapRef.current) return;
        try {
          mapRef.current = new google.maps.Map(mapEl.current, {
            center: SYDNEY_CENTER,
            zoom: 16,
            mapTypeControl: false,
            streetViewControl: false,
            fullscreenControl: false,
            zoomControl: true,
            zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER },
          });
          setMapReady(true);
        } catch (e) { console.error("[map] init failed", e); setStatus("error"); }
      }, [status]);

      useEffect(() => {
        if (!mapReady || !mapRef.current) return;
        markersRef.current.forEach(m => m.setMap && m.setMap(null));
        markersRef.current = [];

        stations.forEach(s => {
          const cls = availabilityClass(s.bikes, s.capacity);
          const isSel = s.id === selectedId;
          const fill = isSel ? "#2D7FF9" : availabilityColor(cls);
          const W = isSel ? 96 : 84;
          const H = isSel ? 56 : 50;
          const svg =
            '<svg xmlns="http://www.w3.org/2000/svg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">' +
              '<defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%">' +
                '<feGaussianBlur in="SourceAlpha" stdDeviation="1.6"/><feOffset dy="2"/>' +
                '<feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>' +
                '<feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>' +
              '</filter></defs>' +
              '<g filter="url(#s)">' +
                '<rect x="2" y="4" rx="20" ry="20" width="' + (W - 12) + '" height="' + (H - 16) + '" fill="' + fill + '"/>' +
                '<polygon points="' + (W/2 - 7) + ',' + (H - 12) + ' ' + (W/2 + 7) + ',' + (H - 12) + ' ' + (W/2) + ',' + (H - 2) + '" fill="' + fill + '"/>' +
                '<circle cx="' + (isSel ? 24 : 22) + '" cy="' + ((H-12)/2 + 4) + '" r="' + (isSel ? 14 : 12) + '" fill="white"/>' +
                '<text x="' + (isSel ? 24 : 22) + '" y="' + ((H-12)/2 + 9) + '" text-anchor="middle" font-family="Arial,sans-serif" font-size="' + (isSel ? 13 : 11) + '" font-weight="700" fill="' + fill + '">B</text>' +
                '<text x="' + (isSel ? 60 : 54) + '" y="' + ((H-12)/2 + 9) + '" text-anchor="middle" font-family="Arial,sans-serif" font-size="' + (isSel ? 14 : 12) + '" font-weight="800" fill="white">' + s.bikes + '/' + s.capacity + '</text>' +
              '</g>' +
            '</svg>';
          const url = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);

          const marker = new google.maps.Marker({
            position: { lat: s.lat, lng: s.lng },
            map: mapRef.current,
            icon: {
              url,
              scaledSize: new google.maps.Size(W, H),
              anchor: new google.maps.Point(W/2, H - 2),
            },
            title: s.name,
            zIndex: isSel ? 1000 : 100,
          });
          marker.addListener("click", () => onSelectRef.current && onSelectRef.current(s.id));
          markersRef.current.push(marker);
        });

        const sel = stations.find(s => s.id === selectedId);
        if (sel && mapRef.current) mapRef.current.panTo({ lat: sel.lat, lng: sel.lng });
      }, [mapReady, stations, selectedId]);

      const recenter = () => {
        if (mapRef.current) { mapRef.current.panTo(SYDNEY_CENTER); mapRef.current.setZoom(16); }
      };

      return (
        <div className="d-map-wrap">
          <div ref={mapEl} id="d-map"/>
          {status === "loading" && (
            <div className="d-map-loading">
              <div className="d-map-spin"/>
              <div>Loading the map…</div>
            </div>
          )}
          {status === "error" && (
            <div className="d-map-error">
              <Icon.alert/>
              <div style={{maxWidth: 380}}>
                We couldn't load Google Maps. Check that the Maps JavaScript API is enabled in Google Cloud Console, that billing is set up, and that the API key permits the localhost domain.
              </div>
            </div>
          )}
          {status === "ready" && (
            <button className="d-recenter" onClick={recenter} title="Re-centre on campus"><Icon.target/></button>
          )}
          <div className="d-legend">
            <h4>Legend</h4>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#22C55E"}}/>High availability (10+)</div>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#84CC16"}}/>Medium availability (5–9)</div>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#2D7FF9"}}/>Low availability (&lt;5)</div>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#94A3B8"}}/>No bikes available</div>
          </div>
        </div>
      );
    }

    /* App */
    function App() {
      const user = useMemo(() => {
        try { return JSON.parse(localStorage.getItem("cbs_user") || "null"); } catch (_) { return null; }
      }, []);
      const firstName = (user && (user.full_name || user.name) || "Rider").split(" ")[0];

      const [activeSide, setActiveSide] = useState("map");
      const [activeNav, setActiveNav]   = useState("home");
      const [stations, setStations] = useState(STATIONS);
      const [selectedId, setSelectedId] = useState("FL-001");
      const [search, setSearch] = useState("");
      const [filter, setFilter] = useState("all");
      const [showFilter, setShowFilter] = useState(false);

      const [notifications, setNotifications] = useState(() => seedNotifications(firstName));
      const unread = notifications.filter(n => n.unread).length;
      const [notifOpen, setNotifOpen] = useState(false);
      const [userOpen, setUserOpen] = useState(false);

      const [bookingFor, setBookingFor] = useState(null);
      const [reportFor,  setReportFor]  = useState(null);
      const [toasts, setToasts] = useState([]);

      // Persisted bookings — drives double-booking prevention
      const [bookings, setBookings] = useState(() => {
        try {
          const raw = JSON.parse(localStorage.getItem("cbs_bookings") || "[]");
          // Filter out bookings that already ended (clean up stale data)
          return raw.filter(b => new Date(b.end).getTime() > Date.now());
        } catch (_) { return []; }
      });
      useEffect(() => {
        try { localStorage.setItem("cbs_bookings", JSON.stringify(bookings)); } catch (_) {}
      }, [bookings]);

      const filtered = useMemo(() => {
        const q = search.trim().toLowerCase();
        return stations.filter(s => {
          if (q && !(s.name.toLowerCase().includes(q) || s.address.toLowerCase().includes(q) || s.id.toLowerCase().includes(q))) return false;
          if (filter !== "all" && availabilityClass(s.bikes, s.capacity) !== filter) return false;
          return true;
        });
      }, [stations, search, filter]);

      const selected = stations.find(s => s.id === selectedId) || stations[0];

      useEffect(() => {
        if (!notifOpen && !showFilter && !userOpen) return;
        const close = () => { setNotifOpen(false); setShowFilter(false); setUserOpen(false); };
        document.addEventListener("click", close);
        return () => document.removeEventListener("click", close);
      }, [notifOpen, showFilter, userOpen]);

      const pushNotif = (kind, title, text) => {
        const n = { id: "n" + Date.now() + Math.random().toString(36).slice(2,6), kind, title, text, when: Date.now(), unread: true };
        setNotifications(prev => [n, ...prev]);
      };
      const pushToast = (title, text) => {
        const id = "t" + Date.now() + Math.random();
        setToasts(prev => [...prev, { id, title, text }]);
        setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), 4000);
      };

      const onLogout = () => {
        try { localStorage.removeItem("cbs_token"); localStorage.removeItem("cbs_user"); } catch(_){}
        window.location.replace("../../login.html?loggedout=1");
      };
      const onRefresh = () => {
        setStations(prev => prev.map(s => {
          const delta = Math.floor(Math.random()*5) - 2;
          const next = Math.max(0, Math.min(s.capacity, s.bikes + delta));
          return { ...s, bikes: next };
        }));
        pushToast("Stations refreshed", "Live availability updated.");
      };
      const onConfirmBooking = async (b) => {
        // b = { stationId, stationName, start, end, duration, type }
        const payStartMs = new Date(b.start).getTime();
        const payEndMs = new Date(b.end).getTime();
        const payClash = bookings.find(x => new Date(x.start).getTime() < payEndMs && payStartMs < new Date(x.end).getTime());
        if (payClash) {
          pushToast("Booking blocked", "That window overlaps another booking.");
          return;
        }

        const token = localStorage.getItem("cbs_token");
        if (!token) {
          pushToast("Login required", "Please log in before booking a bike.");
          window.location.replace("../../login.html");
          return;
        }

        const res = await fetch("/api/payments/create-checkout-session", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ booking: b }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.url) {
          pushToast("Payment unavailable", data.error || "Could not start Stripe Checkout.");
          return;
        }

        setBookingFor(null);
        window.location.href = data.url;
        return;
      };

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const payment = params.get("payment");
        const sessionId = params.get("session_id");

        if (payment === "cancelled") {
          pushToast("Payment cancelled", "No booking was created.");
          window.history.replaceState(null, "", window.location.pathname);
          return;
        }
        if (payment !== "success" || !sessionId) return;

        const token = localStorage.getItem("cbs_token");
        if (!token) {
          pushToast("Login required", "Please log in again to finish your booking.");
          return;
        }

        let paidSessions = [];
        try { paidSessions = JSON.parse(localStorage.getItem("cbs_paid_sessions") || "[]"); } catch (_) {}
        if (paidSessions.includes(sessionId)) {
          window.history.replaceState(null, "", window.location.pathname);
          return;
        }

        fetch(`/api/payments/session/${encodeURIComponent(sessionId)}`, {
          headers: { Authorization: `Bearer ${token}` },
        })
          .then(r => r.json().then(data => ({ ok: r.ok, data })))
          .then(async ({ ok, data }) => {
            if (!ok || !data.paid || !data.booking) {
              pushToast("Payment not verified", data.error || "Stripe did not confirm this payment.");
              return;
            }

            const b = data.booking;
            await fetch("/api/bookings/create-from-payment", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify({ booking: b, sessionId }),
            }).catch(() => null);

            const startMs = new Date(b.start).getTime();
            const endMs = new Date(b.end).getTime();
            const clash = bookings.find(x => new Date(x.start).getTime() < endMs && startMs < new Date(x.end).getTime());
            if (clash) {
              pushToast("Booking blocked", "Payment succeeded, but that time now overlaps another booking.");
              return;
            }

            const record = { id: "bk_" + Date.now(), createdAt: Date.now(), paymentSessionId: sessionId, paymentStatus: "paid", ...b };
            setBookings(prev => [...prev, record]);
            setStations(prev => prev.map(s => s.id === b.stationId ? { ...s, bikes: Math.max(0, s.bikes - 1) } : s));

            const dtTxt = new Date(b.start).toLocaleString("en-AU", { weekday:"short", day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });
            const costTxt = b.cost != null ? ` - ${fmtPrice(b.cost)}` : "";
            pushNotif("success", "Booking confirmed after payment", `${b.stationName} - ${dtTxt} - ${b.duration} min${costTxt}`);
            pushToast("Payment received - booking confirmed!", `${b.stationName} - ${dtTxt}${costTxt}`);

            paidSessions.push(sessionId);
            localStorage.setItem("cbs_paid_sessions", JSON.stringify(paidSessions));
          })
          .catch(() => pushToast("Payment check failed", "Could not verify the Stripe payment."))
          .finally(() => {
            window.history.replaceState(null, "", window.location.pathname);
          });
      }, []);

      const onSubmitReport = ({ category, details }) => {
        const station = reportFor;
        setReportFor(null);
        const more = details.length > 80 ? details.slice(0,80) + "…" : details;
        pushNotif("warn", "Issue submitted", `${category} — ${station ? station.name : "general"}: ${more}`);
        pushToast("Report submitted", "Thanks — we'll look into it.");
      };

      const markAllRead = () => setNotifications(prev => prev.map(n => ({ ...n, unread: false })));
      const clickNotif  = (n) => setNotifications(prev => prev.map(x => x.id === n.id ? { ...x, unread: false } : x));

      const availPct = selected ? Math.round((selected.bikes / selected.capacity) * 100) : 0;
      const filterLabel = ({ all: "", high: " · High", medium: " · Medium", low: " · Low", empty: " · Empty" })[filter];

      return (
        <div className="d-shell">
          {/* TOP BAR */}
          <header className="d-topbar">
            <a href="#" className="d-brand" title="Dashboard"
               onClick={(e) => { e.preventDefault(); setActiveNav("home"); setActiveSide("map"); window.scrollTo({ top: 0, behavior: "smooth" }); }}>
              <span className="d-brand-logo"><Icon.logo/></span>
              <span className="d-brand-name">Campus <span className="accent">Bike Sharing</span></span>
            </a>
            <nav className="d-nav">
              <button className={"d-nav-item" + (activeNav === "home" ? " active" : "")} onClick={() => setActiveNav("home")}>
                <Icon.home/><span className="d-nav-text">Home</span>
              </button>
              <button className={"d-nav-item" + (activeNav === "bookings" ? " active" : "")} onClick={() => { window.location.href = "Student_MyBooking.html"; }}>
                <Icon.calendar/><span className="d-nav-text">My Bookings</span>
              </button>
              <div className="d-notif-wrap">
                <button className="d-icon-btn" onClick={(e) => { e.stopPropagation(); setNotifOpen(v => !v); setUserOpen(false); }} title="Notifications">
                  <Icon.bell/>
                  {unread > 0 && <span className="badge">{unread > 9 ? "9+" : unread}</span>}
                </button>
                {notifOpen && (
                  <NotifPanel notifications={notifications} onMarkAll={markAllRead} onClickItem={clickNotif}/>
                )}
              </div>
              <div className="d-user-wrap">
                <button className={"d-user-btn" + (userOpen ? " open" : "")}
                        onClick={(e) => { e.stopPropagation(); setUserOpen(v => !v); setNotifOpen(false); }}
                        title="Account">
                  <span className="d-user-avatar">{firstName.charAt(0).toUpperCase()}</span>
                </button>
                {userOpen && (
                  <UserMenu user={user} firstName={firstName}
                            onAction={(a) => {
                              setUserOpen(false);
                              if (a === "profile") window.location.href = "Student_profile.html";
                              else if (a === "help" || a === "support") window.location.href = "Student_need_help.html";
                              else if (a === "bookings") window.location.href = "Student_MyBooking.html";
                              else if (a === "rides") window.location.href = "Student_ride_history.html";
                              else pushToast("Coming soon", a.charAt(0).toUpperCase() + a.slice(1) + " page is under construction.");
                            }}
                            onLogout={onLogout}/>
                )}
              </div>
            </nav>
          </header>

          <div className="d-main">
            {/* SIDEBAR */}
            <aside className="d-sidebar">
              <button className={"d-side-btn" + (activeSide === "map" ? " active" : "")} title="Map"      onClick={() => setActiveSide("map")}><Icon.map/></button>
              <button className={"d-side-btn" + (activeSide === "cal" ? " active" : "")} title="Bookings" onClick={() => { window.location.href = "Student_MyBooking.html"; }}><Icon.calendar/></button>
              <button className={"d-side-btn" + (activeSide === "bike" ? " active" : "")} title="My rides" onClick={() => { window.location.href = "Student_ride_history.html"; }}><Icon.bike/></button>
              <button className={"d-side-btn" + (activeSide === "profile" ? " active" : "")} title="Profile" onClick={() => { window.location.href = "Student_profile.html"; }}><Icon.person/></button>
              <button className={"d-side-btn" + (activeSide === "help" ? " active" : "")} title="Help"     onClick={() => { window.location.href = "Student_need_help.html"; }}><Icon.help/></button>
            </aside>

            {/* CONTENT */}
            <main className="d-content">
              {/* LEFT */}
              <section className="d-left">
                <div className="d-card">
                  <div className="d-section-h"><h2>Station Details</h2></div>
                  <div className="d-station-body">
                    <div className="d-station-head">
                      <div className="d-station-icon"><Icon.building/></div>
                      <div className="d-station-title-row" style={{flex:1, minWidth:0}}>
                        <h3>{selected.name}</h3>
                        <span className="d-status-pill"><span style={{width:6, height:6, borderRadius:50, background:"currentColor"}}/>Active</span>
                        <div className="meta"><Icon.pin/>{selected.address}</div>
                        <div className="meta"><Icon.walk/>Distance: ~{selected.walkMin} min walk</div>
                      </div>
                    </div>

                    <div className="d-availability-card">
                      <div>
                        <div className="label">Available Bikes</div>
                        <div className="count">{selected.bikes} <span className="total">/ {selected.capacity}</span></div>
                        <div className="d-progress"><div style={{width: availPct + "%"}}/></div>
                        <div className="pct">{availPct}% available</div>
                      </div>
                      <div className="d-availability-icon"><Icon.bike s={28}/></div>
                    </div>

                    <div className="d-stat-list">
                      <div className="d-stat-row">
                        <span className="lhs"><span className="icn"><Icon.capacity/></span> Total Capacity</span>
                        <span className="val">{selected.capacity} Bikes</span>
                      </div>
                      <div className="d-stat-row">
                        <span className="lhs"><span className="icn"><Icon.bike s={16}/></span> Bike Type</span>
                        <span className="val">{selected.type}</span>
                      </div>
                      <div className="d-stat-row">
                        <span className="lhs"><span className="icn"><Icon.clock/></span> Operating Hours</span>
                        <span className="val">{selected.hours}</span>
                      </div>
                      <div className="d-stat-row">
                        <span className="lhs"><span className="icn"><Icon.hash/></span> Station ID</span>
                        <span className="val">{selected.id}</span>
                      </div>
                    </div>

                    <button className="d-cta" disabled={selected.bikes === 0} onClick={() => setBookingFor(selected)}>
                      <Icon.bike s={20}/> {selected.bikes === 0 ? "No bikes available" : "Book Bike"}
                    </button>
                  </div>
                </div>

                <div className="d-card">
                  <div className="d-section-h"><h2>Quick Actions</h2></div>
                  <div className="d-qa-grid">
                    <button className="d-qa-btn d-qa-refresh" onClick={onRefresh}>
                      <span className="icn"><Icon.refresh/></span>
                      Refresh Stations
                    </button>
                    <button className="d-qa-btn d-qa-issue" onClick={() => setReportFor(selected)}>
                      <span className="icn"><Icon.alert/></span>
                      Report an Issue
                    </button>
                  </div>
                </div>
              </section>

              {/* RIGHT */}
              <section className="d-right">
                <div className="d-card d-map-card">
                  <div className="d-map-head">
                    <h2><Icon.map/>Interactive Map</h2>
                    <div className="d-map-tools">
                      <div className="d-search">
                        <Icon.search/>
                        <input
                          placeholder="Search stations…"
                          value={search}
                          onChange={e => setSearch(e.target.value)}
                        />
                      </div>
                      <button className={"d-filter-btn" + (filter !== "all" ? " active" : "")} onClick={(e) => { e.stopPropagation(); setShowFilter(v => !v); }}>
                        <Icon.filter/>Filters{filterLabel}
                      </button>
                      {showFilter && (
                        <div className="d-filter-pop" onClick={e => e.stopPropagation()}>
                          {[
                            { v: "all",    label: "All stations" },
                            { v: "high",   label: "High availability" },
                            { v: "medium", label: "Medium availability" },
                            { v: "low",    label: "Low availability" },
                            { v: "empty",  label: "Empty" },
                          ].map(o => (
                            <button key={o.v} className={filter === o.v ? "sel" : ""} onClick={() => { setFilter(o.v); setShowFilter(false); }}>
                              {filter === o.v ? <Icon.check/> : <span style={{width:18}}/>} {o.label}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                  <MapPanel stations={filtered} selectedId={selectedId} onSelect={setSelectedId}/>
                </div>
              </section>
            </main>
          </div>

          {/* MODALS */}
          {bookingFor && <BookingModal station={bookingFor} existingBookings={bookings} onClose={() => setBookingFor(null)} onConfirm={onConfirmBooking}/>}
          {reportFor  && <ReportModal  station={reportFor}  onClose={() => setReportFor(null)}  onSubmit={onSubmitReport}/>}

          <ToastStack toasts={toasts}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
