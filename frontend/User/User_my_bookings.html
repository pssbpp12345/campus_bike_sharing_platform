          setEndFor(null);
          const amt = Number((data && (data.totalAmount ?? data.amount)) || 0);
          const mins = Number((data && data.duration) || 0);
          pushToast(
            "Ride ended successfully",
            `Charged $${amt.toFixed(2)} to your saved ${data && data.card ? `${data.card.brand} ending ${data.card.last4}` : "card"} for a ${mins} min ride.`
          );
          loadAll();
          setEndBusy(false);
        } catch (e) {
          pushToast("Could not end ride", e.message || "Please try again.", "error");
          setEndBusy(false);
        }
      };

      /* Manual start for a "ready_to_start" upcoming booking */
      const onStartRide = async (booking) => {
        if (!booking || !booking.bookingId) return;
        try {
          await window.cbsApi(`/api/bookings/${booking.bookingId}/start`, {
            method: "POST",
            body: JSON.stringify({}),
          });
          pushToast("Ride started", `Bike ${booking.bikeCode} is now active.`, "success");
          loadAll();
        } catch (e) {
          // Surface the blocking booking id when the backend returns one
          // so we can spot stale active rides that the UI isn't showing.
          const blocking = e && e.body && e.body.activeBooking;
          const detail = blocking
            ? ` (Blocked by booking #${blocking.bookingId}, bike ${blocking.bikeId})`
            : "";
          pushToast("Could not start ride", (e.message || "Please try again.") + detail, "error");
          // Refresh so any stale 'active' row the backend just cleared is reflected
          loadAll();
        }
      };

      /* Cancel */
      const onCancel = (booking) => setCancelFor(booking);
      const confirmCancel = async (booking) => {
        if (!booking || !booking.bookingId) return;
        setCancelBusy(true);
        try {
          await window.cbsApi(`/api/user/bookings/${booking.bookingId}/cancel`, { method: "POST", body: JSON.stringify({}) });
          setCancelFor(null);
          pushToast("Booking cancelled", `Booking #${booking.bookingId} has been cancelled.`);
          loadAll();
        } catch (e) {
          pushToast("Could not cancel", e.message || "Please try again.", "error");
        } finally {
          setCancelBusy(false);
        }
      };

      /* Report issue → Need Help page */
      const onReport = (ride) => {
        const id = ride && ride.bookingId ? `?bookingId=${ride.bookingId}` : "";
        window.location.href = "User_need_help.html" + id;
      };

      const onJumpActive = () => {
        const el = document.querySelector("[data-testid='active-card']") || document.querySelector("[data-testid='active-empty']");
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      };

      return (
        <div className="cbs-shell">
          <window.UserTopbar active="bookings" user={user} onLogout={logout} pushToast={pushToast}/>
          <div className="cbs-main">
            <window.UserSidebar active="bookings"/>
            <main className="cbs-content">
              {/* Page head */}
              <div className="mb-page-head">
                <div>
                  <h1>My Bookings</h1>
                  <p>Manage your rides and bookings</p>
                </div>
                <a href="User_dashboard.html" className="mb-book-another" data-testid="book-another">
                  <Icon.bike s={16}/> Book Another Bike
                </a>
              </div>

              {/* Stats */}
              <SummaryStats summary={summary} loading={loadingSummary} onJumpActive={onJumpActive}/>

              {/* Active + Upcoming */}
              <div className="mb-row">
                <ActiveRideCard
                  ride={active}
                  loading={loadingActive}
                  onEnd={onEnd}
                  onViewRoute={setRouteFor}
                  onViewDetails={setDetailFor}
                  onReport={onReport}
                  pushToast={pushToast}
                />
                <UpcomingCard
                  items={upcoming}
                  loading={loadingUpcoming}
                  onCancel={onCancel}
                  onStart={onStartRide}
                  onViewDetails={setDetailFor}
                />
              </div>

              {/* Quick actions */}
              <QuickActions pushToast={pushToast}/>
            </main>
          </div>

          {routeFor && <RouteMapModal pickup={routeFor.pickup} destination={routeFor.destination} ride={routeFor.ride} elapsedMs={routeFor.elapsedMs} hasFixedWindow={routeFor.hasFixedWindow} onClose={() => setRouteFor(null)}/>}
          {detailFor && <DetailModal booking={detailFor} onClose={() => setDetailFor(null)}/>}
          {cancelFor && <CancelModal booking={cancelFor} busy={cancelBusy} onClose={() => setCancelFor(null)} onConfirm={confirmCancel}/>}
          {endFor && <EndRideModal ride={endFor} busy={endBusy} onClose={() => { if (!endBusy) setEndFor(null); }} onConfirm={confirmEnd}/>}

          <window.UserToastStack toasts={toasts}/>
        </div>
      );
    }

    window.cbsLoadPublicSettings?.().then(applyPublicPricing).finally(() => {
      setTimeout(() => ReactDOM.createRoot(document.getElementById("root")).render(<App/>), 30);
    });
  </script>
</body>
</html>
