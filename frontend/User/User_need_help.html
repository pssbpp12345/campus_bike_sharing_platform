<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Need Help | Campus Bike Sharing</title>
  <link rel="stylesheet" href="../../Login.css">
  <link rel="stylesheet" href="user-shared.css">
  <link rel="stylesheet" href="user-premium.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script src="/api-config.js"></script>
  <script type="text/babel" data-presets="env,react" src="user-shared.js"></script>
  <script type="text/babel" data-presets="env,react">
    const { useEffect, useMemo, useState } = React;
    const Icon = window.UserIcons;

    const CATEGORIES = [
      { v: "booking",  label: "Booking issue", icon: <Icon.calendar/> },
      { v: "bike",     label: "Bike issue",    icon: <Icon.bike s={20}/> },
      { v: "payment",  label: "Payment issue", icon: <Icon.card/> },
      { v: "account",  label: "Account issue", icon: <Icon.user2/> },
      { v: "station",  label: "Station issue", icon: <Icon.station/> },
      { v: "other",    label: "Other",         icon: <Icon.more/> },
    ];

    function FaqAccordion({ faqs, search, category }) {
      const [openId, setOpenId] = useState(null);
      const filtered = useMemo(() => {
        const q = search.trim().toLowerCase();
        return faqs.filter(f => {
          if (category !== "all" && f.category.toLowerCase() !== CATEGORIES.find(c => c.v === category)?.label.split(" ")[0].toLowerCase()) return false;
          if (!q) return true;
          return f.q.toLowerCase().includes(q) || f.a.toLowerCase().includes(q);
        });
      }, [faqs, search, category]);

      if (filtered.length === 0) {
        return <div className="s-empty" style={{padding:"32px 16px"}}><div className="s-empty-icon"><Icon.search/></div><h3>No matching FAQs</h3><p>Try different keywords or submit a ticket below.</p></div>;
      }
      return (
        <div className="s-faq-list" data-testid="faq-list">
          {filtered.map(f => (
            <div key={f.id} className={"s-faq-item" + (openId === f.id ? " open" : "")}>
              <button className="s-faq-q" onClick={() => setOpenId(openId === f.id ? null : f.id)} data-testid={`faq-q-${f.id}`}>
                <span><span className="cat">{f.category}</span>{f.q}</span>
                <span className="chev"><Icon.chev/></span>
              </button>
              <div className="s-faq-a">{f.a}</div>
            </div>
          ))}
        </div>
      );
    }

    function TicketForm({ category, onSubmitted, pushToast }) {
      const [subject, setSubject] = useState(""); const [desc, setDesc] = useState("");
      const [priority, setPriority] = useState("medium");
      const [bookingId, setBookingId] = useState("");
      const [err, setErr] = useState(""); const [busy, setBusy] = useState(false);

      const submit = async (e) => {
        e.preventDefault(); setErr("");
        if (!category)                    return setErr("Please choose a category above.");
        if (subject.trim().length < 3)    return setErr("Subject is too short.");
        if (desc.trim().length < 10)      return setErr("Please describe your issue (10+ chars).");
        if (subject.length > 200)         return setErr("Subject is too long.");
        setBusy(true);
        try {
          await window.cbsApi("/api/support/tickets", {
            method: "POST",
            body: JSON.stringify({ category, subject: subject.trim(), description: desc.trim(), priority, bookingId: bookingId || null }),
          });
          setSubject(""); setDesc(""); setBookingId(""); setPriority("medium");
          pushToast("Ticket submitted", "We'll get back to you shortly.");
          onSubmitted();
        } catch (e2) { setErr(e2.message); }
        finally { setBusy(false); }
      };

      return (
        <form className="s-form" onSubmit={submit} data-testid="ticket-form">
          <div className="s-form-row"><label>Selected Category</label>
            <input className="d-input" value={category ? CATEGORIES.find(c => c.v === category)?.label || "" : ""} readOnly placeholder="Choose a category above" data-testid="ticket-category-display"/>
          </div>
          <div className="s-form-row"><label>Subject</label>
            <input className="d-input" value={subject} onChange={e => setSubject(e.target.value)} placeholder="Brief summary of the issue" maxLength={200} data-testid="ticket-subject"/>
            <div className="hint">{subject.length}/200</div>
          </div>
          <div className="s-form-row"><label>Priority</label>
            <select className="d-input" value={priority} onChange={e => setPriority(e.target.value)} data-testid="ticket-priority">
              <option value="low">Low</option><option value="medium">Medium</option>
              <option value="high">High</option><option value="urgent">Urgent</option>
            </select>
          </div>
          <div className="s-form-row"><label>Booking / Ride ID (optional)</label>
            <input className="d-input" value={bookingId} onChange={e => setBookingId(e.target.value.replace(/[^0-9]/g, ""))} placeholder="e.g. 17" data-testid="ticket-booking-id"/>
          </div>
          <div className="s-form-row"><label>Description</label>
            <textarea className="d-textarea" value={desc} onChange={e => setDesc(e.target.value)} placeholder="Tell us what happened, when, and any relevant details…" maxLength={5000} data-testid="ticket-description"/>
            <div className="hint">{desc.length}/5000</div>
          </div>
          {err && <div className="err" data-testid="ticket-error">{err}</div>}
          <button type="submit" className="d-btn d-btn-primary" disabled={busy || !category} data-testid="ticket-submit">
            {busy ? "Submitting…" : <><Icon.send/> Submit Ticket</>}
          </button>
        </form>
      );
    }

    function TicketStatus({ status }) {
      const map = {
        open:         { c: "info", label: "Open" },
        in_progress:  { c: "warn", label: "In Progress" },
        resolved:     { c: "ok",   label: "Resolved" },
        closed:       { c: "bad",  label: "Closed" },
      };
      const x = map[status] || { c: "info", label: status };
      return <span className={`s-status s-status-${x.c}`}>{x.label}</span>;
    }

    function App() {
      const { user, requireAuth, logout, pushToast, toasts } = window.useUserAuth();
      const [faqs, setFaqs] = useState([]);
      const [tickets, setTickets] = useState([]);
      const [search, setSearch] = useState("");
      const [selectedCat, setSelectedCat] = useState("");
      const [filterCat, setFilterCat] = useState("all");

      useEffect(() => { if (!requireAuth()) return; loadFaqs(); loadTickets(); }, []);

      const loadFaqs = async () => {
        try { const r = await fetch("/api/support/faq"); const d = await r.json(); setFaqs(d.faqs || []); } catch (_) {}
      };
      const loadTickets = async () => {
        try {
          const d = await window.cbsApi("/api/support/tickets");
          setTickets(d.tickets || []);
        } catch (_) {}
      };

      return (
        <div className="cbs-shell">
          <window.UserTopbar active="help" user={user} onLogout={logout} pushToast={pushToast}/>
          <div className="cbs-main">
            <window.UserSidebar active="help"/>
            <main className="cbs-content">
              <header className="s-page-head">
                <div><h1>Need Help?</h1><p>Search the FAQ, browse categories, or submit a support ticket.</p></div>
              </header>

              {/* Search */}
              <section className="d-card s-toolbar-card">
                <div className="d-search s-toolbar-search">
                  <Icon.search/>
                  <input placeholder="Search the FAQ…" value={search} onChange={e => setSearch(e.target.value)} data-testid="faq-search-input"/>
                </div>
              </section>

              {/* Categories grid */}
              <section className="d-card" data-testid="categories-card">
                <div className="s-section-h">
                  <h3>Pick a category</h3>
                  <button className="s-link-btn" onClick={() => { setSelectedCat(""); setFilterCat("all"); }} data-testid="clear-category-btn">Clear</button>
                </div>
                <div className="s-categories">
                  {CATEGORIES.map(c => (
                    <button key={c.v}
                      className={"s-cat-btn" + (selectedCat === c.v ? " active" : "")}
                      onClick={() => { setSelectedCat(c.v); setFilterCat(c.v); }}
                      data-testid={`cat-${c.v}`}>
                      <span className="icn">{c.icon}</span>
                      {c.label}
                    </button>
                  ))}
                </div>
              </section>

              <div className="s-help-grid">
                {/* FAQs */}
                <section className="d-card" data-testid="faq-card">
                  <div className="s-section-h"><h3>Frequently Asked Questions</h3></div>
                  <FaqAccordion faqs={faqs} search={search} category={filterCat}/>
                </section>

                {/* Form */}
                <section className="d-card" data-testid="submit-ticket-card">
                  <div className="s-section-h"><h3>Submit a Support Ticket</h3></div>
                  <TicketForm category={selectedCat} pushToast={pushToast} onSubmitted={loadTickets}/>
                </section>
              </div>

              {/* My tickets */}
              <section className="d-card" data-testid="my-tickets-card">
                <div className="s-section-h"><h3>My Support Tickets</h3><span className="s-muted">{tickets.length} total</span></div>
                {tickets.length === 0 ? (
                  <div className="s-empty">
                    <div className="s-empty-icon"><Icon.mail/></div>
                    <h3>No tickets yet</h3>
                    <p>Once you submit a ticket, it'll appear here with live status updates.</p>
                  </div>
                ) : (
                  <div className="s-ticket-list">
                    {tickets.map(t => (
                      <div key={t.id} className="s-ticket-card" data-testid={`ticket-${t.id}`}>
                        <div className="s-ticket-head">
                          <div className="subj">#{t.id} · {t.subject}</div>
                          <TicketStatus status={t.status}/>
                        </div>
                        <div className="s-ticket-meta">
                          <span style={{textTransform:"capitalize"}}>{t.category}</span>
                          <span>Priority: <strong style={{textTransform:"capitalize"}}>{t.priority}</strong></span>
                          {t.booking_id && <span>Booking #{t.booking_id}</span>}
                          <span>{new Date(t.created_at).toLocaleString("en-AU", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" })}</span>
                        </div>
                        <div style={{color:"var(--d-muted)", fontSize:13, whiteSpace:"pre-wrap"}}>{t.description}</div>
                        {t.admin_response && (
                          <div style={{marginTop:8, padding:"10px 12px", background:"var(--d-green-soft)", color:"var(--d-green-d)", borderRadius:10, fontSize:13}}>
                            <strong>Support: </strong>{t.admin_response}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </section>
            </main>
          </div>
          <window.UserToastStack toasts={toasts}/>
        </div>
      );
    }

    setTimeout(() => ReactDOM.createRoot(document.getElementById("root")).render(<App/>), 50);
  </script>
</body>
</html>
