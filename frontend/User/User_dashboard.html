      );
    }

    /* Live timer + End Ride controls for an in-progress Ride Now booking */
    function ActiveRideBanner({ ride, ending, onEnd }) {
      const [now, setNow] = useState(Date.now());
      useEffect(() => {
        const t = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(t);
      }, []);
      const startMs = new Date(ride.start_time).getTime();
      const elapsedSec = Math.max(0, Math.floor((now - startMs) / 1000));
      const mins = Math.floor(elapsedSec / 60);
      const secs = elapsedSec % 60;
      const hh = Math.floor(mins / 60);
      const mm = mins % 60;
      const timer = hh > 0
        ? `${hh}:${String(mm).padStart(2,"0")}:${String(secs).padStart(2,"0")}`
        : `${String(mm).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
      const unlock = Number(ride.unlock_fee || PRICING.unlockFee);
      const perMin = Number(ride.per_minute_fee || PRICING.perMinuteFee);
      const running = unlock + Math.max(1, Math.ceil(elapsedSec / 60)) * perMin;
      const status = ride.status || ride.ride_status || "active";
      const isPending = status === "pending";
      return (
        <div className="d-active-ride" role="status" aria-label="Active ride">
          <div className="ar-info">
            <span className="ar-eyebrow"><span className="dot"/>{isPending ? "Reservation held" : "Ride in progress"}</span>
            <h3>{ride.bike_code || "Your bike"} - {ride.pickup_station || ride.start_station || "Pickup"}</h3>
            <div className="ar-timer">{timer}</div>
            <div className="ar-cost">Running total ${running.toFixed(2)} - unlock ${unlock.toFixed(2)} + ${perMin.toFixed(2)}/min</div>
            <div className="ar-meta">
              <span>Bike type: {ride.bike_type || "Standard"}</span>
              <span>Booking #{ride.booking_id}</span>
            </div>
          </div>
          <div className="ar-actions">
            <button className="ar-end" onClick={onEnd} disabled={ending || isPending}>
              {ending ? "Opening Stripe..." : (isPending ? "Starts at pickup time" : "End Ride & Pay")}
            </button>
            <a className="ar-cancel" href="./User_my_bookings.html">View booking</a>
          </div>
        </div>
      );
    }

    /* App */
    function App() {
      const [user, setUser] = useState(() => {
        try { return JSON.parse(localStorage.getItem("cbs_user") || "null"); } catch (_) { return null; }
      });
      const [, setSettingsTick] = useState(0);
      // Stay in sync with profile/avatar updates from this tab and other tabs
      useEffect(() => {
        const onStorage = (ev) => {
          if (ev.key === "cbs_user") {
            try { setUser(ev.newValue ? JSON.parse(ev.newValue) : null); } catch (_) {}
          }
        };
        const onUserUpdated = (ev) => {
          if (ev && ev.detail) setUser(ev.detail);
          else { try { setUser(JSON.parse(localStorage.getItem("cbs_user") || "null")); } catch (_) {} }
        };
        // Also refresh from server on mount, but MERGE with the cached user so
        // a stale backend (one that doesn't return avatar_url) can't wipe the
        // profile picture from localStorage. /api/profile always carries the
        // avatar so we hit that as a fallback when the cache is incomplete.
        const token = localStorage.getItem("cbs_token");
        if (token) {
          fetch("/api/auth/me", { headers: { Authorization: "Bearer " + token } })
            .then(r => r.ok ? r.json() : null)
            .then(d => {
              if (d && d.user) {
                let cached = {};
                try { cached = JSON.parse(localStorage.getItem("cbs_user") || "{}"); } catch (_) {}
                const merged = { ...cached, ...d.user };
                // Preserve locally-set avatar_url if the server didn't include the key
                if (cached.avatar_url && !Object.prototype.hasOwnProperty.call(d.user, "avatar_url")) {
                  merged.avatar_url = cached.avatar_url;
                }
                localStorage.setItem("cbs_user", JSON.stringify(merged));
                setUser(merged);
                // If still no avatar_url after the /me call, backfill from /api/profile
                if (!merged.avatar_url) {
                  fetch("/api/profile", { headers: { Authorization: "Bearer " + token } })
                    .then(r => r.ok ? r.json() : null)
                    .then(pd => {
                      if (pd && pd.user) {
                        const u2 = { ...merged, ...pd.user };
                        localStorage.setItem("cbs_user", JSON.stringify(u2));
                        setUser(u2);
                      }
                    })
                    .catch(() => {});
                }
              }
            })
            .catch(() => {});
        }
        window.addEventListener("storage", onStorage);
        window.addEventListener("cbs:user-updated", onUserUpdated);
        window.cbsLoadPublicSettings?.().then((settings) => {
          applyPublicPricing(settings);
          setSettingsTick((v) => v + 1);
          if (settings?.maintenanceMode) pushToast("Maintenance mode", "Bookings are temporarily restricted by the administrator.", "warning");
        });
        const onSettings = (event) => {
          applyPublicPricing(event.detail);
          setSettingsTick((v) => v + 1);
        };
        window.addEventListener("cbs:settings-updated", onSettings);
        return () => {
          window.removeEventListener("storage", onStorage);
          window.removeEventListener("cbs:user-updated", onUserUpdated);
          window.removeEventListener("cbs:settings-updated", onSettings);
        };
      }, []);
      const firstName = (user && (user.full_name || user.name) || "Rider").split(" ")[0];

      const [activeSide, setActiveSide] = useState("map");
      const [activeNav, setActiveNav]   = useState("home");
      // Start empty — real stations come from /api/user/stations on mount.
      // (The old hardcoded STATIONS array was used as demo data and its names
      // didn't match the DB seed, causing the "station not available" booking
      // error. Now we always book against real DB stations with real IDs.)
      const [stations, setStations] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [mapBikes, setMapBikes] = useState([]);
      const [showMapBikes, setShowMapBikes] = useState(true);
      const [showActiveMapBikes, setShowActiveMapBikes] = useState(true);

      // Map a DB station row into the dashboard's station shape
      const mapDbStation = (s) => ({
        id:        String(s.id),                                  // numeric DB id as string
        name:      s.station_name,
        address:   s.address || s.campus_zone || "",
        lat:       Number(s.latitude),
        lng:       Number(s.longitude),
        bikes:     Number(s.available_bikes || 0),
        capacity:  Number(s.capacity || 0),
        type:      "Standard",
        hours:     "6:00 AM – 10:00 PM",
        walkMin:   Math.max(1, Math.round(2 + Math.random()*6)),
      });

      const mapDbBike = (b) => ({
        id: String(b.id),
        bikeCode: b.bikeCode || b.bike_code || `Bike ${b.id}`,
        type: b.type || b.model || "Standard",
        status: b.status || "available",
        rawStatus: b.rawStatus || b.raw_status || b.status || "available",
        stationId: String(b.stationId ?? b.station_id ?? ""),
        stationName: b.stationName || b.station_name || "Campus station",
        stationLatitude: Number(b.stationLatitude ?? b.station_latitude),
        stationLongitude: Number(b.stationLongitude ?? b.station_longitude),
        batteryLevel: b.batteryLevel ?? b.battery_level ?? null,
        condition: b.condition || "",
      });

      const loadMapBikes = React.useCallback(() => {
        const token = localStorage.getItem("cbs_token");
        if (!token) return Promise.resolve([]);
        return fetch("/api/user/map-bikes?limit=600", { headers: { Authorization: "Bearer " + token } })
          .then(r => r.ok ? r.json() : Promise.reject(new Error("Could not load bike markers.")))
          .then(d => {
            const list = (d.bikes || []).map(mapDbBike).filter(b =>
              b.stationId && Number.isFinite(b.stationLatitude) && Number.isFinite(b.stationLongitude)
            );
            setMapBikes(list);
            return list;
          })
          .catch(() => {
            setMapBikes([]);
            return [];
          });
      }, []);

      // Load the real stations from the DB on mount
      useEffect(() => {
        const token = localStorage.getItem("cbs_token");
        if (!token) return;
        fetch("/api/user/stations", { headers: { Authorization: "Bearer " + token } })
          .then(r => r.ok ? r.json() : { stations: [] })
          .then(d => {
            const list = (d.stations || []).map(mapDbStation);
            if (list.length === 0) return;
            setStations(list);
            setSelectedId(prev => prev || list[0].id);
          })
          .catch(() => {});
      }, []);
      useEffect(() => {
        loadMapBikes();
        const t = setInterval(loadMapBikes, 30000);
        return () => clearInterval(t);
      }, [loadMapBikes]);
      const [search, setSearch] = useState("");
      const [filter, setFilter] = useState("all");
      const [showFilter, setShowFilter] = useState(false);

      // Local notification state is still used internally by the booking-success
      // flow (pushNotif) to trigger refreshes — the actual bell UI is rendered by
      // the shared topbar (window.UserTopbar), which keeps its own state.
      const [notifications, setNotifications] = useState([]);

      // Load notifications from the database — same source every page uses.
      // We merge instead of replace so any local optimistic "local-*" rows that
      // haven't been written to the DB yet (e.g. just after payment) survive.
      const loadNotifs = React.useCallback(() => {
        const token = localStorage.getItem("cbs_token");
        if (!token) return;
        const map = (n) => ({
          id: n.id,
          kind: n.kind === "warning" ? "warn" : (n.kind || "info"),
          title: n.title,
          text: n.message || "",
          when: new Date(n.created_at).getTime(),
          unread: !n.is_read,
        });
        fetch("/api/notifications", { headers: { Authorization: "Bearer " + token } })
          .then(r => r.ok ? r.json() : { notifications: [] })
          .then(d => {
            const dbList = (d.notifications || []).map(map);
            setNotifications(prev => {
              // Keep any local-only items (id starts with "local-") that don't
              // yet have a matching DB row by title.
              const dbTitles = new Set(dbList.map(n => n.title));
              const localOnly = prev.filter(n =>
                typeof n.id === "string" && n.id.startsWith("local-") && !dbTitles.has(n.title)
              );
              return [...localOnly, ...dbList];
            });
          })
          .catch(() => {});
      }, []);
      useEffect(() => {
        loadNotifs();
        const t = setInterval(loadNotifs, 30000);
        return () => clearInterval(t);
      }, [loadNotifs]);

      const [bookingFor, setBookingFor] = useState(null);
      const [reportFor,  setReportFor]  = useState(null);

      // Welcome modal — shown once per browser session after login
      const [showWelcome, setShowWelcome] = useState(false);
      useEffect(() => {
        try {
          const seen = sessionStorage.getItem("cbs_welcome_seen");
          if (!seen && localStorage.getItem("cbs_token")) {
            // delay slightly so the dashboard animates in first
            const t = setTimeout(() => setShowWelcome(true), 350);
            return () => clearTimeout(t);
          }
        } catch (_) {}
      }, []);
      const closeWelcome = () => {
        try { sessionStorage.setItem("cbs_welcome_seen", "1"); } catch (_) {}
        setShowWelcome(false);
      };
      const [toasts, setToasts] = useState([]);

      // Persisted bookings — drives double-booking prevention
      const [bookings, setBookings] = useState(() => {
        try {
          const raw = JSON.parse(localStorage.getItem("cbs_bookings") || "[]");
          // Filter out bookings that already ended (clean up stale data)
          return raw.filter(b => new Date(b.end).getTime() > Date.now());
        } catch (_) { return []; }
      });
      useEffect(() => {
        try { localStorage.setItem("cbs_bookings", JSON.stringify(bookings)); } catch (_) {}
      }, [bookings]);
      const [bookingWindows, setBookingWindows] = useState([]);
      const loadBookingWindows = React.useCallback(() => {
        const token = localStorage.getItem("cbs_token");
        if (!token) return;
        window.cbsApi("/api/user/bookings/upcoming")
          .then(d => setBookingWindows(Array.isArray(d && d.upcoming) ? d.upcoming : []))
          .catch(() => {});
      }, []);
      useEffect(() => {
        loadBookingWindows();
        const t = setInterval(loadBookingWindows, 30000);
        return () => clearInterval(t);
      }, [loadBookingWindows]);

      // ── Active ride (Ride Now / PAYG reservation) ──
      const [activeRide, setActiveRide] = useState(null);
      const [endingRide, setEndingRide] = useState(false);
      const loadActiveRide = React.useCallback(() => {
        const token = localStorage.getItem("cbs_token");
        if (!token) return;
        fetch("/api/bookings/active", { headers: { Authorization: "Bearer " + token } })
          .then(r => r.ok ? r.json() : { booking: null })
          .then(d => setActiveRide(d.booking || null))
          .catch(() => {});
      }, []);
      useEffect(() => {
        loadActiveRide();
        const t = setInterval(loadActiveRide, 20000);
        return () => clearInterval(t);
      }, [loadActiveRide]);

      const onEndRide = async () => {
        if (!activeRide || endingRide) return;
        setEndingRide(true);
        try {
          const data = await window.cbsApi("/api/payments/charge-payg-final", {
            method: "POST",
            body: JSON.stringify({ bookingId: activeRide.booking_id }),
          });
          if (data && data.url) {
            window.location.href = data.url;
            return;
          }
          if (data && data.autoCharged) {
            pushToast("Ride complete!", `$${Number(data.amount || 0).toFixed(2)} was charged to your saved card for ${data.duration || 0} min.`);
            loadActiveRide && loadActiveRide();
            loadMapBikes && loadMapBikes();
            setEndingRide(false);
            return;
          }
          throw new Error("Could not start the payment for this ride.");
        } catch (err) {
          pushToast("Could not end ride", err.message || "Try again in a moment.");
          setEndingRide(false);
        }
      };

      // ── Geolocation (ask once, then remember) ──
      // Use the Permissions API and sessionStorage so we never re-prompt the
      // user once they've granted or denied. Location is only used to compute
      // walking distance to stations — never to scatter bikes.
      const [userLoc, setUserLoc] = useState(() => {
        try { const raw = sessionStorage.getItem("cbs_user_loc"); if (raw) return JSON.parse(raw); }
        catch (_) {}
        return null;
      });
      const [locStatus, setLocStatus] = useState(() => {
        try { return sessionStorage.getItem("cbs_loc_status") || "idle"; }
        catch (_) { return "idle"; }
      });
      const askedRef = useRef(false);
      const setLocStatusPersist = React.useCallback((s) => {
        setLocStatus(s);
        try { sessionStorage.setItem("cbs_loc_status", s); } catch (_) {}
      }, []);
      const captureLocation = React.useCallback((silent) => {
        if (!navigator.geolocation) { setLocStatusPersist("unsupported"); return; }
        if (!silent) setLocStatusPersist("asking");
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            setUserLoc(loc);
            try { sessionStorage.setItem("cbs_user_loc", JSON.stringify(loc)); } catch (_) {}
            setLocStatusPersist("granted");
          },
          () => setLocStatusPersist("denied"),
          { enableHighAccuracy: false, timeout: 8000, maximumAge: 5 * 60 * 1000 }
        );
      }, [setLocStatusPersist]);
      const requestLocation = React.useCallback(() => captureLocation(false), [captureLocation]);
      useEffect(() => {
        if (askedRef.current) return;
        askedRef.current = true;
        let stored = null;
        try { stored = sessionStorage.getItem("cbs_loc_status"); } catch (_) {}
        if (stored === "denied" || stored === "unsupported") return;
        if (stored === "granted" && userLoc) return;
        if (!navigator.permissions || !navigator.permissions.query) {
          if (!stored) captureLocation(true);
          return;
        }
        navigator.permissions.query({ name: "geolocation" }).then((p) => {
          if (p.state === "granted") captureLocation(true);
          else if (p.state === "prompt" && !stored) captureLocation(false);
          else if (p.state === "denied") setLocStatusPersist("denied");
        }).catch(() => { if (!stored) captureLocation(false); });
      }, []); // eslint-disable-line

      // ── Live ride animation (ONLY the student's own active ride) ──
      // The map shows campus stations as fixed pins. The only thing that
      // animates is the user's own active-ride bike — and only while they
      // are actually riding. Available bikes stay at their station; reserved
      // and maintenance bikes are listed but not animated. Everyone else's
      // ride state is not exposed here (privacy + simplicity).
      const [myRideAnim, setMyRideAnim] = useState(null);
      useEffect(() => {
        // Seed the animation from the user's active ride: start drifting from
        // the pickup station coords. If no active ride, clear the marker.
        if (!activeRide || activeRide.status !== "active") { setMyRideAnim(null); return; }
        const lat = Number(activeRide.pickup_latitude ?? activeRide.pickup_lat);
        const lng = Number(activeRide.pickup_longitude ?? activeRide.pickup_lng);
        if (Number.isNaN(lat) || Number.isNaN(lng)) { setMyRideAnim(null); return; }
        setMyRideAnim({ lat, lng, heading: Math.random() * Math.PI * 2, bikeCode: activeRide.bike_code });
      }, [activeRide]);
      useEffect(() => {
        if (!myRideAnim) return;
        const tick = setInterval(() => {
          setMyRideAnim(prev => {
            if (!prev) return prev;
            const step = 0.00008 + Math.random() * 0.00006;
            const heading = Math.random() < 0.2 ? prev.heading + (Math.random() - 0.5) * 1.2 : prev.heading;
            return {
              ...prev,
              heading,
              lat: prev.lat + Math.cos(heading) * step,
              lng: prev.lng + Math.sin(heading) * step * 1.18,
            };
          });
        }, 2000);
        return () => clearInterval(tick);
      }, [!!myRideAnim]);

      const filtered = useMemo(() => {
        const q = search.trim().toLowerCase();
        return stations.filter(s => {
          if (q && !(s.name.toLowerCase().includes(q) || s.address.toLowerCase().includes(q) || s.id.toLowerCase().includes(q))) return false;
          if (filter !== "all" && availabilityClass(s.bikes, s.capacity) !== filter) return false;
          return true;
        });
      }, [stations, search, filter]);

      const selected = stations.find(s => s.id === selectedId) || stations[0];
      const stationById = useMemo(() => new Map(stations.map(s => [String(s.id), s])), [stations]);
      const nearbyAvailableBikes = useMemo(() => {
        const anchor = selected || stations[0];
        const distanceFromAnchor = (bike) => {
          const station = stationById.get(String(bike.stationId));
          const lat = station ? Number(station.lat) : Number(bike.stationLatitude);
          const lng = station ? Number(station.lng) : Number(bike.stationLongitude);
          if (!anchor || !Number.isFinite(lat) || !Number.isFinite(lng)) return Number.POSITIVE_INFINITY;
          const km = Math.sqrt(Math.pow((lat - anchor.lat) * 111, 2) + Math.pow((lng - anchor.lng) * 88, 2));
          return Math.round(km * 1000);
        };
        return (mapBikes || [])
          .filter(b => b.status === "available")
          .map(b => {
            const station = stationById.get(String(b.stationId));
            const distanceMeters = distanceFromAnchor(b);
            return {
              ...b,
              stationName: (station && station.name) || b.stationName || "Campus station",
              distanceMeters,
              walkMinutes: Number.isFinite(distanceMeters) ? Math.max(1, Math.round(distanceMeters / 80)) : null,
            };
          })
          .sort((a, b) => (a.distanceMeters || 0) - (b.distanceMeters || 0))
          .slice(0, 8);
      }, [mapBikes, selected, stations, stationById]);
      const formatBikeDistance = (bike) => {
        if (!bike || !Number.isFinite(bike.distanceMeters)) return "Nearby";
        return bike.distanceMeters < 1000
          ? `${bike.distanceMeters} m`
          : `${(bike.distanceMeters / 1000).toFixed(1)} km`;
      };

      // Outside-click for the map filter popover only — the shared topbar
      // (window.UserTopbar) handles its own bell + user-menu outside-click
      // and ESC logic, so we no longer reset notifOpen/userOpen here.
      useEffect(() => {
        if (!showFilter) return;
        const close = () => setShowFilter(false);
        document.addEventListener("click", close);
        return () => document.removeEventListener("click", close);
      }, [showFilter]);

      const pushNotif = (kind, title, text) => {
        // The real notification is created server-side. We just need to nudge
        // the shared topbar bell to refresh. notify.push is fire-and-forget on
        // the server, so dispatch the refresh event a few times to make sure
        // the new row is picked up.
        const n = { id: "local-" + Date.now() + Math.random().toString(36).slice(2,6), kind, title, text, when: Date.now(), unread: true };
        setNotifications(prev => [n, ...prev]);
        const fire = () => {
          try { window.dispatchEvent(new CustomEvent("cbs:notifications-changed")); } catch (_) {}
          loadNotifs();
        };
        [400, 1400, 3500, 7000].forEach(delay => setTimeout(fire, delay));
      };
      const pushToast = (title, text) => {
        const id = "t" + Date.now() + Math.random();
        setToasts(prev => [...prev, { id, title, text }]);
        setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), 4000);
      };
      const [savedPaymentMethod, setSavedPaymentMethod] = useState({ hasSavedPaymentMethod: false, card: null });
      const loadSavedPaymentMethod = React.useCallback(() => {
        const token = localStorage.getItem("cbs_token");
        if (!token) return Promise.resolve(null);
        return window.cbsApi("/api/payments/payment-methods")
          .then((data) => {
            const next = {
              hasSavedPaymentMethod: Boolean(data && data.hasSavedPaymentMethod),
              card: (data && data.defaultPaymentMethod) || null,
            };
            setSavedPaymentMethod(next);
            return data;
          })
          .catch(() => {
            setSavedPaymentMethod({ hasSavedPaymentMethod: false, card: null });
            return null;
          });
      }, []);
      useEffect(() => { loadSavedPaymentMethod(); }, [loadSavedPaymentMethod]);

      const onBookBikeFromMap = React.useCallback((bike) => {
        if (!bike || bike.status !== "available") {
          pushToast("Bike unavailable", "This bike is currently in use or under maintenance.");
          return;
        }
        const station = stations.find(s => String(s.id) === String(bike.stationId));
        if (!station) {
          pushToast("Station unavailable", "This bike's station is not visible in the current station list.");
          return;
        }
        setSelectedId(station.id);
        setBookingFor({
          ...station,
          _presetBike: {
            id: bike.id,
            bike_code: bike.bikeCode || bike.bike_code || `Bike ${bike.id}`,
            model: bike.type || bike.model || station.type,
          },
        });
      }, [stations]);

      const onLogout = () => {
        try {
          localStorage.removeItem("cbs_token");
          localStorage.removeItem("cbs_user");
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          localStorage.removeItem("role");
        } catch(_){}
        window.location.replace("/login.html?loggedout=1");
      };
      const onRefresh = () => {
        const token = localStorage.getItem("cbs_token");
        if (!token) return;
        fetch("/api/user/stations", { headers: { Authorization: "Bearer " + token } })
          .then(r => r.ok ? r.json() : Promise.reject(new Error("Could not refresh stations.")))
          .then(d => {
            const list = (d.stations || []).map(mapDbStation);
            setStations(list);
            setSelectedId(prev => (list.some(s => s.id === prev) ? prev : (list[0] && list[0].id)));
            loadMapBikes();
            pushToast("Stations refreshed", "Live availability updated from the database.");
          })
          .catch(err => pushToast("Refresh failed", err.message || "Could not refresh stations."));
      };
      // Unified booking dispatch. The booking modal calls this with a flow flag:
      //   flow = "ride_now"      → instantly start a ride (no payment, charged at end)
      //   flow = "reserve_payg"  → reserve the bike for a future time, charge at end of ride
      //   flow = "reserve_paid"  → fixed-duration reservation, redirect straight to Stripe Checkout
      const onConfirmBooking = async (b) => {
        const token = localStorage.getItem("cbs_token");
        if (!token) {
          pushToast("Login required", "Please log in before booking a bike.");
          window.location.replace("/login.html");
          return;
        }
        if (!b.bikeId) {
          pushToast("Choose a bike", "Select an available bike before continuing.");
          return;
        }

        const flow = b.flow || (b.bookingType === "ride_now" ? "ride_now" : "reserve_paid");
        if (flow === "ride_now" && activeRide) {
          pushToast("Active ride in progress", "You already have an active ride. You can still schedule an upcoming booking.");
          return;
        }

        const hasSavedCard = Boolean(savedPaymentMethod && savedPaymentMethod.hasSavedPaymentMethod);

        // Server-side overlap pre-check. Stops the user from being sent to
        // Stripe (or charged on a saved card) when they already have a
        // booking covering the same window, even with a different bike.
        if (flow !== "ride_now" && b.start) {
          try {
            const checkBody = { start: b.start, bikeId: Number(b.bikeId) };
            if (flow === "reserve_paid" && b.duration) checkBody.durationMinutes = Number(b.duration);
            if (flow === "reserve_payg") checkBody.durationMinutes = 30; // pickup hold
            const check = await window.cbsApi("/api/bookings/check-overlap", {
              method: "POST",
              body: JSON.stringify(checkBody),
            });
            if (check && check.ok === false) {
              pushToast(
                check.conflict === "bike" ? "Bike unavailable" : "Time already booked",
                check.message || "You already have a booking during this time."
              );
              return;
            }
          } catch (err) {
            pushToast("Could not validate booking", err.message || "Please try again.");
            return;
          }
        }

        // ── Flow 1 & 2: Ride Now or Reserve PAYG ──
        // If a default card is saved, charge it off-session and stay on the
        // page. If not, fall back to Stripe Checkout which charges $1 and
        // saves the card via setup_future_usage.
        if (flow === "ride_now" || flow === "reserve_payg") {
          if (hasSavedCard) {
            try {
              const data = await window.cbsApi("/api/payments/charge-saved-card", {
                method: "POST",
                body: JSON.stringify({
                  paymentType: "payg_unlock",
                  bookingType: flow === "ride_now" ? "ride_now" : "scheduled",
                  rideMode: flow === "ride_now" ? "ride_now" : "reserve_later",
                  bikeId: Number(b.bikeId),
                  stationId: Number(b.stationId),
                  startTime: flow === "reserve_payg" ? b.start : null,
                }),
              });
              setBookingFor(null);
              const cardLbl = data && data.card ? `${data.card.brand || "card"} ending ${data.card.last4 || ""}` : "saved card";
              pushToast(
                flow === "ride_now" ? "Ride started" : "Reservation confirmed",
                `$${Number(data && data.amount || 0).toFixed(2)} charged to your ${cardLbl}.`
              );
              onRefresh && onRefresh();
              loadActiveRide && loadActiveRide();
            } catch (err) {
              pushToast("Could not charge saved card", err.message || "Please try again or update your card in your profile.");
            }
            return;
          }
          // No saved card → Stripe Checkout flow (also saves the card).
          try {
            const body = { bikeId: Number(b.bikeId), stationId: Number(b.stationId) };
            if (flow === "reserve_payg" && b.start) body.scheduledStart = b.start;
            const data = await window.cbsApi("/api/payments/create-payg-booking-payment", {
              method: "POST",
              body: JSON.stringify(body),
            });
            if (!data || !data.url) throw new Error("Could not start the Pay-As-You-Go payment session.");
            setBookingFor(null);
            window.location.href = data.url;
          } catch (err) {
            pushToast("Payment unavailable", err.message || "Could not start the Pay-As-You-Go payment.");
          }
          return;
        }

        // ── Flow 3: Fixed-duration reservation ──
        // Saved card → off-session charge, no Stripe redirect.
        if (hasSavedCard) {
          try {
            const data = await window.cbsApi("/api/payments/charge-saved-card", {
              method: "POST",
              body: JSON.stringify({
                paymentType: "fixed_upfront",
                bookingType: "scheduled",
                rideMode: "reserve_later",
                bikeId: Number(b.bikeId),
                stationId: Number(b.stationId),
                startTime: b.start,
                duration: Number(b.duration),
              }),
            });
            setBookingFor(null);
            const cardLbl = data && data.card ? `${data.card.brand || "card"} ending ${data.card.last4 || ""}` : "saved card";
            pushToast("Booking confirmed", `$${Number(data && data.amount || 0).toFixed(2)} charged to your ${cardLbl}.`);
            onRefresh && onRefresh();
          } catch (err) {
            pushToast("Could not charge saved card", err.message || "Please try again or update your card in your profile.");
          }
          return;
        }

        // No saved card → Stripe Checkout for upfront payment.
        const pricedBooking = {
          ...b,
          pricingMode: "fixed_duration",
          unlockFee: PRICING.unlockFee,
          perMinuteFee: PRICING.perMinuteFee,
          totalCost: calcCost(Number(b.duration)),
          cost: calcCost(Number(b.duration)),
          source: "dashboard",
          createdAt: Date.now(),
        };
        try { sessionStorage.setItem("cbs_pending_booking", JSON.stringify(pricedBooking)); } catch (_) {}
        try { localStorage.setItem("cbs_pending_booking", JSON.stringify(pricedBooking)); } catch (_) {}

        try {
          const data = await window.cbsApi("/api/payments/create-checkout-session", {
            method: "POST",
            body: JSON.stringify({ booking: pricedBooking, saveCard: !!b.saveCard }),
          });
          if (!data || !data.url) throw new Error("Could not start the payment session.");
          setBookingFor(null);
          window.location.href = data.url;
        } catch (err) {
          pushToast("Payment unavailable", err.message || "Could not start payment.");
        }
      };

      // Handle Stripe redirects directly on the dashboard — no more
      // intermediate User_payment.html page. Supports two flows:
      //   flow=end_ride → mark a Ride Now booking complete after end-of-ride
      //                   payment succeeds
      //   default        → confirm a fresh upfront-paid reservation
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const payment = params.get("payment");
        const sessionId = params.get("session_id");
        const flow = params.get("flow") || "";

        if (payment === "cancelled") {
          pushToast("Payment cancelled", flow === "end_ride"
            ? "Your ride is still active. Tap End Ride again when ready."
            : "No booking was created.");
          window.history.replaceState(null, "", window.location.pathname);
          return;
        }
        if (payment !== "success" || !sessionId) return;

        const token = localStorage.getItem("cbs_token");
        if (!token) {
          pushToast("Login required", "Please log in again to finish your booking.");
          return;
        }

        let paidSessions = [];
        try { paidSessions = JSON.parse(localStorage.getItem("cbs_paid_sessions") || "[]"); } catch (_) {}
        if (paidSessions.includes(sessionId)) {
          window.history.replaceState(null, "", window.location.pathname);
          return;
        }

        const completeFlow = async () => {
          try {
            if (flow === "end_ride") {
              const done = await window.cbsApi("/api/bookings/ride-now/complete", {
                method: "POST",
                body: JSON.stringify({ sessionId }),
              });
              pushToast("Ride complete!", `Charged $${Number(done.amount || 0).toFixed(2)} for a ${done.duration} min ride.`);
              loadActiveRide && loadActiveRide();
              onRefresh && onRefresh();
            } else {
              const pending = (() => {
                try { return JSON.parse(sessionStorage.getItem("cbs_pending_booking") || localStorage.getItem("cbs_pending_booking") || "null"); } catch (_) { return null; }
              })();
              const saved = await window.cbsApi("/api/bookings/create-from-payment", {
                method: "POST",
                body: JSON.stringify({ booking: pending, sessionId }),
              });
              try { sessionStorage.removeItem("cbs_pending_booking"); } catch (_) {}
              try { localStorage.removeItem("cbs_pending_booking"); } catch (_) {}
              const bid = saved && saved.bookingId ? `#${saved.bookingId}` : "";
              pushToast("Booking confirmed!", `Your reservation ${bid} is saved.`);
              onRefresh && onRefresh();
            }
            paidSessions.push(sessionId);
            localStorage.setItem("cbs_paid_sessions", JSON.stringify(paidSessions));
          } catch (err) {
            pushToast(flow === "end_ride" ? "Could not finish ride" : "Booking not saved",
              err.message || "We received your payment but the booking could not be confirmed.");
          } finally {
            window.history.replaceState(null, "", window.location.pathname);
          }
        };
        completeFlow();
      }, []);

      const onSubmitReport = async ({ category, details }) => {
        const station = reportFor;
        setReportFor(null);
        const more = details.length > 80 ? details.slice(0,80) + "…" : details;
        try {
          const catText = String(category || "").toLowerCase();
          const ticketCategory = catText.includes("bike") || catText.includes("lock")
            ? "bike"
            : catText.includes("station")
              ? "station"
              : "other";
          await window.cbsApi("/api/support/tickets", {
            method: "POST",
            body: JSON.stringify({
              category: ticketCategory,
              subject: `${category}${station ? " at " + station.name : ""}`.slice(0, 180),
              description: details.trim(),
              priority: catText.includes("safety") || catText.includes("damaged") ? "high" : "medium",
            }),
          });
          pushToast("Report submitted", "Thanks — we'll look into it.");
        } catch (err) {
          pushToast("Report saved locally", err.message || "We could not send it to support just now.", "error");
        }
        pushNotif("warn", "Issue submitted", `${category} — ${station ? station.name : "general"}: ${more}`);
      };

      const markAllRead = () => {
        const token = localStorage.getItem("cbs_token");
        // optimistic UI
        setNotifications(prev => prev.map(n => ({ ...n, unread: false })));
        if (token) fetch("/api/notifications/read-all", { method: "PATCH", headers: { Authorization: "Bearer " + token } }).catch(() => {});
      };
      const clickNotif = (n) => {
        if (!n.unread) return;
        const token = localStorage.getItem("cbs_token");
        // optimistic UI
        setNotifications(prev => prev.map(x => x.id === n.id ? { ...x, unread: false } : x));
        if (token) fetch(`/api/notifications/${n.id}/read`, { method: "PATCH", headers: { Authorization: "Bearer " + token } }).catch(() => {});
      };

      const availPct = selected ? Math.round((selected.bikes / selected.capacity) * 100) : 0;
      const filterLabel = ({ all: "", high: " · High", medium: " · Medium", low: " · Low", empty: " · Empty" })[filter];

      return (
        <div className="cbs-shell">
          {/* TOP BAR — shared component used on every student page */}
          <window.UserTopbar active="home" user={user} onLogout={onLogout} pushToast={pushToast}/>

          <div className="cbs-main">
            {/* SIDEBAR — shared component used on every student page */}
            <window.UserSidebar active="home"/>

            {/* CONTENT */}
            <main className="d-content">
              {/* LEFT */}
              <section className="d-left">
                {activeRide && (
                  <div className="d-active-pill" data-testid="active-pill">
                    <span className="dot"/>
                    <div className="d-active-pill-body">
                      <strong>You're on a ride</strong>
                      <span>Bike {activeRide.bike_code || ""} - view your timer + cost on My Bookings.</span>
                    </div>
                    <a className="d-active-pill-cta" href="User_my_bookings.html">My Bookings</a>
                  </div>
                )}
                <div className="d-card">
                  <div className="d-section-h"><h2>Station Details</h2></div>
                  <div className="d-station-body">
                    {!selected ? (
                      <div style={{padding:"24px 8px", textAlign:"center", color:"var(--d-muted)"}}>
                        <div style={{width:48, height:48, margin:"0 auto 12px", borderRadius:"50%", border:"3px solid rgba(34,197,94,.18)", borderTopColor:"#22C55E", animation:"spin 1s linear infinite"}}/>
                        Loading stations…
                      </div>
                    ) : (
                      <>
                        <div className="d-station-head">
                          <div className="d-station-icon"><Icon.building/></div>
                          <div className="d-station-title-row" style={{flex:1, minWidth:0}}>
                            <h3>{selected.name}</h3>
                            <span className="d-status-pill"><span style={{width:6, height:6, borderRadius:50, background:"currentColor"}}/>Active</span>
                            <div className="meta"><Icon.pin/>{selected.address}</div>
                            <div className="meta"><Icon.walk/>Distance: ~{selected.walkMin} min walk</div>
                          </div>
                        </div>

                        <div className="d-availability-card">
                          <div>
                            <div className="label">Available Bikes</div>
                            <div className="count">{selected.bikes} <span className="total">/ {selected.capacity}</span></div>
                            <div className="d-progress"><div style={{width: availPct + "%"}}/></div>
                            <div className="pct">{availPct}% available</div>
                          </div>
                          <div className="d-availability-icon"><Icon.bike s={28}/></div>
                        </div>

                        <div className="d-stat-list">
                          <div className="d-stat-row">
                            <span className="lhs"><span className="icn"><Icon.capacity/></span> Total Capacity</span>
                            <span className="val">{selected.capacity} Bikes</span>
                          </div>
                          <div className="d-stat-row">
                            <span className="lhs"><span className="icn"><Icon.bike s={16}/></span> Bike Type</span>
                            <span className="val">{selected.type}</span>
                          </div>
                          <div className="d-stat-row">
                            <span className="lhs"><span className="icn"><Icon.clock/></span> Operating Hours</span>
                            <span className="val">{selected.hours}</span>
                          </div>
                          <div className="d-stat-row">
                            <span className="lhs"><span className="icn"><Icon.hash/></span> Station ID</span>
                            <span className="val">{selected.id}</span>
                          </div>
                        </div>

                        <button className="d-cta" disabled={selected.bikes === 0} onClick={() => setBookingFor(selected)}>
                          <Icon.bike s={20}/> {selected.bikes === 0 ? "No bikes available" : "Book Bike"}
                        </button>
                      </>
                    )}
                  </div>
                </div>

                <div className="d-card">
                  <div className="d-section-h"><h2>Quick Actions</h2></div>
                  <div className="d-qa-grid">
                    <button className="d-qa-btn d-qa-refresh" onClick={onRefresh}>
                      <span className="icn"><Icon.refresh/></span>
                      Refresh Stations
                    </button>
                    <button className="d-qa-btn d-qa-issue" onClick={() => setReportFor(selected)}>
                      <span className="icn"><Icon.alert/></span>
                      Report an Issue
                    </button>
                  </div>
                </div>
              </section>

              {/* RIGHT */}
              <section className="d-right">
                <div className="d-card d-map-card">
                  <div className="d-map-head">
                    <h2><Icon.map/>Interactive Map</h2>
                    <div className="d-map-tools">
                      <div className="d-search">
                        <Icon.search/>
                        <input
                          placeholder="Search stations…"
                          value={search}
                          onChange={e => setSearch(e.target.value)}
                        />
                      </div>
                      <button className={"d-filter-btn" + (filter !== "all" ? " active" : "")} onClick={(e) => { e.stopPropagation(); setShowFilter(v => !v); }}>
                        <Icon.filter/>Filters{filterLabel}
                      </button>
                      {showFilter && (
                        <div className="d-filter-pop" onClick={e => e.stopPropagation()}>
                          {[
                            { v: "all",    label: "All stations" },
                            { v: "high",   label: "High availability" },
                            { v: "medium", label: "Medium availability" },
                            { v: "low",    label: "Low availability" },
                            { v: "empty",  label: "Empty" },
                          ].map(o => (
                            <button key={o.v} className={filter === o.v ? "sel" : ""} onClick={() => { setFilter(o.v); setShowFilter(false); }}>
                              {filter === o.v ? <Icon.check/> : <span style={{width:18}}/>} {o.label}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                  <MapPanelV2
                    stations={filtered}
                    selectedId={selectedId}
                    onSelect={setSelectedId}
                    userLoc={userLoc}
                    locStatus={locStatus}
                    onRequestLocation={requestLocation}
                    myRideAnim={myRideAnim}
                    mapBikes={mapBikes}
                    showBikes={showMapBikes}
                    showActiveBikes={showActiveMapBikes}
                    onToggleShowBikes={(event) => setShowMapBikes(event.target.checked)}
                    onToggleActiveBikes={(event) => setShowActiveMapBikes(event.target.checked)}
                    onBookBike={onBookBikeFromMap}
                  />
                </div>
                {/* Nearby stations list — quick taps, distance from you if granted */}
                <div className="d-card">
                  <div className="d-section-h"><h2>Bikes near you</h2></div>
                  <div className="d-bike-feed">
                    {nearbyAvailableBikes.length === 0 && (
                      <div className="d-bike-empty">No available bikes match the current map filter.</div>
                    )}
                    {nearbyAvailableBikes.map(bike => (
                      <div key={bike.id} className="d-bike-card" title={`${bike.bikeCode} at ${bike.stationName}`}>
                        <span className="dist"><Icon.pin/>{formatBikeDistance(bike)}{bike.walkMinutes ? ` - ${bike.walkMinutes} min walk` : ""}</span>
                        <div className="bike-row">
                          <span className="code">{bike.bikeCode}</span>
                          <span className="bike-chip">Available</span>
                        </div>
                        <span className="meta">{bike.type || "Standard bike"}</span>
                        <span className="meta bike-station">{bike.stationName}</span>
                        <span className="meta">{bike.condition || "Good condition"}</span>
                        <div className="bike-actions">
                          <span className="meta">Ready to book</span>
                          <button className="book-bike-mini" type="button" onClick={() => onBookBikeFromMap(bike)}>Book Bike</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </section>
            </main>
          </div>

          {/* MODALS */}
          {bookingFor && <BookingModal station={bookingFor} existingBookings={[...bookingWindows, ...bookings, activeRide].filter(Boolean)} stations={stations} hasActiveRide={!!activeRide} savedPaymentMethod={savedPaymentMethod} onClose={() => setBookingFor(null)} onConfirm={onConfirmBooking} pushToast={pushToast}/>}
          {reportFor  && <ReportModal  station={reportFor}  onClose={() => setReportFor(null)}  onSubmit={onSubmitReport}/>}
          {showWelcome && <WelcomeModal firstName={firstName} onClose={closeWelcome}/>}

          <ToastStack toasts={toasts}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
