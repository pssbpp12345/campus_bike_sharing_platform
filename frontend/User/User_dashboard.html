<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard | Campus Bike Sharing</title>
  <link rel="stylesheet" href="../../Login.css">
  <link rel="stylesheet" href="user-shared.css">
  <link rel="stylesheet" href="user-premium.css">

  <!-- Inter font for body, Plus Jakarta Sans for headings -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- React + Babel (in-browser JSX so we don't need a build step) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Maps loader: call __initGmaps as the callback so React can wait for window.google -->
  <script>
    window.__initGmaps = function () {
      window.__gmapsReady = true;
      window.dispatchEvent(new Event("gmapsReady"));
    };
    window.__gmapsError = function (e) {
      console.error("[gmaps]", e);
      window.__gmapsFailed = true;
      window.dispatchEvent(new Event("gmapsError"));
    };
    window.gm_authFailure = function () { window.__gmapsError("Authentication failed for the API key"); };
  </script>
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB6PW601u22m34P5Vcl5d4DBXgQxOYSV2U&callback=__initGmaps&loading=async&libraries=places"
    onerror="window.__gmapsError('Failed to load Google Maps script')"></script>

  <style>
    /* User Dashboard — page-specific design system */
    :root {
      --d-bg:        #F8FAFC;
      --d-bg-soft:   #F1F5F9;
      --d-card:      #FFFFFF;
      --d-ink:       #0F172A;
      --d-muted:     #64748B;
      --d-border:    #E2E8F0;
      --d-border-2:  #CBD5E1;

      --d-primary:   #2D7FF9;
      --d-primary-d: #1E5BC6;
      --d-green:     #22C55E;
      --d-green-d:   #15803D;
      --d-green-soft:#DCFCE7;
      --d-amber:     #F59E0B;
      --d-amber-soft:#FEF3C7;
      --d-red:       #EF4444;

      --d-shadow:    0 1px 2px rgba(15, 23, 42, .04), 0 8px 24px rgba(15, 23, 42, .06);
      --d-shadow-lg: 0 12px 40px rgba(15, 23, 42, .12);

      --d-radius-sm: 10px;
      --d-radius:    16px;
      --d-radius-lg: 22px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--d-bg);
      color: var(--d-ink);
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 { font-family: "Plus Jakarta Sans", "Inter", sans-serif; margin: 0; color: var(--d-ink); }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* Top app bar */
    .d-shell { display: flex; flex-direction: column; min-height: 100vh; }
    .d-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: var(--d-card);
      border-bottom: 1px solid var(--d-border);
      position: sticky; top: 0; z-index: 50;
    }
    .d-brand { display: flex; align-items: center; gap: 12px; }
    .d-brand-logo {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      color: var(--d-green);
    }
    .d-brand-name {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 800; font-size: 22px; letter-spacing: -.3px;
    }
    .d-brand-name .accent { color: var(--d-green); }

    .d-nav { display: flex; align-items: center; gap: 4px; }
    .d-nav-item {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      color: var(--d-muted);
      font-weight: 600; font-size: 14px;
      border-radius: var(--d-radius-sm);
      cursor: pointer;
      border: none; background: transparent;
      position: relative;
      transition: color .15s, background .15s;
    }
    .d-nav-item:hover { color: var(--d-ink); background: var(--d-bg-soft); }
    .d-nav-item.active { color: var(--d-ink); }
    .d-nav-item.active::after {
      content: ""; position: absolute; left: 14px; right: 14px; bottom: 4px;
      height: 3px; border-radius: 2px; background: var(--d-green);
    }
    .d-icon-btn {
      width: 42px; height: 42px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 12px; background: transparent; border: none; cursor: pointer;
      color: var(--d-muted); position: relative;
      transition: color .15s, background .15s;
    }
    .d-icon-btn:hover { color: var(--d-ink); background: var(--d-bg-soft); }
    .d-icon-btn .badge {
      position: absolute; top: 6px; right: 6px;
      min-width: 18px; height: 18px; padding: 0 5px;
      background: var(--d-red); color: #FFFFFF;
      border-radius: 999px; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 2px var(--d-card);
    }

    /* Main shell */
    .d-main { display: flex; flex: 1; min-height: 0; }
    .d-sidebar {
      width: 80px; flex-shrink: 0;
      background: var(--d-card);
      border-right: 1px solid var(--d-border);
      padding: 22px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .d-side-btn {
      width: 52px; height: 52px;
      border: none; background: transparent; cursor: pointer;
      border-radius: 14px;
      color: var(--d-muted);
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s, transform .15s;
    }
    .d-side-btn:hover { color: var(--d-green); background: var(--d-green-soft); }
    .d-side-btn.active { color: var(--d-green); background: var(--d-green-soft); }
    .d-side-btn:active { transform: scale(.95); }
    .d-side-spacer { flex: 1; }

    .d-content {
      flex: 1; min-width: 0;
      padding: 24px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      align-content: start;
    }
    .d-card {
      background: var(--d-card);
      border: 1px solid var(--d-border);
      border-radius: var(--d-radius-lg);
      box-shadow: var(--d-shadow);
    }

    /* Left column: Station Details */
    .d-left { display: flex; flex-direction: column; gap: 20px; min-width: 0; }
    .d-section-h {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 24px 12px;
    }
    .d-section-h h2 {
      font-size: 22px; font-weight: 800; letter-spacing: -.4px;
      position: relative; padding-bottom: 8px;
    }
    .d-section-h h2::after {
      content: ""; position: absolute; left: 0; bottom: 0;
      width: 36px; height: 3px; border-radius: 2px; background: var(--d-green);
    }
    .d-station-body { padding: 0 24px 22px; }
    .d-station-head { display: flex; gap: 14px; align-items: flex-start; padding: 4px 0 16px; }
    .d-station-icon {
      flex-shrink: 0; width: 56px; height: 56px;
      background: var(--d-green-soft); color: var(--d-green);
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
    }
    .d-station-title-row h3 { font-size: 18px; font-weight: 800; letter-spacing: -.2px; }
    .d-status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 6px; padding: 3px 10px;
      background: var(--d-green-soft); color: var(--d-green-d);
      font-size: 11px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase;
      border-radius: 999px;
    }
    .d-station-title-row .meta {
      display: flex; align-items: center; gap: 6px;
      color: var(--d-muted); font-size: 13px; margin-top: 8px;
    }

    .d-availability-card {
      background: linear-gradient(135deg, #ECFDF5 0%, #F0FDF4 100%);
      border: 1px solid #BBF7D0;
      border-radius: var(--d-radius);
      padding: 16px;
      display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px;
    }
    .d-availability-card .label { font-size: 13px; color: var(--d-muted); font-weight: 600; }
    .d-availability-card .count {
      font-family: "Plus Jakarta Sans", sans-serif; font-weight: 800; font-size: 30px; line-height: 1;
      letter-spacing: -.5px; margin-top: 6px;
    }
    .d-availability-card .count .total { color: var(--d-muted); font-weight: 600; font-size: 18px; }
    .d-progress { height: 8px; background: rgba(34, 197, 94, .15); border-radius: 999px; overflow: hidden; margin-top: 10px; }
    .d-progress > div {
      height: 100%; background: linear-gradient(90deg, var(--d-green) 0%, #16A34A 100%);
      border-radius: 999px; transition: width .4s;
    }
    .d-availability-card .pct { font-size: 12px; color: var(--d-green-d); font-weight: 700; margin-top: 6px; }
    .d-availability-icon {
      width: 56px; height: 56px;
      background: rgba(255, 255, 255, .8); color: var(--d-green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(34, 197, 94, .25);
    }

    .d-stat-list { display: flex; flex-direction: column; margin-top: 18px; gap: 0; }
    .d-stat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0;
      border-top: 1px solid var(--d-border);
      font-size: 14px;
    }
    .d-stat-row:first-child { border-top: 0; }
    .d-stat-row .lhs { display: flex; align-items: center; gap: 10px; color: var(--d-muted); }
    .d-stat-row .icn { color: var(--d-primary); }
    .d-stat-row .val { font-weight: 700; color: var(--d-ink); }

    .d-cta {
      width: 100%; margin-top: 20px;
      height: 52px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, var(--d-green) 0%, #16A34A 100%);
      color: #FFFFFF; font-weight: 700; font-size: 15px;
      border: none; border-radius: 14px; cursor: pointer;
      box-shadow: 0 8px 22px rgba(34, 197, 94, .35);
      transition: transform .12s, box-shadow .15s;
    }
    .d-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(34, 197, 94, .4); }
    .d-cta:active { transform: translateY(0); }
    .d-cta:disabled { background: #94A3B8; box-shadow: none; cursor: not-allowed; transform: none; }

    /* Quick actions card */
    .d-qa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 4px 24px 22px; }
    .d-qa-btn {
      background: var(--d-card);
      border: 1px solid var(--d-border);
      border-radius: var(--d-radius);
      padding: 16px 12px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      cursor: pointer;
      color: var(--d-ink);
      font-weight: 600; font-size: 13px;
      transition: border-color .15s, transform .12s, box-shadow .15s;
    }
    .d-qa-btn:hover { border-color: var(--d-border-2); transform: translateY(-2px); box-shadow: var(--d-shadow); }
    .d-qa-btn .icn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .d-qa-refresh .icn { color: var(--d-green); background: var(--d-green-soft); }
    .d-qa-issue   .icn { color: var(--d-amber); background: var(--d-amber-soft); }

    /* Right column: Map */
    .d-right { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
    .d-map-card { padding: 0; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
    .d-map-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 24px 16px; gap: 16px; flex-wrap: wrap;
      position: relative;
    }
    .d-map-head h2 {
      font-size: 22px; font-weight: 800; letter-spacing: -.4px;
      display: flex; align-items: center; gap: 10px;
    }
    .d-map-tools { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 240px; justify-content: flex-end; position: relative; }
    .d-search {
      flex: 1; max-width: 360px;
      height: 44px;
      display: flex; align-items: center; gap: 10px;
      padding: 0 14px;
      background: var(--d-bg-soft);
      border: 1px solid var(--d-border);
      border-radius: 12px;
      transition: border-color .15s, background .15s;
    }
    .d-search:focus-within { border-color: var(--d-primary); background: var(--d-card); }
    .d-search input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 14px; color: var(--d-ink); font-family: inherit;
    }
    .d-search input::placeholder { color: var(--d-muted); }
    .d-filter-btn {
      height: 44px; padding: 0 16px;
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--d-card); border: 1px solid var(--d-border);
      border-radius: 12px; color: var(--d-ink);
      font-weight: 600; font-size: 14px; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .d-filter-btn:hover { border-color: var(--d-border-2); }
    .d-filter-btn.active { background: var(--d-primary); color: #FFFFFF; border-color: var(--d-primary); }

    .d-filter-pop {
      position: absolute; right: 0; top: calc(100% + 8px);
      background: var(--d-card); border: 1px solid var(--d-border);
      border-radius: 14px; box-shadow: var(--d-shadow-lg);
      padding: 8px; min-width: 220px; z-index: 30;
    }
    .d-filter-pop button {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 10px 12px; border-radius: 10px;
      background: transparent; border: none; cursor: pointer;
      font-size: 14px; color: var(--d-ink); font-weight: 500; font-family: inherit;
    }
    .d-filter-pop button:hover { background: var(--d-bg-soft); }
    .d-filter-pop button.sel { color: var(--d-primary); font-weight: 700; }

    .d-map-wrap { position: relative; flex: 1; min-height: 540px; }
    #d-map { width: 100%; height: 100%; min-height: 540px; }
    .d-map-loading, .d-map-error {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: linear-gradient(135deg, #E0F2FE 0%, #ECFDF5 100%);
      color: var(--d-muted); font-weight: 600; padding: 24px; text-align: center;
    }
    .d-map-spin {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 3px solid rgba(45, 127, 249, .2);
      border-top-color: var(--d-primary);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .d-recenter {
      position: absolute; right: 16px; top: 16px;
      width: 42px; height: 42px;
      background: #FFFFFF; border: 1px solid var(--d-border);
      border-radius: 12px; cursor: pointer; color: var(--d-ink);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--d-shadow); z-index: 5;
    }
    .d-recenter:hover { background: var(--d-bg-soft); }

    .d-legend {
      position: absolute; right: 16px; bottom: 16px;
      background: var(--d-card);
      border: 1px solid var(--d-border);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: var(--d-shadow);
      z-index: 5;
      min-width: 200px;
    }
    .d-legend h4 { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; color: var(--d-muted); margin-bottom: 8px; }
    .d-legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--d-ink); padding: 3px 0; }
    .d-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Notifications dropdown */
    .d-notif-wrap { position: relative; }
    .d-notif-panel {
      position: absolute; right: 0; top: calc(100% + 12px);
      width: 380px; max-width: calc(100vw - 32px);
      background: var(--d-card);
      border: 1px solid var(--d-border);
      border-radius: 18px;
      box-shadow: var(--d-shadow-lg);
      overflow: hidden;
      z-index: 100;
      animation: notifIn .18s ease-out;
    }
    @keyframes notifIn {
      from { opacity: 0; transform: translateY(-6px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .d-notif-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--d-border);
    }
    .d-notif-head h3 { font-size: 16px; font-weight: 800; }
    .d-notif-mark {
      background: transparent; border: none; cursor: pointer;
      color: var(--d-primary); font-weight: 600; font-size: 13px; font-family: inherit;
    }
    .d-notif-mark:hover { text-decoration: underline; }
    .d-notif-list { max-height: 420px; overflow: auto; }
    .d-notif-item {
      display: flex; gap: 12px; padding: 14px 18px;
      border-bottom: 1px solid var(--d-border);
      cursor: pointer; transition: background .12s;
    }
    .d-notif-item:hover { background: var(--d-bg-soft); }
    .d-notif-item:last-child { border-bottom: none; }
    .d-notif-item.unread { background: linear-gradient(90deg, #EFF6FF, transparent); }
    .d-notif-icon {
      flex-shrink: 0; width: 36px; height: 36px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .d-notif-icon.success { background: var(--d-green-soft); color: var(--d-green-d); }
    .d-notif-icon.info    { background: #DBEAFE; color: #1E3A8A; }
    .d-notif-icon.warn    { background: var(--d-amber-soft); color: #92400E; }
    .d-notif-body { flex: 1; min-width: 0; }
    .d-notif-title { font-size: 14px; font-weight: 700; color: var(--d-ink); margin-bottom: 2px; }
    .d-notif-text  { font-size: 13px; color: var(--d-muted); line-height: 1.45; }
    .d-notif-time  { font-size: 12px; color: var(--d-muted); margin-top: 4px; }
    .d-notif-empty { padding: 32px 18px; text-align: center; color: var(--d-muted); font-size: 13px; }

    /* User menu */
    .d-user-wrap { position: relative; }
    .d-user-btn {
      width: 42px; height: 42px;
      border: 2px solid transparent; cursor: pointer; padding: 0;
      border-radius: 50%; background: transparent;
      transition: border-color .15s, transform .12s;
    }
    .d-user-btn:hover { border-color: var(--d-border-2); transform: translateY(-1px); }
    .d-user-btn.open { border-color: var(--d-primary); }
    .d-user-avatar {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--d-primary) 0%, #5B9BFF 100%);
      color: #FFFFFF;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 800; font-size: 15px;
      letter-spacing: -.2px;
      box-shadow: 0 4px 12px rgba(45, 127, 249, .35);
      overflow: hidden;
    }
    .d-user-avatar.lg { width: 52px; height: 52px; font-size: 19px; flex-shrink: 0; }
    .d-user-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .d-user-panel {
      position: absolute; right: 0; top: calc(100% + 12px);
      width: 300px; max-width: calc(100vw - 32px);
      background: var(--d-card);
      border: 1px solid var(--d-border);
      border-radius: 18px;
      box-shadow: var(--d-shadow-lg);
      overflow: hidden;
      z-index: 100;
      animation: notifIn .18s ease-out;
    }
    .d-user-head {
      display: flex; gap: 14px; align-items: center;
      padding: 18px;
      background: linear-gradient(135deg, #EFF6FF 0%, #ECFDF5 100%);
      border-bottom: 1px solid var(--d-border);
    }
    .d-user-head .name { font-size: 15px; font-weight: 800; color: var(--d-ink); letter-spacing: -.2px; }
    .d-user-head .email { font-size: 12px; color: var(--d-muted); margin-top: 2px; word-break: break-all; }
    .d-user-head .role-pill {
      display: inline-block; margin-top: 6px;
      padding: 2px 9px;
      background: var(--d-green-soft); color: var(--d-green-d);
      font-size: 10px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase;
      border-radius: 999px;
    }
    .d-user-list { padding: 8px; }
    .d-user-list button {
      display: flex; align-items: center; gap: 12px; width: 100%;
      padding: 11px 12px; border-radius: 10px;
      background: transparent; border: none; cursor: pointer;
      color: var(--d-ink); font-family: inherit; font-size: 14px; font-weight: 500;
      text-align: left;
    }
    .d-user-list button:hover { background: var(--d-bg-soft); }
    .d-user-list button .ico { color: var(--d-muted); display: inline-flex; }
    .d-user-foot { padding: 8px; border-top: 1px solid var(--d-border); }
    .d-user-foot button {
      display: flex; align-items: center; gap: 12px; width: 100%;
      padding: 11px 12px; border-radius: 10px;
      background: transparent; border: none; cursor: pointer;
      color: var(--d-red); font-family: inherit; font-size: 14px; font-weight: 600;
      text-align: left;
    }
    .d-user-foot button:hover { background: rgba(239, 68, 68, .08); }

    /* Modal */
    .d-overlay {
      position: fixed; inset: 0; background: rgba(15, 23, 42, .55);
      display: flex; align-items: center; justify-content: center;
      padding: 16px; z-index: 200;
      animation: fade .15s;
    }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .d-modal {
      background: var(--d-card);
      border-radius: 22px;
      width: 100%; max-width: 460px;
      box-shadow: var(--d-shadow-lg);
      overflow: hidden;
      animation: pop .2s cubic-bezier(.18,.89,.32,1.28);
    }
    @keyframes pop { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .d-modal-head { padding: 20px 24px 8px; }
    .d-modal-head h3 { font-size: 19px; font-weight: 750; letter-spacing: -.2px; }
    .d-modal-head p { color: var(--d-muted); font-size: 14px; margin: 6px 0 0; }
    .d-modal-body { padding: 14px 24px 18px; }
    .d-modal-foot {
      padding: 12px 24px 22px;
      display: flex; gap: 10px; justify-content: flex-end;
    }
    .d-input, .d-textarea {
      width: 100%; padding: 12px 14px;
      background: var(--d-bg-soft); border: 1px solid var(--d-border);
      border-radius: 12px; color: var(--d-ink); font-family: inherit; font-size: 14px;
      outline: none; transition: border-color .12s, background .12s;
    }
    .d-input:focus, .d-textarea:focus { border-color: var(--d-primary); background: var(--d-card); }
    .d-textarea { min-height: 110px; resize: vertical; }
    .d-btn {
      padding: 11px 18px; border-radius: 12px; font-weight: 700; font-size: 14px;
      cursor: pointer; border: 1px solid transparent; transition: transform .12s, box-shadow .15s;
      font-family: inherit;
    }
    .d-btn:active { transform: translateY(1px); }
    .d-btn-secondary { background: var(--d-card); color: var(--d-ink); border-color: var(--d-border); }
    .d-btn-secondary:hover { border-color: var(--d-border-2); }
    .d-btn-primary {
      background: linear-gradient(135deg, var(--d-green) 0%, #16A34A 100%);
      color: #FFFFFF; box-shadow: 0 6px 16px rgba(34, 197, 94, .35);
    }
    .d-btn-primary:hover { box-shadow: 0 8px 20px rgba(34, 197, 94, .45); }
    .d-btn-primary:disabled { background: #94A3B8; box-shadow: none; cursor: not-allowed; }
    .d-summary {
      background: var(--d-bg-soft); border: 1px solid var(--d-border);
      border-radius: 14px; padding: 13px 14px; margin-top: 6px;
    }
    .d-summary-row { display: flex; justify-content: space-between; gap: 14px; padding: 4px 0; font-size: 13px; line-height: 1.35; }
    .d-summary-row .k { color: var(--d-muted); }
    .d-summary-row .v { font-weight: 650; color: var(--d-ink); text-align: right; min-width: 0; }

    /* Booking calendar */
    .d-modal.book { max-width: 980px; max-height: min(88vh, 760px); display: flex; flex-direction: column; }
    .d-modal.book .d-modal-body { overflow: auto; }
    .d-modal.book .d-modal-foot {
      position: sticky;
      bottom: 0;
      background: rgba(255,255,255,.96);
      border-top: 1px solid var(--d-border);
      padding-top: 12px;
      backdrop-filter: blur(10px);
    }
    .d-book-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(290px, .9fr); gap: 18px; align-items: start; }
    .d-book-col h4 {
      font-size: 12px; font-weight: 700; letter-spacing: .35px;
      text-transform: uppercase; color: var(--d-muted);
      margin-bottom: 10px;
    }

    .d-cal-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; gap: 8px;
    }
    .d-cal-month {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 800; font-size: 16px; color: var(--d-ink);
      letter-spacing: -.2px;
    }
    .d-cal-nav { display: flex; gap: 4px; }
    .d-cal-nav button {
      width: 32px; height: 32px;
      border: 1px solid var(--d-border); background: var(--d-card);
      border-radius: 8px; cursor: pointer; color: var(--d-ink);
      display: flex; align-items: center; justify-content: center;
      transition: border-color .12s, background .12s;
    }
    .d-cal-nav button:hover:not(:disabled) { border-color: var(--d-primary); color: var(--d-primary); }
    .d-cal-nav button:disabled { opacity: .35; cursor: not-allowed; }

    .d-cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    }
    .d-cal-dow {
      text-align: center; font-size: 10px; color: var(--d-muted);
      padding: 6px 0 4px; font-weight: 800; letter-spacing: .5px;
    }
    .d-cal-cell {
      aspect-ratio: 1;
      border: none; background: transparent;
      border-radius: 10px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; padding: 0;
      font-family: inherit; font-weight: 600; font-size: 14px; color: var(--d-ink);
      position: relative;
      transition: background .12s, color .12s, transform .12s;
    }
    .d-cal-cell:hover:not(:disabled):not(.selected) { background: var(--d-bg-soft); }
    .d-cal-cell.muted { color: var(--d-border-2); }
    .d-cal-cell.today { color: var(--d-primary); font-weight: 800; }
    .d-cal-cell.today::after {
      content: ""; position: absolute; bottom: 6px;
      width: 4px; height: 4px; border-radius: 50%; background: var(--d-primary);
    }
    .d-cal-cell.selected {
      background: linear-gradient(135deg, var(--d-green) 0%, #16A34A 100%);
      color: #FFFFFF; box-shadow: 0 4px 12px rgba(34, 197, 94, .35);
    }
    .d-cal-cell.selected.today { color: #FFFFFF; }
    .d-cal-cell.selected.today::after { background: #FFFFFF; }
    .d-cal-cell:disabled { color: var(--d-border-2); cursor: not-allowed; opacity: .55; }

    .d-time-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
      max-height: 190px; overflow-y: auto;
      padding: 2px 4px 2px 0;
      scrollbar-width: thin;
    }
    .d-time-grid::-webkit-scrollbar { width: 6px; }
    .d-time-grid::-webkit-scrollbar-thumb { background: var(--d-border-2); border-radius: 4px; }
    .d-time-slot {
      padding: 9px 4px;
      border: 1px solid var(--d-border); background: var(--d-card);
      border-radius: 9px;
      font-family: inherit;
      font-size: 12px; font-weight: 700; color: var(--d-ink);
      cursor: pointer; text-align: center;
      transition: border-color .12s, background .12s, color .12s, transform .12s;
    }
    .d-time-slot:hover:not(:disabled):not(.selected) {
      border-color: var(--d-primary); color: var(--d-primary);
      transform: translateY(-1px);
    }
    .d-time-slot.selected {
      background: linear-gradient(135deg, var(--d-primary) 0%, #5B9BFF 100%);
      color: #FFFFFF; border-color: transparent;
      box-shadow: 0 4px 12px rgba(45, 127, 249, .35);
    }
    .d-time-slot:disabled {
      cursor: not-allowed; opacity: .55;
    }
    .d-time-slot.past { color: var(--d-muted); background: var(--d-bg-soft); }
    .d-time-slot.conflict {
      background: #FEF2F2; color: #B91C1C; border-color: #FECACA;
      text-decoration: line-through;
    }
    .d-time-slot.conflict::before {
      content: "•"; margin-right: 2px; text-decoration: none; display: inline-block;
    }

    .d-duration-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px;
    }
    .d-duration-pill {
      padding: 8px 12px; border-radius: 999px;
      border: 1px solid var(--d-border); background: var(--d-card);
      font-family: inherit; font-size: 13px; font-weight: 600; color: var(--d-ink);
      cursor: pointer;
      transition: all .12s;
    }
    .d-duration-pill:hover:not(.selected) { border-color: var(--d-border-2); }
    .d-duration-pill.selected {
      background: var(--d-ink); color: #FFFFFF; border-color: var(--d-ink);
    }

    .d-bike-list {
      display: grid;
      gap: 8px;
      max-height: 162px;
      overflow: auto;
      padding-right: 4px;
    }
    .d-bike-option {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      text-align: left;
      padding: 11px 12px;
      border: 1px solid var(--d-border);
      border-radius: 12px;
      background: var(--d-card);
      color: var(--d-ink);
      cursor: pointer;
      transition: border-color .12s, background .12s, transform .12s, box-shadow .12s;
    }
    .d-bike-option:hover {
      border-color: var(--d-green);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(15, 23, 42, .06);
    }
    .d-bike-option.selected {
      border-color: var(--d-green);
      background: #F0FDF4;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, .14);
    }
    .d-bike-code {
      font-weight: 800;
      font-size: 14px;
      letter-spacing: .01em;
    }
    .d-bike-meta {
      display: block;
      margin-top: 2px;
      color: var(--d-muted);
      font-size: 12px;
      font-weight: 600;
    }
    .d-bike-status {
      padding: 4px 9px;
      border-radius: 999px;
      background: var(--d-green-soft);
      color: var(--d-green-d);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .d-bike-empty {
      padding: 14px;
      border: 1px dashed var(--d-border);
      border-radius: 12px;
      color: var(--d-muted);
      background: var(--d-bg-soft);
      font-size: 13px;
      line-height: 1.45;
    }
    .d-mode-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .d-mode-btn {
      text-align: left;
      padding: 13px 14px;
      border: 1px solid var(--d-border);
      border-radius: 14px;
      background: var(--d-card);
      color: var(--d-ink);
      cursor: pointer;
      transition: border-color .12s, background .12s, box-shadow .12s, transform .12s;
    }
    .d-mode-btn:hover {
      transform: translateY(-1px);
      border-color: var(--d-green);
      box-shadow: 0 8px 18px rgba(15, 23, 42, .06);
    }
    .d-mode-btn.active {
      border-color: var(--d-green);
      background: #F0FDF4;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, .14);
    }
    .d-mode-title {
      display: block;
      font-size: 14px;
      font-weight: 800;
    }
    .d-mode-copy {
      display: block;
      margin-top: 3px;
      color: var(--d-muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .d-price-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .d-price-option {
      border: 1px solid var(--d-border);
      border-radius: 12px;
      background: var(--d-card);
      color: var(--d-ink);
      padding: 10px 11px;
      text-align: left;
      font-family: inherit;
      cursor: pointer;
      transition: border-color .14s, background .14s, box-shadow .14s, transform .14s;
    }
    .d-price-option:hover {
      transform: translateY(-1px);
      border-color: var(--d-green);
      box-shadow: 0 8px 18px rgba(15,23,42,.06);
    }
    .d-price-option.selected {
      border-color: var(--d-green);
      background: #F0FDF4;
      box-shadow: 0 0 0 3px rgba(34,197,94,.12);
    }
    .d-price-option strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
    }
    .d-price-option span {
      display: block;
      color: var(--d-muted);
      font-size: 11.5px;
      line-height: 1.35;
      margin-top: 3px;
    }

    .d-conflict {
      display: flex; gap: 10px; align-items: flex-start;
      background: #FEF2F2; border: 1px solid #FECACA; color: #991B1B;
      padding: 11px 14px; border-radius: 12px;
      font-size: 13px; line-height: 1.45;
      margin-top: 10px;
    }
    .d-conflict .ico { color: #B91C1C; flex-shrink: 0; margin-top: 1px; }

    .d-empty-slots {
      grid-column: 1 / -1;
      padding: 20px 12px; text-align: center;
      color: var(--d-muted); font-size: 13px;
      border: 1px dashed var(--d-border); border-radius: 10px;
    }

    .d-co2-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px;
      background: var(--d-green-soft); color: var(--d-green-d);
      font-size: 11px; font-weight: 700;
    }

    @media (max-width: 720px) {
      .d-modal.book { max-width: 100%; }
      .d-book-grid { grid-template-columns: 1fr; gap: 16px; }
      .d-time-grid { max-height: 180px; }
    }

    /* Toasts */
    .d-toast-wrap {
      position: fixed; right: 20px; bottom: 20px; z-index: 250;
      display: flex; flex-direction: column; gap: 10px;
    }
    .d-toast {
      min-width: 280px; max-width: 360px;
      background: var(--d-card); border: 1px solid var(--d-border);
      border-radius: 14px; padding: 14px 16px;
      display: flex; gap: 12px; align-items: flex-start;
      box-shadow: var(--d-shadow-lg);
      animation: toastIn .25s ease-out;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .d-toast .ico { color: var(--d-green); flex-shrink: 0; }
    .d-toast .body { flex: 1; }
    .d-toast .title { font-weight: 700; font-size: 14px; }
    .d-toast .text { font-size: 13px; color: var(--d-muted); margin-top: 2px; }

    /* Responsive */
    @media (max-width: 1100px) { .d-content { grid-template-columns: 320px 1fr; } }
    @media (max-width: 900px) {
      .d-nav-text { display: none; }
      .d-nav-item.active::after { display: none; }
      .d-content { grid-template-columns: 1fr; padding: 16px; }
      .d-sidebar {
        position: fixed; left: 0; bottom: 0; right: 0; top: auto; width: 100%;
        flex-direction: row; justify-content: space-around;
        padding: 8px 12px; border-right: none; border-top: 1px solid var(--d-border);
        z-index: 60;
      }
      .d-side-spacer { display: none; }
      .d-content { padding-bottom: 88px; }
      .d-map-wrap { min-height: 420px; }
      #d-map { min-height: 420px; }
    }
    @media (max-width: 640px) {
      .d-topbar { padding: 12px 16px; }
      .d-brand-name { font-size: 18px; }
      .d-nav { gap: 0; }
      .d-nav-item { padding: 8px; }
      .d-section-h, .d-station-body, .d-qa-grid { padding-left: 18px; padding-right: 18px; }
      .d-map-head { padding: 18px 18px 12px; }
      .d-map-tools { width: 100%; }
      .d-search { max-width: none; }
      .d-legend { right: 8px; bottom: 8px; min-width: 0; padding: 8px 10px; }
    }

    /* ─── Welcome Modal (after login, once per session) ─── */
    .cbs-welcome-overlay {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, .42);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      z-index: 1000;
      animation: cbsWelcomeFade .25s ease-out;
    }
    @keyframes cbsWelcomeFade { from { opacity: 0; } to { opacity: 1; } }
    .cbs-welcome-modal {
      width: 100%; max-width: 480px;
      background: #FFFFFF;
      border: 1px solid #BBF7D0;
      border-radius: 22px;
      box-shadow: 0 32px 80px rgba(15, 23, 42, .25), 0 0 0 1px rgba(34, 197, 94, .10);
      overflow: hidden;
      animation: cbsWelcomePop .35s cubic-bezier(.18, .89, .32, 1.28);
      position: relative;
    }
    @keyframes cbsWelcomePop {
      from { opacity: 0; transform: scale(.92) translateY(10px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }
    .cbs-welcome-head {
      background: linear-gradient(135deg, #DCFCE7 0%, #ECFDF5 60%, #F0FDF4 100%);
      padding: 28px 26px 20px;
      position: relative;
      overflow: hidden;
    }
    .cbs-welcome-head::before {
      content: "";
      position: absolute; left: -40px; top: -40px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(34, 197, 94, .18), transparent 70%);
      border-radius: 50%;
      animation: cbsWelcomeBlob 6s ease-in-out infinite alternate;
    }
    .cbs-welcome-head::after {
      content: "";
      position: absolute; right: -50px; bottom: -50px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(56, 189, 248, .12), transparent 70%);
      border-radius: 50%;
      animation: cbsWelcomeBlob 8s ease-in-out infinite alternate-reverse;
    }
    @keyframes cbsWelcomeBlob {
      from { transform: translate(0, 0)        scale(1); }
      to   { transform: translate(20px, 20px) scale(1.06); }
    }
    .cbs-welcome-icon {
      width: 64px; height: 64px;
      background: #FFFFFF;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      color: #22C55E;
      box-shadow: 0 8px 22px rgba(34, 197, 94, .25);
      position: relative; z-index: 1;
    }
    .cbs-welcome-title {
      font-family: "Plus Jakarta Sans", "Inter", sans-serif;
      font-size: 22px; font-weight: 800; letter-spacing: -.4px;
      margin: 14px 0 4px;
      color: #0F172A;
      position: relative; z-index: 1;
    }
    .cbs-welcome-subtitle {
      font-size: 14px; color: #475569; margin: 0;
      position: relative; z-index: 1;
    }
    .cbs-welcome-body { padding: 18px 26px 6px; }
    .cbs-welcome-tip {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 12px 14px;
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      border-radius: 14px;
      margin-bottom: 10px;
      transition: transform .18s ease-out, box-shadow .18s ease-out;
    }
    .cbs-welcome-tip:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(34, 197, 94, .10);
    }
    .cbs-welcome-tip .ico {
      flex-shrink: 0; width: 32px; height: 32px;
      border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      background: #FFFFFF; color: #15803D;
      border: 1px solid #BBF7D0;
    }
    .cbs-welcome-tip .txt strong { display: block; font-size: 13.5px; color: #0F172A; }
    .cbs-welcome-tip .txt span   { font-size: 12.5px; color: #64748B; }
    .cbs-welcome-foot {
      padding: 14px 26px 22px;
      display: flex; justify-content: flex-end; gap: 10px;
    }
    .cbs-welcome-close {
      position: absolute; top: 14px; right: 14px;
      width: 32px; height: 32px;
      border-radius: 10px;
      background: rgba(255, 255, 255, .65); border: 1px solid rgba(34, 197, 94, .25);
      color: #15803D;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 2;
      transition: background .15s ease-out, transform .15s ease-out;
    }
    .cbs-welcome-close:hover { background: #FFFFFF; transform: scale(1.05); }

    /* ─── Active Ride Banner ─────────────────────────────── */
    .d-active-ride {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0F172A 0%, #1E3A8A 65%, #2D7FF9 100%);
      color: #FFFFFF;
      border-radius: var(--d-radius-lg);
      padding: 22px 24px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, .28);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
    }
    .d-active-ride::before {
      content: "";
      position: absolute; left: -40px; top: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(34, 197, 94, .35), transparent 70%);
      border-radius: 50%;
      animation: cbsWelcomeBlob 6s ease-in-out infinite alternate;
    }
    .d-active-ride .ar-info { position: relative; z-index: 1; min-width: 0; }
    .d-active-ride .ar-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 800; letter-spacing: .12em;
      text-transform: uppercase; opacity: .85;
    }
    .d-active-ride .ar-eyebrow .dot {
      width: 8px; height: 8px; border-radius: 50%; background: #22C55E;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, .25);
      animation: arPulse 1.4s ease-in-out infinite;
    }
    @keyframes arPulse {
      0%, 100% { transform: scale(1);   box-shadow: 0 0 0 4px rgba(34,197,94,.25); }
      50%      { transform: scale(1.2); box-shadow: 0 0 0 8px rgba(34,197,94,.10); }
    }
    .d-active-ride h3 {
      color: #FFFFFF;
      font-size: 22px; font-weight: 800; letter-spacing: -.4px;
      margin-top: 6px;
    }
    .d-active-ride .ar-meta {
      display: flex; flex-wrap: wrap; gap: 14px;
      margin-top: 8px;
      font-size: 13px; opacity: .85;
    }
    .d-active-ride .ar-timer {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 38px; font-weight: 800; letter-spacing: -.5px;
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }
    .d-active-ride .ar-cost { font-size: 14px; opacity: .9; margin-top: 2px; }
    .d-active-ride .ar-actions { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 10px; min-width: 160px; }
    .d-active-ride .ar-end {
      height: 52px; padding: 0 22px;
      background: #FFFFFF; color: #1E3A8A;
      border: none; border-radius: 14px; cursor: pointer;
      font-weight: 800; font-size: 15px; letter-spacing: -.1px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, .25);
      transition: transform .12s, box-shadow .12s;
    }
    .d-active-ride .ar-end:hover { transform: translateY(-2px); box-shadow: 0 16px 32px rgba(15, 23, 42, .32); }
    .d-active-ride .ar-end:disabled { opacity: .65; cursor: not-allowed; transform: none; }
    .d-active-ride .ar-cancel {
      background: transparent; color: #FFFFFF; border: 1px solid rgba(255,255,255,.5);
      padding: 10px 14px; border-radius: 12px; cursor: pointer;
      font-size: 13px; font-weight: 600;
      transition: background .12s;
    }
    .d-active-ride .ar-cancel:hover { background: rgba(255,255,255,.12); }
    @media (max-width: 720px) {
      .d-active-ride { grid-template-columns: 1fr; }
      .d-active-ride .ar-actions { flex-direction: row; }
    }

    /* ─── Live bike marker animation ─────────────────────── */
    @keyframes bikePulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.08); }
    }

    /* ─── Mode tab additions: pricing chip ───────────────── */
    .d-payg-chip {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 8px;
      padding: 4px 10px; border-radius: 999px;
      background: rgba(45, 127, 249, .12); color: #1E5BC6;
      font-size: 11px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
    }
    .d-mode-btn.active .d-payg-chip { background: rgba(34, 197, 94, .18); color: #15803D; }

    /* ─── Duration picker ─────────────────────────────── */
    .d-duration-pill.payg {
      border-color: var(--d-primary); color: var(--d-primary);
      background: linear-gradient(135deg, #EFF6FF 0%, #ECFDF5 100%);
    }
    .d-duration-pill.payg.selected {
      background: linear-gradient(135deg, var(--d-primary) 0%, #5B9BFF 100%);
      color: #FFFFFF; border-color: transparent;
    }

    /* ===========================================================
       Booking wizard — clean step-by-step modal (User dashboard)
       Calm white + soft mint accents (no heavy green).
       =========================================================== */
    .bw-modal {
      max-width: 760px !important;
      width: min(96vw, 760px);
      max-height: min(92vh, 760px);
      border-radius: 20px;
      background: #FFFFFF;
      box-shadow: 0 24px 50px rgba(15, 23, 42, 0.12);
      display: flex; flex-direction: column;
      overflow: hidden;
      animation: bwModalIn .25s ease;
    }
    @keyframes bwModalIn { from { opacity: 0; transform: translateY(12px) scale(.985); } to { opacity: 1; transform: none; } }

    .bw-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 20px 24px 0;
      gap: 14px;
    }
    .bw-head .bw-title { font-size: 17px; font-weight: 600; color: #0F172A; margin: 0; letter-spacing: -.01em; }
    .bw-head .bw-sub   { font-size: 12.5px; color: #64748B; margin-top: 2px; font-weight: 400; }
    .bw-close {
      flex: 0 0 32px;
      width: 32px; height: 32px;
      border-radius: 999px;
      background: #F1F5F9;
      border: 1px solid transparent;
      color: #475569;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background .15s ease, color .15s ease, transform .15s ease;
    }
    .bw-close:hover { background: #E2E8F0; color: #0F172A; transform: rotate(90deg); }
    .bw-close:focus-visible { outline: 2px solid #BBF7D0; outline-offset: 2px; }

    /* Progress strip */
    .bw-steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 16px 24px 4px;
    }
    .bw-step {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #94A3B8; font-weight: 500;
    }
    .bw-step .num {
      width: 22px; height: 22px; border-radius: 999px;
      background: #F1F5F9; color: #64748B;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500;
      transition: background .2s ease, color .2s ease;
    }
    .bw-step.done  .num { background: #DCFCE7; color: #16A34A; }
    .bw-step.active .num { background: #16A34A; color: #FFFFFF; }
    .bw-step.active { color: #0F172A; }
    .bw-step.done   { color: #16A34A; }
    .bw-progress {
      height: 2px;
      background: #F1F5F9;
      border-radius: 999px;
      margin: 0 24px 10px;
      overflow: hidden;
    }
    .bw-progress > span {
      display: block;
      height: 100%;
      background: #16A34A;
      transition: width .35s cubic-bezier(.4,0,.2,1);
    }

    .bw-body {
      padding: 14px 24px 18px;
      overflow: auto;
      flex: 1;
      background: #FFFFFF;
      animation: bwStepIn .22s ease;
    }
    @keyframes bwStepIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .bw-step-title { font-size: 14px; font-weight: 500; color: #0F172A; margin: 2px 0 4px; }
    .bw-step-hint  { font-size: 12.5px; color: #64748B; margin: 0 0 14px; font-weight: 400; }

    /* Choice cards (Step 1 ride type + Step 3 pricing) */
    .bw-choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 560px) { .bw-choice-grid { grid-template-columns: 1fr; } }
    .bw-choice {
      text-align: left; cursor: pointer;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #E2E8F0;
      background: #FFFFFF;
      display: flex; flex-direction: column; gap: 6px;
      transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }
    .bw-choice:hover { border-color: #CBD5E1; box-shadow: 0 4px 10px rgba(15,23,42,.04); }
    .bw-choice.selected {
      border-color: #86EFAC;
      background: #F0FDF4;
      box-shadow: none;
    }
    .bw-choice .ico {
      width: 30px; height: 30px; border-radius: 9px;
      background: #F0FDF4; color: #16A34A;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .bw-choice .lbl { font-weight: 500; font-size: 14px; color: #0F172A; }
    .bw-choice .meta { font-size: 12.5px; color: #64748B; line-height: 1.45; font-weight: 400; }

    /* Bike list */
    .bw-bike-list {
      display: grid; grid-template-columns: 1fr; gap: 10px;
      max-height: 320px; overflow: auto;
      padding-right: 4px;
    }
    .bw-bike-card {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid #E2E8F0;
      background: #FFFFFF;
      cursor: pointer; text-align: left;
      transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }
    .bw-bike-card:hover { border-color: #CBD5E1; box-shadow: 0 4px 10px rgba(15,23,42,.04); }
    .bw-bike-card.selected {
      border-color: #86EFAC;
      background: #F0FDF4;
    }
    .bw-bike-card .bw-bike-ico {
      width: 36px; height: 36px; border-radius: 10px;
      background: #F1F5F9; color: #475569;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .bw-bike-card.selected .bw-bike-ico { background: #DCFCE7; color: #16A34A; }
    .bw-bike-card .bw-bike-main { flex: 1; min-width: 0; }
    .bw-bike-card .bw-bike-code { font-weight: 500; font-size: 13.5px; color: #0F172A; display: block; }
    .bw-bike-card .bw-bike-meta { font-size: 12px; color: #64748B; font-weight: 400; }
    .bw-bike-card .bw-bike-tag {
      font-size: 11px; font-weight: 500;
      padding: 4px 9px; border-radius: 999px;
      background: #F1F5F9; color: #475569;
    }
    .bw-bike-card.selected .bw-bike-tag { background: #DCFCE7; color: #16A34A; }
    .bw-empty {
      padding: 18px 14px;
      border: 1px dashed #CBD5E1;
      border-radius: 12px;
      color: #64748B; font-size: 13px;
      text-align: center;
      background: #FFFFFF;
    }
    .bw-hint {
      margin-top: 10px;
      font-size: 12.5px;
      color: #64748B;
      text-align: center;
      font-weight: 400;
    }

    /* Detail row layout (calendar / time / pricing) */
    .bw-grid { display: grid; gap: 16px; grid-template-columns: 1.05fr 1fr; }
    @media (max-width: 640px) { .bw-grid { grid-template-columns: 1fr; } }

    .bw-section { display: flex; flex-direction: column; gap: 10px; }
    .bw-label { font-size: 11.5px; font-weight: 500; color: #64748B; letter-spacing: .04em; text-transform: uppercase; }

    .bw-duration-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .bw-duration-pill {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid #E2E8F0;
      background: #FFFFFF;
      font-size: 12.5px; font-weight: 400; color: #475569;
      cursor: pointer;
      transition: border-color .15s ease, color .15s ease, background .15s ease;
    }
    .bw-duration-pill:hover { border-color: #CBD5E1; color: #0F172A; }
    .bw-duration-pill.selected {
      background: #F0FDF4;
      color: #15803D;
      border-color: #86EFAC;
      font-weight: 500;
    }

    /* Review card */
    .bw-review {
      border-radius: 14px;
      background: #FFFFFF;
      border: 1px solid #E2E8F0;
      padding: 14px 16px;
    }
    .bw-review-row {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 7px 0;
      font-size: 13px;
      border-bottom: 1px solid #F1F5F9;
    }
    .bw-review-row:last-child { border-bottom: none; }
    .bw-review-row .k { color: #64748B; font-weight: 400; }
    .bw-review-row .v { color: #0F172A; font-weight: 500; text-align: right; }
    .bw-review-total {
      margin-top: 4px;
      padding-top: 10px;
      border-top: 1px solid #E2E8F0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .bw-review-total .k { font-size: 13px; color: #0F172A; font-weight: 500; }
    .bw-review-total .v { font-size: 18px; color: #16A34A; font-weight: 600; }
    .bw-note {
      margin-top: 8px;
      font-size: 12px;
      color: #64748B;
      line-height: 1.55;
      font-weight: 400;
    }

    /* Validation message */
    .bw-validation {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px;
      border-radius: 10px;
      background: #FEF3C7;
      color: #92400E;
      border: 1px solid #FDE68A;
      font-size: 12.5px;
      font-weight: 400;
      margin-top: 10px;
      animation: bwFade .25s ease;
    }
    @keyframes bwFade { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: none; } }

    /* Sticky footer */
    .bw-foot {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
      padding: 14px 24px;
      background: #FFFFFF;
      border-top: 1px solid #F1F5F9;
    }
    .bw-btn {
      appearance: none; border: none;
      padding: 9px 18px;
      font-size: 13.5px; font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s ease, color .15s ease, transform .15s ease, box-shadow .15s ease;
    }
    .bw-btn:disabled { opacity: .55; cursor: not-allowed; }
    .bw-btn.ghost {
      background: transparent;
      color: #475569;
      border: 1px solid #E2E8F0;
    }
    .bw-btn.ghost:hover:not(:disabled) { background: #F8FAFC; color: #0F172A; border-color: #CBD5E1; }
    .bw-btn.primary {
      background: #16A34A;
      color: #FFFFFF;
    }
    .bw-btn.primary:hover:not(:disabled) { background: #15803D; }
    .bw-btn.primary:active:not(:disabled) { transform: translateY(1px); }

    /* Compact calendar reuse */
    .bw-cal {
      border: 1px solid #E2E8F0;
      border-radius: 14px;
      padding: 10px;
      background: #FFFFFF;
    }
    .bw-cal .d-cal-head { padding: 0 4px 6px; }
    .bw-cal .d-cal-grid { padding: 0; }

    .bw-times {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
      max-height: 168px; overflow: auto;
      padding-right: 2px;
    }
    .bw-time {
      padding: 7px 6px;
      border-radius: 10px;
      border: 1.5px solid #E2E8F0;
      background: #FFFFFF;
      color: #334155; font-size: 12px; font-weight: 500;
      cursor: pointer;
      transition: border-color .15s ease, background .15s ease, color .15s ease;
    }
    .bw-time:hover:not(:disabled) { border-color: #BBF7D0; }
    .bw-time.selected { background: #15803D; color: #FFFFFF; border-color: transparent; }
    .bw-time:disabled { opacity: .45; cursor: not-allowed; text-decoration: line-through; }

    /* ─── Nearby bikes list (right column under map) ─────── */
    .d-bike-feed {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      padding: 0 24px 22px;
    }
    .d-bike-card {
      background: var(--d-card);
      border: 1px solid var(--d-border);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color .12s, transform .12s, box-shadow .12s;
      display: flex; flex-direction: column; gap: 6px;
    }
    .d-bike-card:hover {
      border-color: var(--d-green);
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(15, 23, 42, .08);
    }
    .d-bike-card .code { font-weight: 800; font-size: 14px; letter-spacing: -.1px; }
    .d-bike-card .meta { font-size: 12px; color: var(--d-muted); }
    .d-bike-card .dist {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700;
      color: var(--d-green-d);
      padding: 2px 8px; border-radius: 999px;
      background: var(--d-green-soft); align-self: flex-start;
    }
    .d-bike-card .bike-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }
    .d-bike-card .bike-row .code {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .d-bike-card .bike-chip {
      flex: 0 0 auto;
      padding: 3px 8px;
      border-radius: 999px;
      background: #DCFCE7;
      color: #15803D;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .d-bike-card .bike-station {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .d-bike-card .bike-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
    }
    .d-bike-card .book-bike-mini {
      border: 0;
      border-radius: 10px;
      padding: 7px 10px;
      background: var(--d-primary);
      color: #fff;
      font: 800 11.5px "Inter", system-ui, sans-serif;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s, background .12s;
    }
    .d-bike-card .book-bike-mini:hover {
      background: var(--d-green-d);
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(34,197,94,.18);
    }
    .d-active-booking-note {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin: 0 0 14px;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid #BFDBFE;
      background: #EFF6FF;
      color: #1E3A8A;
      font-size: 13px;
      line-height: 1.4;
    }

    /* ─── Compact "you have an active ride" pill on dashboard ─── */
    .d-active-pill {
      display: flex; align-items: center; gap: 14px;
      background: linear-gradient(135deg, #ECFDF5 0%, #F0FDF4 100%);
      border: 1px solid #BBF7D0;
      border-radius: var(--d-radius);
      padding: 14px 16px;
      box-shadow: 0 6px 20px rgba(34, 197, 94, .14);
    }
    .d-active-pill .dot {
      width: 10px; height: 10px; border-radius: 50%; background: #22C55E;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, .22);
      animation: arPulse 1.6s ease-in-out infinite;
      flex-shrink: 0;
    }
    .d-active-pill-body { flex: 1; min-width: 0; line-height: 1.4; }
    .d-active-pill-body strong { display: block; color: var(--d-ink); font-size: 14px; }
    .d-active-pill-body span { display: block; color: var(--d-muted); font-size: 12.5px; }
    .d-active-pill-cta {
      padding: 9px 14px; border-radius: 10px;
      background: var(--d-ink); color: #FFFFFF;
      font-weight: 700; font-size: 13px; white-space: nowrap;
      transition: transform .12s, box-shadow .12s;
    }
    .d-active-pill-cta:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(15, 23, 42, .25); }

    /* ─── Map control buttons (Me / CBD) ─────────────────── */
    .d-map-buttons {
      position: absolute; right: 16px; top: 16px;
      display: flex; flex-direction: column; gap: 8px; z-index: 5;
    }
    .d-mapbtn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 12px;
      background: #FFFFFF; color: var(--d-ink);
      border: 1px solid var(--d-border);
      border-radius: 12px; cursor: pointer;
      font-family: inherit; font-weight: 700; font-size: 13px;
      box-shadow: var(--d-shadow);
      transition: border-color .12s, background .12s, transform .12s;
    }
    .d-mapbtn:hover:not(:disabled) { border-color: var(--d-border-2); transform: translateY(-1px); }
    .d-mapbtn:disabled { opacity: .55; cursor: not-allowed; }

    .d-bike-map-controls {
      position: absolute;
      left: 16px;
      top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 5;
      max-width: min(240px, calc(100% - 120px));
    }
    .d-bike-toggle {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 38px;
      padding: 8px 11px;
      border: 1px solid var(--d-border);
      border-radius: 12px;
      background: rgba(255, 255, 255, .94);
      color: var(--d-ink);
      box-shadow: var(--d-shadow);
      font-size: 12.5px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(8px);
      transition: border-color .12s, background .12s, transform .12s;
    }
    .d-bike-toggle:hover { border-color: #BBF7D0; background: #F0FDF4; transform: translateY(-1px); }
    .d-bike-toggle input {
      width: 16px;
      height: 16px;
      accent-color: var(--d-green);
      margin: 0;
      flex: 0 0 auto;
    }
    .d-bike-toggle[aria-disabled="true"] {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }
    .d-bike-toggle-count {
      margin-left: auto;
      color: var(--d-muted);
      font-size: 11.5px;
      font-weight: 700;
    }

    .d-bike-info {
      min-width: 210px;
      max-width: 260px;
      color: #0F172A;
      font-family: "Inter", system-ui, sans-serif;
    }
    .d-bike-info h3 {
      margin: 0 0 4px;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 800;
      color: #0F172A;
    }
    .d-bike-info .sub {
      margin: 0 0 10px;
      color: #64748B;
      font-size: 12px;
      line-height: 1.35;
    }
    .d-bike-info-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 5px 0;
      border-top: 1px solid #F1F5F9;
      font-size: 12px;
    }
    .d-bike-info-row span:first-child { color: #64748B; }
    .d-bike-info-row strong { color: #0F172A; font-weight: 700; text-align: right; }
    .d-bike-info-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      text-transform: capitalize;
    }
    .d-bike-info-badge.available { background: #DCFCE7; color: #15803D; }
    .d-bike-info-badge.in_use { background: #DBEAFE; color: #1D4ED8; }
    .d-bike-info-badge.maintenance { background: #FEF3C7; color: #B45309; }
    .d-bike-info button {
      width: 100%;
      height: 36px;
      margin-top: 12px;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, #22C55E 0%, #16A34A 100%);
      color: #FFFFFF;
      font: 800 12.5px "Inter", system-ui, sans-serif;
      cursor: pointer;
    }
    .d-bike-info-note {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #F8FAFC;
      color: #64748B;
      font-size: 12px;
      line-height: 1.35;
    }

    /* ─── Location permission hint ─────────────────────── */
    .d-loc-hint {
      position: absolute; left: 16px; top: 110px;
      max-width: 320px;
      background: rgba(15, 23, 42, .9); color: #FFFFFF;
      padding: 12px 14px; border-radius: 12px;
      font-size: 13px; line-height: 1.45;
      display: flex; gap: 10px; align-items: flex-start;
      z-index: 6;
      box-shadow: var(--d-shadow-lg);
    }
    .d-loc-hint button {
      background: #FFFFFF; color: #0F172A; border: none;
      padding: 6px 12px; border-radius: 8px;
      font-weight: 700; font-size: 12px; cursor: pointer;
      margin-top: 6px;
    }

    @media (max-width: 760px) {
      .d-bike-map-controls {
        left: 12px;
        top: 12px;
