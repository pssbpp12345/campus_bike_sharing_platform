    /* Helpers */
    const fmtRelative = (ts) => {
      const diff = Math.max(1, Math.floor((Date.now() - ts) / 1000));
      if (diff < 60) return diff + "s ago";
      if (diff < 3600) return Math.floor(diff/60) + "m ago";
      if (diff < 86400) return Math.floor(diff/3600) + "h ago";
      return Math.floor(diff/86400) + "d ago";
    };
    const availabilityClass = (b, c) => {
      if (b === 0) return "empty";
      const r = b/c;
      if (r >= 0.5) return "high";
      if (r >= 0.25) return "medium";
      return "low";
    };
    const availabilityColor = (cls) => ({ high: "#22C55E", medium: "#84CC16", low: "#2D7FF9", empty: "#94A3B8" })[cls];

    /* NOTE: The local UserMenu and NotifPanel that used to live here were
       removed. The dashboard now uses the shared <window.UserTopbar/> which
       has its own UserMenu/NotifPanel from user-shared.js. Keeping local
       function declarations with the same names (NotifPanel / UserMenu) here
       caused them to override the shared ones at script-global scope, which
       crashed the page when the bell was clicked (the local NotifPanel
       expected a `notifications` prop while the shared topbar passes `items`,
       so `notifications.length` threw and React unmounted everything). */

    /* ── Pricing (Sydney bike-share style) ──────────────── */
    const PRICING = {
      unlockFee: 1.00,
      perMinute: 0.20,
      perMinuteFee: 0.20,
      minimumRideDuration: 5,
      maximumRideDuration: 180,
      currency: "AUD",
      symbol: "$",
    };
    function applyPublicPricing(settings) {
      const pricing = settings && settings.pricing;
      if (!pricing) return;
      PRICING.unlockFee = Number(pricing.unlockFee ?? PRICING.unlockFee);
      PRICING.perMinute = Number(pricing.perMinuteFee ?? PRICING.perMinute);
      PRICING.perMinuteFee = PRICING.perMinute;
      PRICING.minimumRideDuration = Number(pricing.minimumRideDuration ?? PRICING.minimumRideDuration);
      PRICING.maximumRideDuration = Number(pricing.maximumRideDuration ?? PRICING.maximumRideDuration);
      PRICING.currency = settings.currency || PRICING.currency;
      PRICING.symbol = PRICING.currency === "AUD" || PRICING.currency === "USD" ? "$" : PRICING.currency + " ";
    }
    function calcCost(durationMin) {
      return PRICING.unlockFee + PRICING.perMinute * durationMin;
    }
    function fmtPrice(amount) {
      return PRICING.symbol + amount.toFixed(2);
    }

    /* ── Booking calendar helpers ────────────────────────── */
    // Parse "6:00 AM – 10:00 PM" (or "24 hours") → [openHour, closeHour]
    function parseHours(str) {
      if (!str) return [6, 22];
      if (/24/.test(str)) return [0, 24];
      const m = str.match(/(\d+):(\d+)\s*(AM|PM)\s*[–-]\s*(\d+):(\d+)\s*(AM|PM)/i);
      if (!m) return [6, 22];
      const to24 = (h, mer) => ((parseInt(h, 10) % 12) + (/PM/i.test(mer) ? 12 : 0));
      return [to24(m[1], m[3]), to24(m[4], m[6])];
    }
    function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
    function sameDay(a, b) { return startOfDay(a).getTime() === startOfDay(b).getTime(); }
    function fmtHM(h, m) { const d = new Date(); d.setHours(h, m, 0, 0); return d.toLocaleTimeString("en-AU", { hour: "numeric", minute: "2-digit", hour12: true }); }
    function buildMonthGrid(year, month) {
      const first = new Date(year, month, 1);
      const startWeekday = first.getDay(); // 0 = Sunday
      const daysIn = new Date(year, month + 1, 0).getDate();
      const cells = [];
      // Leading days from previous month
      for (let i = startWeekday - 1; i >= 0; i--) cells.push({ d: new Date(year, month, -i), inMonth: false });
      for (let i = 1; i <= daysIn; i++) cells.push({ d: new Date(year, month, i), inMonth: true });
      while (cells.length % 7 !== 0) cells.push({ d: new Date(year, month, daysIn + (cells.length % 7)), inMonth: false });
      // Pad to 6 rows for stable height
      while (cells.length < 42) {
        const last = cells[cells.length - 1].d;
        cells.push({ d: new Date(last.getFullYear(), last.getMonth(), last.getDate() + 1), inMonth: false });
      }
      return cells;
    }
    // Reserve for Later only — Ride Now is always PAYG with no fixed duration
    const BASE_RESERVE_DURATIONS = [
      { v: 5,   label: "5 min" },
      { v: 10,  label: "10 min" },
      { v: 15,  label: "15 min" },
      { v: 30,  label: "30 min" },
      { v: 60,  label: "1 hour" },
      { v: 120, label: "2 hours" },
      { v: 300, label: "5 hours" },
    ];
    const ACTIVE_FIXED_STATUSES = new Set(["pending", "confirmed", "active", "scheduled", "upcoming"]);
    function fixedWindowFromBooking(b) {
      if (!b) return null;
      const status = String(b.status || b.bookingStatus || b.booking_status || "pending").toLowerCase();
      if (status && !ACTIVE_FIXED_STATUSES.has(status)) return null;
      const startRaw = b.startTime || b.start_time || b.start;
      const endRaw = b.endTime || b.end_time || b.end;
      const duration = Number(b.durationMinutes ?? b.duration_minutes ?? b.duration ?? 0);
      if (!startRaw || !endRaw || !Number.isFinite(duration) || duration <= 0) return null;
      const start = new Date(startRaw);
      const end = new Date(endRaw);
      if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime()) || end <= start) return null;
      return {
        id: b.bookingId || b.booking_id || b.id,
        bikeId: b.bikeId || b.bike_id,
        bikeCode: b.bikeCode || b.bike_code,
        start,
        end,
      };
    }
    function rangesOverlap(aStart, aEnd, bStart, bEnd) {
      return aStart < bEnd && aEnd > bStart;
    }
    function findFixedBookingOverlap(bookings, start, end, bikeId = null) {
      if (!Array.isArray(bookings) || !start || !end) return null;
      return bookings
        .map(fixedWindowFromBooking)
        .filter(Boolean)
        .find(b => {
          if (bikeId != null && String(b.bikeId) !== String(bikeId)) return false;
          return rangesOverlap(start, end, b.start, b.end);
        }) || null;
    }

    /* ── Booking modal: step-by-step wizard (Ride type → Bike → Details → Review) ── */
    function BookingModal({ station, existingBookings, stations, hasActiveRide, savedPaymentMethod, onClose, onConfirm, pushToast }) {
      const today = useMemo(() => startOfDay(new Date()), []);
      const presetBike = station && station._presetBike;
      const [step, setStep] = useState(1);
      const [validation, setValidation] = useState("");
      const [viewYM, setViewYM] = useState(() => ({ y: today.getFullYear(), m: today.getMonth() }));
      const [selectedDay, setSelectedDay] = useState(today);
      const [selectedTime, setSelectedTime] = useState(null);
      const [duration, setDuration] = useState(60); // only used when payMode === "fixed"
      const [paymentLoading, setPaymentLoading] = useState(false);
      // Save-card opt-in shown only on the Review step. Default true because
      // most users benefit from one-tap future bookings and PAYG requires it.
      const [saveCard, setSaveCard] = useState(true);
      const [bookingMode, setBookingMode] = useState(null); // null until user picks at step 1
      const [payMode, setPayMode] = useState("fixed");      // "fixed" or "payg" — Reserve Later only
      const [availableBikes, setAvailableBikes] = useState([]);
      const [selectedBikeId, setSelectedBikeId] = useState(presetBike ? String(presetBike.id) : null);
      const [bikesLoading, setBikesLoading] = useState(false);
      const [bikesError, setBikesError] = useState("");

      // ESC closes the modal
      useEffect(() => {
        const onKey = (e) => { if (e.key === "Escape") onClose(); };
        document.addEventListener("keydown", onKey);
        return () => document.removeEventListener("keydown", onKey);
      }, [onClose]);

      // Clear the validation note whenever the user moves forward
      useEffect(() => { setValidation(""); }, [step, bookingMode, selectedBikeId, selectedDay, selectedTime, duration, payMode]);

      const [openH, closeH] = useMemo(() => parseHours(station && station.hours), [station]);
      const isRideNow = bookingMode === "ride_now";
      const isReserve = bookingMode === "scheduled";
      const reserveDurations = BASE_RESERVE_DURATIONS.filter(d =>
        d.v >= Number(PRICING.minimumRideDuration || 1) &&
        d.v <= Number(PRICING.maximumRideDuration || 480)
      );
      const reserveDurationKey = reserveDurations.map(d => d.v).join(",");
      useEffect(() => {
        if (reserveDurations.length && !reserveDurations.some(d => d.v === duration)) {
          setDuration(reserveDurations[0].v);
        }
      }, [reserveDurationKey]);

      // Generate 30-minute slots within station hours
      const slots = useMemo(() => {
        const arr = [];
        const slotWindowMin = (!isRideNow && payMode === "fixed") ? duration : 30;
        const lastSlotMin = (closeH * 60) - slotWindowMin; // can't start past the station window
        for (let mins = openH * 60; mins <= lastSlotMin; mins += 30) {
          arr.push({ h: Math.floor(mins / 60), m: mins % 60 });
        }
        return arr;
      }, [openH, closeH, duration, bookingMode, payMode]);

      // Upcoming bookings are unlimited, but fixed-duration time windows cannot overlap.
      const conflictsBy = useMemo(() => {
        const map = {};
        if (bookingMode === "ride_now" || payMode !== "fixed" || !selectedDay || !slots.length) return map;
        slots.forEach(s => {
          const start = new Date(selectedDay);
          start.setHours(s.h, s.m, 0, 0);
          const end = new Date(start.getTime() + duration * 60000);
          const conflict = findFixedBookingOverlap(existingBookings, start, end);
          if (conflict) map[`${String(s.h).padStart(2,"0")}:${String(s.m).padStart(2,"0")}`] = conflict;
        });
        return map;
      }, [existingBookings, selectedDay, slots, duration, bookingMode, payMode]);

      // Auto-pick the first available future slot when day/duration changes
      useEffect(() => {
        if (!slots.length) { setSelectedTime(null); return; }
        const isToday = sameDay(selectedDay, new Date());
        const nowMin = isToday ? (new Date().getHours() * 60 + new Date().getMinutes()) : -Infinity;
        const firstOk = slots.find(s => {
          const slotMin = s.h * 60 + s.m;
          if (slotMin <= nowMin) return false;
          const time = `${String(s.h).padStart(2,"0")}:${String(s.m).padStart(2,"0")}`;
          if (conflictsBy[time]) return false;
          return true;
        });
        if (firstOk) setSelectedTime(`${String(firstOk.h).padStart(2,"0")}:${String(firstOk.m).padStart(2,"0")}`);
        else setSelectedTime(null);
      }, [slots, selectedDay, duration, conflictsBy]); // eslint-disable-line

      if (!station) return null;

      const monthCells = useMemo(() => buildMonthGrid(viewYM.y, viewYM.m), [viewYM]);
      const monthLabel = new Date(viewYM.y, viewYM.m, 1).toLocaleDateString("en-AU", { month: "long", year: "numeric" });

      // Disable navigating before current month
      const canGoPrev = (viewYM.y > today.getFullYear()) || (viewYM.y === today.getFullYear() && viewYM.m > today.getMonth());
      // Limit forward navigation to 3 months ahead
      const maxDate = new Date(today.getFullYear(), today.getMonth() + 3, 1);
      const canGoNext = (viewYM.y < maxDate.getFullYear()) || (viewYM.y === maxDate.getFullYear() && viewYM.m < maxDate.getMonth());

      const isToday = sameDay(selectedDay, new Date());
      const nowMin = isToday ? (new Date().getHours() * 60 + new Date().getMinutes()) : -Infinity;

      const computedConflict = (() => {
        if (!selectedTime) return null;
        const [hh, mm] = selectedTime.split(":").map(Number);
        if (bookingMode === "ride_now" || payMode !== "fixed") return null;
        const start = new Date(selectedDay);
        start.setHours(hh, mm, 0, 0);
        const end = new Date(start.getTime() + duration * 60000);
        return findFixedBookingOverlap(existingBookings, start, end);
      })();

      const startDt = (() => {
        if (!selectedTime) return null;
        const [hh, mm] = selectedTime.split(":").map(Number);
        const d = new Date(selectedDay);
        d.setHours(hh, mm, 0, 0);
        return d;
      })();
      // For PAYG reserve we still need to check availability — use an 8h window
      // Short pickup hold window for Reserve Pay-As-You-Go.
      const fixedDurationMin = payMode === "fixed" ? duration : 30;
      const endDt = startDt ? new Date(startDt.getTime() + fixedDurationMin * 60000) : null;
      const co2 = (fixedDurationMin / 60 * 0.6).toFixed(1);
      const summaryStartDt = isRideNow ? new Date() : startDt;
      const summaryEndDt = (isRideNow || payMode === "payg") ? null : (startDt ? new Date(startDt.getTime() + duration * 60000) : null);
      const scheduledStartIso = !isRideNow && startDt ? startDt.toISOString() : "";
      const scheduledEndIso = !isRideNow && endDt ? endDt.toISOString() : "";
      const selectedBike = availableBikes.find(b => String(b.id) === String(selectedBikeId)) || null;

      useEffect(() => {
        if (!station || !station.id) return;
        if (!bookingMode) {
          // Step 1 — no ride type chosen yet, don't fetch.
          setAvailableBikes([]);
          setBikesLoading(false);
          setBikesError("");
          return;
        }
        // For Reserve Later, we only have a usable time once the user has
        // picked a date/time at step 3. Up to that point we load the "now"
        // availability list so they can still see which bikes exist; bike
        // selection happens at step 2 either way.
        let alive = true;
        const useScheduled = isReserve && scheduledStartIso && scheduledEndIso;
        const path = useScheduled
          ? `/api/user/stations/${encodeURIComponent(station.id)}/bikes/available?start=${encodeURIComponent(scheduledStartIso)}&end=${encodeURIComponent(scheduledEndIso)}`
          : `/api/user/stations/${encodeURIComponent(station.id)}/bikes/available-now`;

        setBikesLoading(true);
        setBikesError("");
        setAvailableBikes([]);
        if (!presetBike) setSelectedBikeId(null);
        window.cbsApi(path)
          .then((data) => {
            if (!alive) return;
            const bikes = Array.isArray(data && data.bikes) ? data.bikes : [];
            setAvailableBikes(bikes);
            if (presetBike && bikes.find(b => String(b.id) === String(presetBike.id))) {
              setSelectedBikeId(String(presetBike.id));
            } else if (bikes.length === 1) {
              setSelectedBikeId(String(bikes[0].id));
            }
          })
          .catch((err) => {
            if (!alive) return;
            setBikesError(err.message || "Could not load available bikes.");
          })
          .finally(() => {
            if (alive) setBikesLoading(false);
          });
        return () => { alive = false; };
      }, [station && station.id, bookingMode, isRideNow, payMode, duration, scheduledStartIso, scheduledEndIso]);

      // Reset bike selection whenever the booking details change. This
      // prevents the user from carrying a stale bike from a previous time
      // window into Step 3 — the new order is Details → Bike, so every
      // change at Step 2 must invalidate the previously chosen bike.
      useEffect(() => {
        if (presetBike) return; // preset bikes from the dashboard map don't reset
        setSelectedBikeId(null);
      }, [bookingMode, payMode, duration, scheduledStartIso, scheduledEndIso]);

      // Decide the flow:
      //   ride_now              → start now, no payment, charge at end
      //   reserve_payg          → $1 now, save card, charge final amount at ride end
      //   reserve_paid          → fixed-duration reservation, redirect to Stripe upfront
      const flow = isRideNow
        ? "ride_now"
        : (payMode === "payg" ? "reserve_payg" : "reserve_paid");
      const needsSavedCard = flow === "ride_now" || flow === "reserve_payg";
      const hasSavedCard = Boolean(savedPaymentMethod && savedPaymentMethod.hasSavedPaymentMethod);

      const handleConfirm = async () => {
        if (paymentLoading || !selectedBike) return;
        if (flow === "ride_now" && hasActiveRide) {
          pushToast("Active ride in progress", "You already have an active ride. You can still schedule an upcoming booking.");
          return;
        }
        if (flow === "reserve_paid") {
          if (!startDt || !endDt) return;
          if (computedConflict) {
            pushToast("Time unavailable", "You already have a booking during this time. Please choose another time.");
            return;
          }
          const bikeConflict = findFixedBookingOverlap(existingBookings, startDt, endDt, selectedBike.id);
          if (bikeConflict) {
            pushToast("Bike unavailable", "This bike is already booked during this time. Please choose another bike or time.");
            return;
          }
        }
        if (flow === "reserve_payg" && !startDt) return;
        setPaymentLoading(true);
        try {
          const isFixed = flow === "reserve_paid";
          const finalDuration = isFixed ? duration : 0;
          const finalStart = flow === "ride_now" ? new Date() : startDt;
          const finalEnd = isFixed ? new Date(finalStart.getTime() + duration * 60000) : null;
          // PAYG always requires a saved card (final amount is auto-charged
          // when the ride ends), so we force saveCard=true regardless of the
          // toggle. Fixed-duration bookings honour the user's choice.
          const effectiveSaveCard = isFixed ? saveCard : true;
          await onConfirm({
            flow,
            bookingType: flow === "ride_now" ? "ride_now" : "scheduled",
            stationId: station.id,
            stationName: station.name,
            bikeId: selectedBike.id,
            bikeCode: selectedBike.bike_code,
            bikeModel: selectedBike.model || station.type,
            start: finalStart.toISOString(),
            end: finalEnd ? finalEnd.toISOString() : null,
            duration: finalDuration,
            type: selectedBike.model || station.type,
            pricingMode: isFixed ? "fixed_duration" : "pay_as_you_go",
            unlockFee: PRICING.unlockFee,
            perMinuteFee: PRICING.perMinuteFee,
            totalCost: isFixed ? calcCost(duration) : null,
            cost: isFixed ? calcCost(duration) : null,
            saveCard: effectiveSaveCard,
          });
        } finally {
          setPaymentLoading(false);
        }
      };

      // Steps:
      //   1 — Ride type (Ride Now vs Reserve Later)
      //   2 — Details (date/time/pricing — Ride Now skips through with PAYG)
      //   3 — Choose bike (bike list loads for the EXACT chosen time window)
      //   4 — Review and confirm
      const STEPS = [
        { id: 1, label: "Ride type" },
        { id: 2, label: "Details" },
        { id: 3, label: "Bike" },
        { id: 4, label: "Review" },
      ];

      const progressPct = ((step - 1) / (STEPS.length - 1)) * 100;

      // Per-step validation. Returns "" when OK, else the message to show.
      function validateStep(s = step) {
        if (s >= 1 && !bookingMode) return "Please choose Ride Now or Reserve for Later.";
        if (s >= 2 && isReserve) {
          if (!payMode) return "Please choose a pricing type.";
          if (payMode === "fixed" && !duration) return "Please choose a duration.";
          if (!selectedDay) return "Please pick a date.";
          if (!selectedTime) return "Please pick a pick-up time.";
          if (payMode === "fixed" && computedConflict) {
            return "You already have a booking during this time. Please choose another time.";
          }
        }
        if (s >= 2 && isRideNow && hasActiveRide) {
          return "You already have an active ride. Please end it first.";
        }
        if (s >= 3 && !selectedBike) return "Please select a bike.";
        return "";
      }

      const next = () => {
        const msg = validateStep(step);
        if (msg) { setValidation(msg); return; }
        if (step < STEPS.length) setStep(step + 1);
      };
      const back = () => { if (step > 1) setStep(step - 1); };

      const stepHint = (() => {
        if (step === 1) return "Pick how you'd like to ride.";
        if (step === 2 && isRideNow) return "Ride Now is Pay-As-You-Go. We'll charge the unlock fee now and the final amount when you end the ride.";
        if (step === 2) return "When would you like to ride, and how would you like to pay?";
        if (step === 3) {
          if (bikesLoading) return "Finding bikes for your time window...";
          if (availableBikes.length === 0) return `No bikes available at ${station.name} for this time.`;
          return `${availableBikes.length} bike${availableBikes.length === 1 ? "" : "s"} available at ${station.name} for this time.`;
        }
        if (step === 4) return "One last check before you confirm.";
        return "";
      })();

      // CTA text on the Review step. For fixed-duration bookings without a
      // saved card we surface the save choice in the button label so the
      // user knows what's about to happen.
      const confirmCTA = (() => {
        if (paymentLoading) return hasSavedCard ? "Charging your saved card..." : "Opening Stripe...";
        if (flow === "ride_now")     return hasSavedCard ? "Start Ride" : "Continue";
        if (flow === "reserve_payg") return hasSavedCard ? "Confirm Booking" : "Continue";
        // reserve_paid (fixed duration)
        if (hasSavedCard) return "Pay & Confirm Booking";
        return saveCard ? "Pay & Save Card" : "Pay Now";
      })();

      return (
        <div className="d-overlay" onClick={onClose}>
          <div className="d-modal book bw-modal" onClick={e => e.stopPropagation()} role="dialog" aria-modal="true" aria-label="Book a bike">
            {/* Header with close X */}
            <div className="bw-head">
              <div>
                <h3 className="bw-title">Book a bike</h3>
                <div className="bw-sub">{station.name}{station.address ? " · " + station.address : ""}</div>
              </div>
              <button type="button" className="bw-close" aria-label="Close" onClick={onClose}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>

            {/* Progress strip */}
            <div className="bw-steps">
              {STEPS.map((s) => (
                <div key={s.id} className={"bw-step" + (s.id === step ? " active" : (s.id < step ? " done" : ""))}>
                  <span className="num">{s.id < step ? "✓" : s.id}</span>
                  <span>{s.label}</span>
                </div>
              ))}
            </div>
            <div className="bw-progress"><span style={{ width: progressPct + "%" }}/></div>

            {/* Body — one step at a time */}
            <div className="bw-body" key={step}>
              <h4 className="bw-step-title">
                {step === 1 ? "Choose ride type" :
                 step === 2 ? (isRideNow ? "Ready when you are" : "Pick date, time and pricing") :
                 step === 3 ? "Choose a bike" :
                              "Review your booking"}
              </h4>
              <p className="bw-step-hint">{stepHint}</p>

              {/* ── STEP 1 ── */}
              {step === 1 && (
                <div className="bw-choice-grid">
                  <button type="button" className={"bw-choice" + (isRideNow ? " selected" : "")}
                          onClick={() => setBookingMode("ride_now")}>
                    <span className="ico"><Icon.bike s={18}/></span>
                    <span className="lbl">Ride Now</span>
                    <span className="meta">I'm here and need a bike right now.</span>
                  </button>
                  <button type="button" className={"bw-choice" + (isReserve ? " selected" : "")}
                          onClick={() => setBookingMode("scheduled")}>
                    <span className="ico"><Icon.calendar s={18}/></span>
                    <span className="lbl">Reserve for Later</span>
                    <span className="meta">Book a bike for an upcoming time.</span>
                  </button>
                </div>
              )}
              {step === 1 && isRideNow && hasActiveRide && (
                <div className="bw-validation"><Icon.alert s={14}/> You already have an active ride. You can still schedule an upcoming one.</div>
              )}

              {/* ── STEP 2 — Ride Now: short PAYG explainer, no date/time ── */}
              {step === 2 && isRideNow && (
                <div className="bw-section">
                  <div className="bw-choice selected" style={{cursor:"default"}}>
                    <span className="lbl">Pay-As-You-Go</span>
                    <span className="meta">
                      Start now. Pay {fmtPrice(PRICING.unlockFee)} unlock fee now and the final cost ({fmtPrice(PRICING.perMinuteFee)}/min) after the ride ends.
                      {hasSavedCard ? " We'll use your saved card." : " You'll save a card in the next step."}
                    </span>
                  </div>
                </div>
              )}

              {/* ── STEP 2 — Reserve Later: pricing + date + time ── */}
              {step === 2 && isReserve && (
                <div className="bw-grid">
                  {/* LEFT: calendar + time */}
                  <div className="bw-section">
                    <div className="bw-label">Date</div>
                    <div className="bw-cal">
                      <div className="d-cal-head">
                        <span className="d-cal-month">{monthLabel}</span>
                        <div className="d-cal-nav">
                          <button title="Previous month" disabled={!canGoPrev}
                            onClick={() => setViewYM(v => v.m === 0 ? { y: v.y - 1, m: 11 } : { y: v.y, m: v.m - 1 })}>
                            <Icon.chevL/>
                          </button>
                          <button title="Next month" disabled={!canGoNext}
                            onClick={() => setViewYM(v => v.m === 11 ? { y: v.y + 1, m: 0 } : { y: v.y, m: v.m + 1 })}>
                            <Icon.chevR/>
                          </button>
                        </div>
                      </div>
                      <div className="d-cal-grid">
                        {["S","M","T","W","T","F","S"].map((d,i) => <div key={i} className="d-cal-dow">{d}</div>)}
                        {monthCells.map((c, i) => {
                          const past = c.d < today;
                          const isSel = sameDay(c.d, selectedDay);
                          const isTodayCell = sameDay(c.d, new Date());
                          const cls = ["d-cal-cell"];
                          if (!c.inMonth) cls.push("muted");
                          if (isTodayCell) cls.push("today");
                          if (isSel) cls.push("selected");
                          return (
                            <button key={i} className={cls.join(" ")} disabled={past || !c.inMonth}
                              onClick={() => { setSelectedDay(startOfDay(c.d)); }}>
                              {c.d.getDate()}
                            </button>
                          );
                        })}
                      </div>
                    </div>

                    <div className="bw-label" style={{marginTop:8}}>Pick-up time · {fmtHM(openH, 0)} – {fmtHM(closeH % 24, 0)}</div>
                    <div className="bw-times">
                      {slots.length === 0 && <div className="bw-empty" style={{gridColumn:"1 / -1"}}>No slots available for this duration today.</div>}
                      {slots.map(s => {
                        const slotMin = s.h * 60 + s.m;
                        const past = slotMin <= nowMin;
                        const time = `${String(s.h).padStart(2,"0")}:${String(s.m).padStart(2,"0")}`;
                        const conflict = conflictsBy[time];
                        const isSel = selectedTime === time;
                        const cls = ["bw-time"];
                        if (isSel) cls.push("selected");
                        return (
                          <button key={time} className={cls.join(" ")} disabled={past || !!conflict}
                                  title={past ? "In the past" : (conflict ? "You already have a booking during this time." : "")}
                                  onClick={() => setSelectedTime(time)}>
                            {fmtHM(s.h, s.m)}
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  {/* RIGHT: pricing + duration */}
                  <div className="bw-section">
                    <div className="bw-label">Pricing type</div>
                    <div className="bw-choice-grid">
                      <button type="button" className={"bw-choice" + (payMode === "fixed" ? " selected" : "")}
                              onClick={() => setPayMode("fixed")}>
                        <span className="lbl">Fixed duration</span>
                        <span className="meta">Pay upfront for a set duration.</span>
                      </button>
                      <button type="button" className={"bw-choice" + (payMode === "payg" ? " selected" : "")}
                              onClick={() => setPayMode("payg")}>
                        <span className="lbl">Pay-As-You-Go</span>
                        <span className="meta">{fmtPrice(PRICING.unlockFee)} now, final cost charged after ride.</span>
                      </button>
                    </div>

                    {payMode === "fixed" && (
                      <>
                        <div className="bw-label" style={{marginTop:8}}>Duration</div>
                        <div className="bw-duration-row">
                          {reserveDurations.map(d => (
                            <button key={d.label} type="button"
                                    className={"bw-duration-pill" + (duration === d.v ? " selected" : "")}
                                    onClick={() => setDuration(d.v)}>{d.label}</button>
                          ))}
                        </div>
                      </>
                    )}

                    <div className="bw-note">
                      {payMode === "fixed"
                        ? `Total: ${fmtPrice(PRICING.unlockFee)} unlock + ${duration} min × ${PRICING.symbol}${PRICING.perMinuteFee.toFixed(2)} = ${fmtPrice(calcCost(duration))}.`
                        : `${fmtPrice(PRICING.unlockFee)} will be charged now. The final amount is auto-charged when you end the ride.`}
                    </div>
                  </div>
                </div>
              )}
              {step === 2 && isReserve && computedConflict && (
                <div className="bw-validation"><Icon.alert s={14}/> You already have a booking during this time. Please choose another time.</div>
              )}

              {/* ── STEP 3 — Bike list for the chosen time window ── */}
              {step === 3 && (
                <>
                  {bikesLoading && <div className="bw-empty">Loading available bikes for your time...</div>}
                  {!bikesLoading && bikesError && <div className="bw-empty">{bikesError}</div>}
                  {!bikesLoading && !bikesError && availableBikes.length === 0 && (
                    <div className="bw-empty">
                      {isRideNow
                        ? "No bikes are currently available at this station."
                        : "No bikes are available at this station for the selected time. Try another time."}
                    </div>
                  )}
                  {!bikesLoading && !bikesError && availableBikes.length > 0 && (
                    <div className="bw-bike-list">
                      {availableBikes.map((bike) => {
                        const isSelected = String(selectedBikeId) === String(bike.id);
                        return (
                          <button key={bike.id} type="button"
                                  className={"bw-bike-card" + (isSelected ? " selected" : "")}
                                  onClick={() => setSelectedBikeId(String(bike.id))}>
                            <span className="bw-bike-ico"><Icon.bike s={18}/></span>
                            <span className="bw-bike-main">
                              <span className="bw-bike-code">{bike.bike_code}</span>
                              <span className="bw-bike-meta">{bike.model || station.type || "Standard bike"} · {station.name}</span>
                            </span>
                            <span className="bw-bike-tag">Available</span>
                          </button>
                        );
                      })}
                    </div>
                  )}
                  {!bikesLoading && !bikesError && availableBikes.length > 0 && !selectedBike && (
                    <div className="bw-hint">Please select a bike to continue.</div>
                  )}
                </>
              )}

              {/* ── STEP 4 — Review ── */}
              {step === 4 && (
                <div className="bw-review">
                  <div className="bw-review-row"><span className="k">Ride type</span><span className="v">{flow === "ride_now" ? "Ride Now" : (flow === "reserve_payg" ? "Reserve for Later · Pay-As-You-Go" : "Reserve for Later · Fixed duration")}</span></div>
                  <div className="bw-review-row"><span className="k">Station</span><span className="v">{station.name}</span></div>
                  <div className="bw-review-row"><span className="k">Bike</span><span className="v">{selectedBike ? selectedBike.bike_code : "—"}</span></div>
                  <div className="bw-review-row"><span className="k">Bike type</span><span className="v">{selectedBike ? (selectedBike.model || station.type || "Standard") : "—"}</span></div>
                  <div className="bw-review-row"><span className="k">Pick-up</span><span className="v">{summaryStartDt ? summaryStartDt.toLocaleString("en-AU", { weekday:"short", day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" }) : "—"}</span></div>
                  {flow === "reserve_paid" && (
                    <div className="bw-review-row"><span className="k">Drop-off</span><span className="v">{summaryEndDt ? summaryEndDt.toLocaleString("en-AU", { hour:"2-digit", minute:"2-digit" }) : "—"}</span></div>
                  )}
                  <div className="bw-review-row"><span className="k">Pricing</span><span className="v">{flow === "reserve_paid" ? `${fmtPrice(PRICING.unlockFee)} unlock + ${duration} min` : `${fmtPrice(PRICING.unlockFee)} unlock + ${fmtPrice(PRICING.perMinuteFee)}/min`}</span></div>
                  <div className="bw-review-row"><span className="k">Card</span><span className="v">{hasSavedCard ? `${(savedPaymentMethod.card && savedPaymentMethod.card.brand) || "Card"} ending ${(savedPaymentMethod.card && savedPaymentMethod.card.last4) || ""}` : "Saved securely with Stripe"}</span></div>
                  <div className="bw-review-row"><span className="k">CO₂ saved</span><span className="v">~{((flow === "reserve_paid" ? duration : 30) / 60 * 0.6).toFixed(1)} kg</span></div>

                  <div className="bw-review-total">
                    <span className="k">Pay now</span>
                    <span className="v">{flow === "reserve_paid" ? fmtPrice(calcCost(duration)) : fmtPrice(PRICING.unlockFee)}</span>
                  </div>
                  {flow !== "reserve_paid" && (
                    <div className="bw-note">Final ride cost is charged automatically when you end the ride.</div>
                  )}

                  {/* ── Save-card choice ──────────────────────────────
                     Shown only when the user does NOT already have a saved
                     card. PAYG (Ride Now + Reserve PAYG) forces saveCard=true
                     because the final amount is auto-charged after the ride
                     ends — we can't do that without a card on file.
                     Fixed-duration bookings let the user opt in or out. */}
                  {!hasSavedCard && (
                    <div style={{marginTop:14, padding:"12px 14px", border:"1px solid #E2E8F0", borderRadius:12, background:"#F8FAFC"}}>
                      {flow === "reserve_paid" ? (
                        <>
                          <label style={{display:"flex", alignItems:"flex-start", gap:10, cursor:"pointer", fontSize:13, color:"#0F172A"}}>
                            <input type="checkbox" checked={saveCard}
                                   onChange={e => setSaveCard(e.target.checked)}
                                   style={{marginTop:2}}/>
                            <span>
                              <strong style={{fontWeight:500}}>Save this card for future rides</strong>
                              <div style={{marginTop:4, fontSize:12, color:"#64748B", lineHeight:1.55, fontWeight:400}}>
                                By saving your card, you authorise Campus Bike Sharing to securely store your payment method with Stripe for future ride payments, Pay-As-You-Go final charges, and faster checkout. Your raw card details are never stored by Campus Bike Sharing — only the brand, last four digits, and expiry.
                              </div>
                            </span>
                          </label>
                        </>
                      ) : (
                        <div style={{fontSize:12.5, color:"#475569", lineHeight:1.55}}>
                          <strong style={{color:"#0F172A", fontWeight:500}}>Card will be saved</strong>
                          <div style={{marginTop:4, color:"#64748B", fontWeight:400}}>
                            Pay-As-You-Go requires a saved card because the final ride amount is charged automatically when the ride ends. Your card is stored securely with Stripe — only the brand, last four digits, and expiry are kept by Campus Bike Sharing.
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {validation && (
                <div className="bw-validation"><Icon.alert s={14}/> {validation}</div>
              )}
            </div>

            {/* Sticky footer */}
            <div className="bw-foot">
              <button type="button" className="bw-btn ghost" onClick={step > 1 ? back : onClose}>
                {step > 1 ? "Back" : "Cancel"}
              </button>
              {step < STEPS.length ? (
                <button type="button" className="bw-btn primary" onClick={next}
                        title={validateStep(step) || ""}
                        disabled={
                          paymentLoading ||
                          (step === 1 && !bookingMode) ||
                          (step === 2 && !!validateStep(2)) ||
                          (step === 3 && (bikesLoading || !selectedBike))
                        }>
                  Next
                </button>
              ) : (
                <button type="button" className="bw-btn primary"
                        disabled={paymentLoading || !selectedBike || (flow === "ride_now" && hasActiveRide) || (flow === "reserve_paid" && !!computedConflict)}
                        onClick={handleConfirm}>
                  {confirmCTA}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* Report-issue modal */
    function ReportModal({ station, onClose, onSubmit }) {
      const [category, setCategory] = useState("Damaged bike");
      const [details, setDetails] = useState("");
      return (
        <div className="d-overlay" onClick={onClose}>
          <div className="d-modal" onClick={e => e.stopPropagation()}>
            <div className="d-modal-head">
              <h3>Report an issue</h3>
              <p>{station ? station.name : "General feedback"}</p>

    /* The map */
    function MapPanel({ stations, selectedId, onSelect, userLoc, locStatus, onRequestLocation, myRideAnim }) {
      const mapEl = useRef(null);
      const mapRef = useRef(null);
      const markersRef = useRef([]);
      const userMarkerRef = useRef(null);
      const rideMarkerRef = useRef(null);
      const onSelectRef = useRef(onSelect);
      useEffect(() => { onSelectRef.current = onSelect; }, [onSelect]);
      const [status, setStatus] = useState("loading");
      const [mapReady, setMapReady] = useState(false);

      useEffect(() => {
        if (window.__gmapsReady) { setStatus("ready"); return; }
        if (window.__gmapsFailed) { setStatus("error"); return; }
        const onReady = () => setStatus("ready");
        const onErr   = () => setStatus("error");
        window.addEventListener("gmapsReady", onReady);
        window.addEventListener("gmapsError", onErr);
        const t = setTimeout(() => { if (!window.__gmapsReady) setStatus("error"); }, 10000);
        return () => { window.removeEventListener("gmapsReady", onReady); window.removeEventListener("gmapsError", onErr); clearTimeout(t); };
      }, []);

      useEffect(() => {
        if (status !== "ready" || !mapEl.current || mapRef.current) return;
        try {
          mapRef.current = new google.maps.Map(mapEl.current, {
            center: SYDNEY_CENTER, // Always start on CBD; user location only adjusts via the "Me" button.
            zoom: 14,
            mapTypeControl: false,
            streetViewControl: false,
            fullscreenControl: false,
            zoomControl: true,
            zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER },
            styles: [
              { featureType: "poi", stylers: [{ visibility: "off" }] },
              { featureType: "transit.station", stylers: [{ visibility: "simplified" }] },
            ],
          });
          setMapReady(true);
        } catch (e) { console.error("[map] init failed", e); setStatus("error"); }
      }, [status]);

      // User marker (blue dot with ring) — only renders when location is granted.
      useEffect(() => {
        if (!mapReady || !mapRef.current) return;
        if (!userLoc) {
          if (userMarkerRef.current) { userMarkerRef.current.setMap(null); userMarkerRef.current = null; }
          return;
        }
        if (userMarkerRef.current) { userMarkerRef.current.setPosition(userLoc); return; }
        const svg =
          '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">' +
            '<circle cx="18" cy="18" r="14" fill="#2D7FF9" opacity="0.18"/>' +
            '<circle cx="18" cy="18" r="9"  fill="#2D7FF9" opacity="0.32"/>' +
            '<circle cx="18" cy="18" r="6"  fill="#1E5BC6" stroke="#FFFFFF" stroke-width="2.5"/>' +
          '</svg>';
        userMarkerRef.current = new google.maps.Marker({
          position: userLoc,
          map: mapRef.current,
          icon: {
            url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
            scaledSize: new google.maps.Size(36, 36),
            anchor: new google.maps.Point(18, 18),
          },
          title: "You are here",
          zIndex: 800,
        });
      }, [mapReady, userLoc]);

      // The ONLY animated marker — the student's own active ride. Updates in
      // place when myRideAnim coords change, removed when ride ends.
      useEffect(() => {
        if (!mapReady || !mapRef.current) return;
        if (!myRideAnim) {
          if (rideMarkerRef.current) { rideMarkerRef.current.setMap(null); rideMarkerRef.current = null; }
          return;
        }
        if (rideMarkerRef.current) {
          rideMarkerRef.current.setPosition({ lat: myRideAnim.lat, lng: myRideAnim.lng });
          return;
        }
        const svg =
          '<svg xmlns="http://www.w3.org/2000/svg" width="44" height="54" viewBox="0 0 44 54">' +
            '<g>' +
              '<path d="M22 52 C12 42, 6 32, 6 21 a16 16 0 1 1 32 0 C38 32, 32 42, 22 52 Z" fill="#1E5BC6"/>' +
              '<circle cx="22" cy="21" r="11" fill="#FFFFFF"/>' +
              '<g transform="translate(8 10)" stroke="#1E5BC6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">' +
                '<circle cx="6"  cy="18" r="4" fill="#FFFFFF" stroke="#1E5BC6"/>' +
                '<circle cx="22" cy="18" r="4" fill="#FFFFFF" stroke="#1E5BC6"/>' +
                '<path d="M9 18 L14 8 L20 8 M14 8 L17 14 L22 18"/>' +
                '<circle cx="17" cy="4"  r="1.5" fill="#1E5BC6"/>' +
              '</g>' +
            '</g>' +
          '</svg>';
        rideMarkerRef.current = new google.maps.Marker({
          position: { lat: myRideAnim.lat, lng: myRideAnim.lng },
          map: mapRef.current,
          icon: {
            url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
            scaledSize: new google.maps.Size(44, 54),
            anchor: new google.maps.Point(22, 52),
          },
          title: "Your active ride - " + (myRideAnim.bikeCode || ""),
          zIndex: 950,
          optimized: false,
        });
      }, [mapReady, myRideAnim]);

      useEffect(() => {
        if (!mapReady || !mapRef.current) return;
        markersRef.current.forEach(m => m.setMap && m.setMap(null));
        markersRef.current = [];

        stations.forEach(s => {
          const cls = availabilityClass(s.bikes, s.capacity);
          const isSel = s.id === selectedId;
          const fill = isSel ? "#2D7FF9" : availabilityColor(cls);
          const W = isSel ? 96 : 84;
          const H = isSel ? 56 : 50;
          const svg =
            '<svg xmlns="http://www.w3.org/2000/svg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">' +
              '<defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%">' +
                '<feGaussianBlur in="SourceAlpha" stdDeviation="1.6"/><feOffset dy="2"/>' +
                '<feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>' +
                '<feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>' +
              '</filter></defs>' +
              '<g filter="url(#s)">' +
                '<rect x="2" y="4" rx="20" ry="20" width="' + (W - 12) + '" height="' + (H - 16) + '" fill="' + fill + '"/>' +
                '<polygon points="' + (W/2 - 7) + ',' + (H - 12) + ' ' + (W/2 + 7) + ',' + (H - 12) + ' ' + (W/2) + ',' + (H - 2) + '" fill="' + fill + '"/>' +
                '<circle cx="' + (isSel ? 24 : 22) + '" cy="' + ((H-12)/2 + 4) + '" r="' + (isSel ? 14 : 12) + '" fill="white"/>' +
                '<text x="' + (isSel ? 24 : 22) + '" y="' + ((H-12)/2 + 9) + '" text-anchor="middle" font-family="Arial,sans-serif" font-size="' + (isSel ? 13 : 11) + '" font-weight="700" fill="' + fill + '">B</text>' +
                '<text x="' + (isSel ? 60 : 54) + '" y="' + ((H-12)/2 + 9) + '" text-anchor="middle" font-family="Arial,sans-serif" font-size="' + (isSel ? 14 : 12) + '" font-weight="800" fill="white">' + s.bikes + '/' + s.capacity + '</text>' +
              '</g>' +
            '</svg>';
          const url = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);

          const marker = new google.maps.Marker({
            position: { lat: s.lat, lng: s.lng },
            map: mapRef.current,
            icon: {
              url,
              scaledSize: new google.maps.Size(W, H),
              anchor: new google.maps.Point(W/2, H - 2),
            },
            title: s.name,
            zIndex: isSel ? 1000 : 100,
          });
          marker.addListener("click", () => onSelectRef.current && onSelectRef.current(s.id));
          markersRef.current.push(marker);
        });

        const sel = stations.find(s => s.id === selectedId);
        if (sel && mapRef.current) mapRef.current.panTo({ lat: sel.lat, lng: sel.lng });
      }, [mapReady, stations, selectedId]);

      const centerOnCbd = () => {
        if (!mapRef.current) return;
        mapRef.current.panTo(SYDNEY_CENTER);
        mapRef.current.setZoom(14);
      };
      const centerOnMe = () => {
        if (!mapRef.current) return;
        if (userLoc) {
          mapRef.current.panTo(userLoc);
          mapRef.current.setZoom(16);
        } else if (locStatus !== "denied" && locStatus !== "unsupported") {
          onRequestLocation && onRequestLocation();
        }
      };

      return (
        <div className="d-map-wrap">
          <div ref={mapEl} id="d-map"/>
          {status === "loading" && (
            <div className="d-map-loading">
              <div className="d-map-spin"/>
              <div>Loading the map…</div>
            </div>
          )}
          {status === "error" && (
            <div className="d-map-error">
              <Icon.alert/>
              <div style={{maxWidth: 380}}>
                We couldn't load Google Maps. Check that the Maps JavaScript API is enabled in Google Cloud Console, that billing is set up, and that the API key permits the frontend domain.
              </div>
            </div>
          )}
          {status === "ready" && (
            <div className="d-map-buttons">
              <button className="d-mapbtn" onClick={centerOnMe}
                title={userLoc ? "Centre on me" : (locStatus === "denied" ? "Location blocked - allow in your browser" : "Use my location")}
                disabled={locStatus === "denied" || locStatus === "unsupported"}>
                <Icon.target/> Me
              </button>
              <button className="d-mapbtn" onClick={centerOnCbd} title="Show Sydney CBD stations">
                <Icon.building/> CBD stations
              </button>
            </div>
          )}
          {status === "ready" && locStatus === "denied" && (
            <div className="d-loc-hint">
              <Icon.pin/>
              <div>
                <strong>Location blocked</strong>
                <div style={{opacity:.85, marginTop:2}}>We won't ask again. To see distances from you, allow location for this site in your browser, then reload.</div>
              </div>
            </div>
          )}
          <div className="d-legend">
            <h4>Legend</h4>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#22C55E"}}/>Station - high availability</div>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#84CC16"}}/>Station - medium</div>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#2D7FF9"}}/>You</div>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#1E5BC6"}}/>Your active ride</div>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#94A3B8"}}/>Station - empty</div>
          </div>
        </div>
      );
    }

    function MapPanelV2({
      stations,
      selectedId,
      onSelect,
      userLoc,
      locStatus,
      onRequestLocation,
      myRideAnim,
      mapBikes,
      showBikes,
      showActiveBikes,
      onToggleShowBikes,
      onToggleActiveBikes,
      onBookBike,
    }) {
      const mapEl = useRef(null);
      const mapRef = useRef(null);
      const markersRef = useRef([]);
      const bikeMarkersRef = useRef(new Map());
      const bikeInfoRef = useRef(null);
      const userMarkerRef = useRef(null);
      const rideMarkerRef = useRef(null);
      const activeBikeTickRef = useRef(0);
      const onSelectRef = useRef(onSelect);
      const onBookBikeRef = useRef(onBookBike);
      useEffect(() => { onSelectRef.current = onSelect; }, [onSelect]);
      useEffect(() => { onBookBikeRef.current = onBookBike; }, [onBookBike]);
      const [status, setStatus] = useState("loading");
      const [mapReady, setMapReady] = useState(false);
      const [viewportTick, setViewportTick] = useState(0);
      const [visibleBikeCount, setVisibleBikeCount] = useState(0);

      const escapeMapHtml = (value) => String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");

      const hashValue = (value) => {
        const text = String(value || "");
        let hash = 0;
        for (let i = 0; i < text.length; i++) hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
        return Math.abs(hash);
      };

      const bikeColour = (bikeStatus) => {
        if (bikeStatus === "in_use") return "#3B82F6";
        if (bikeStatus === "maintenance") return "#F59E0B";
        return "#16A34A";
      };

      const bikeLabel = (bikeStatus) => {
        if (bikeStatus === "in_use") return "In use";
        if (bikeStatus === "maintenance") return "Maintenance";
        return "Available";
      };

      const bikeIcon = (bike) => {
        const colour = bikeColour(bike.status);
        const active = bike.status === "in_use";
        const svg =
          '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">' +
            '<defs><filter id="shadow" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity=".18"/></filter></defs>' +

              '<circle cx="16" cy="16" r="12" fill="' + colour + '" stroke="#ffffff" stroke-width="2"/>' +
              '<g transform="translate(6.6 8)" stroke="#ffffff" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">' +
                '<circle cx="4.3" cy="13" r="3.1"/><circle cx="15.3" cy="13" r="3.1"/>' +
                '<path d="M6.8 13 9.5 6.2 13.1 6.2M9.5 6.2 12.2 11 15.3 13M8.9 9.6H5.4"/>' +
                '<circle cx="12" cy="3.2" r="1.2" fill="#ffffff" stroke="none"/>' +
              '</g>' +
            '</g>' +
          '</svg>';
        return {
          url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
          scaledSize: new google.maps.Size(active ? 34 : 30, active ? 34 : 30),
          anchor: new google.maps.Point(active ? 17 : 15, active ? 17 : 15),
        };
      };

      const bikeDisplayPosition = (bike, tick = 0) => {
        const lat = Number(bike.stationLatitude);
        const lng = Number(bike.stationLongitude);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
        const h = hashValue(bike.id || bike.bikeCode);
        const angle = ((h % 360) * Math.PI) / 180;
        let radius = bike.status === "in_use" ? 150 + (h % 220) : 45 + (h % 190);
        let finalAngle = angle;
        if (bike.status === "in_use") {
          radius += Math.sin(tick * .8 + (h % 17)) * 22;
          finalAngle += tick * .23;
        }
        const latOffset = (Math.cos(finalAngle) * radius) / 111320;
        const lngOffset = (Math.sin(finalAngle) * radius) / (111320 * Math.cos(lat * Math.PI / 180));
        return { lat: lat + latOffset, lng: lng + lngOffset };

            <div class="d-bike-info-row"><span>Station</span><strong>${escapeMapHtml(station)}</strong></div>
            <div class="d-bike-info-row"><span>Battery</span><strong>${escapeMapHtml(battery)}</strong></div>
            <div class="d-bike-info-row"><span>Condition</span><strong>${escapeMapHtml(condition)}</strong></div>
            ${canBook
              ? `<button type="button" id="map-bike-book-${escapeMapHtml(bike.id)}">Book this bike</button>`
              : `<div class="d-bike-info-note">${bikeStatus === "in_use" ? "This bike is currently in use and is not available for booking." : "This bike is unavailable while maintenance is in progress."}</div>`}
          </div>
        `;
      };

      useEffect(() => {
        if (window.__gmapsReady) { setStatus("ready"); return; }
        if (window.__gmapsFailed) { setStatus("error"); return; }
        const onReady = () => setStatus("ready");
        const onErr = () => setStatus("error");
        window.addEventListener("gmapsReady", onReady);
        window.addEventListener("gmapsError", onErr);
        const t = setTimeout(() => { if (!window.__gmapsReady) setStatus("error"); }, 10000);
        return () => { window.removeEventListener("gmapsReady", onReady); window.removeEventListener("gmapsError", onErr); clearTimeout(t); };
      }, []);

      useEffect(() => {
        if (status !== "ready" || !mapEl.current || mapRef.current) return;
        try {
          mapRef.current = new google.maps.Map(mapEl.current, {
            center: SYDNEY_CENTER,
            zoom: 14,
            mapTypeControl: false,
            streetViewControl: false,
            fullscreenControl: false,
            zoomControl: true,
            zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER },
            styles: [
              { featureType: "poi", stylers: [{ visibility: "off" }] },
              { featureType: "transit.station", stylers: [{ visibility: "simplified" }] },
            ],
          });
          bikeInfoRef.current = new google.maps.InfoWindow();
          setMapReady(true);
        } catch (e) { console.error("[map] init failed", e); setStatus("error"); }
      }, [status]);

      useEffect(() => {
        if (!mapReady || !mapRef.current) return;
        const listener = mapRef.current.addListener("idle", () => setViewportTick(v => v + 1));
        setViewportTick(v => v + 1);
        return () => listener.remove();
      }, [mapReady]);

      useEffect(() => {
        if (!mapReady || !mapRef.current) return;
        if (!userLoc) {
          if (userMarkerRef.current) { userMarkerRef.current.setMap(null); userMarkerRef.current = null; }
          return;
        }
        if (userMarkerRef.current) { userMarkerRef.current.setPosition(userLoc); return; }
        const svg =
          '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">' +
            '<circle cx="18" cy="18" r="14" fill="#2D7FF9" opacity="0.18"/>' +
            '<circle cx="18" cy="18" r="9" fill="#2D7FF9" opacity="0.32"/>' +
            '<circle cx="18" cy="18" r="6" fill="#1E5BC6" stroke="#FFFFFF" stroke-width="2.5"/>' +
          '</svg>';
        userMarkerRef.current = new google.maps.Marker({
          position: userLoc,
          map: mapRef.current,
          icon: {
            url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
            scaledSize: new google.maps.Size(36, 36),
            anchor: new google.maps.Point(18, 18),
          },
          title: "You are here",
          zIndex: 800,
        });
      }, [mapReady, userLoc]);

      useEffect(() => {
        if (!mapReady || !mapRef.current) return;
        if (!myRideAnim) {
          if (rideMarkerRef.current) { rideMarkerRef.current.setMap(null); rideMarkerRef.current = null; }
          return;
        }
        if (rideMarkerRef.current) {
          rideMarkerRef.current.setPosition({ lat: myRideAnim.lat, lng: myRideAnim.lng });
          return;
        }
        const svg =
          '<svg xmlns="http://www.w3.org/2000/svg" width="44" height="54" viewBox="0 0 44 54">' +
            '<path d="M22 52 C12 42, 6 32, 6 21 a16 16 0 1 1 32 0 C38 32, 32 42, 22 52 Z" fill="#1E5BC6"/>' +
            '<circle cx="22" cy="21" r="11" fill="#FFFFFF"/>' +
            '<g transform="translate(8 10)" stroke="#1E5BC6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">' +
              '<circle cx="6" cy="18" r="4"/><circle cx="22" cy="18" r="4"/><path d="M9 18 L14 8 L20 8 M14 8 L17 14 L22 18"/><circle cx="17" cy="4" r="1.5" fill="#1E5BC6"/>' +
            '</g>' +
          '</svg>';
        rideMarkerRef.current = new google.maps.Marker({
          position: { lat: myRideAnim.lat, lng: myRideAnim.lng },
          map: mapRef.current,
          icon: {
            url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
            scaledSize: new google.maps.Size(44, 54),
            anchor: new google.maps.Point(22, 52),
          },
          title: "Your active ride - " + (myRideAnim.bikeCode || ""),
          zIndex: 950,
          optimized: false,
        });
      }, [mapReady, myRideAnim]);

      useEffect(() => {
        if (!mapReady || !mapRef.current) return;
        markersRef.current.forEach(m => m.setMap && m.setMap(null));
        markersRef.current = [];

        stations.forEach(s => {
          const cls = availabilityClass(s.bikes, s.capacity);
          const isSel = s.id === selectedId;
          const fill = isSel ? "#2D7FF9" : availabilityColor(cls);
          const W = isSel ? 96 : 84;
          const H = isSel ? 56 : 50;
          const svg =
            '<svg xmlns="http://www.w3.org/2000/svg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">' +
              '<defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="1.6"/><feOffset dy="2"/><feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>' +
              '<g filter="url(#s)">' +
                '<rect x="2" y="4" rx="20" ry="20" width="' + (W - 12) + '" height="' + (H - 16) + '" fill="' + fill + '"/>' +
                '<polygon points="' + (W/2 - 7) + ',' + (H - 12) + ' ' + (W/2 + 7) + ',' + (H - 12) + ' ' + (W/2) + ',' + (H - 2) + '" fill="' + fill + '"/>' +
                '<circle cx="' + (isSel ? 24 : 22) + '" cy="' + ((H-12)/2 + 4) + '" r="' + (isSel ? 14 : 12) + '" fill="white"/>' +
                '<text x="' + (isSel ? 24 : 22) + '" y="' + ((H-12)/2 + 9) + '" text-anchor="middle" font-family="Arial,sans-serif" font-size="' + (isSel ? 13 : 11) + '" font-weight="700" fill="' + fill + '">B</text>' +
                '<text x="' + (isSel ? 60 : 54) + '" y="' + ((H-12)/2 + 9) + '" text-anchor="middle" font-family="Arial,sans-serif" font-size="' + (isSel ? 14 : 12) + '" font-weight="800" fill="white">' + s.bikes + '/' + s.capacity + '</text>' +
              '</g>' +
            '</svg>';
          const marker = new google.maps.Marker({
            position: { lat: s.lat, lng: s.lng },
            map: mapRef.current,
            icon: {
              url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
              scaledSize: new google.maps.Size(W, H),
              anchor: new google.maps.Point(W/2, H - 2),
            },
            title: s.name,
            zIndex: isSel ? 1000 : 100,
          });
          marker.addListener("click", () => onSelectRef.current && onSelectRef.current(s.id));
          markersRef.current.push(marker);
        });

        const sel = stations.find(s => s.id === selectedId);
        if (sel && mapRef.current) mapRef.current.panTo({ lat: sel.lat, lng: sel.lng });
      }, [mapReady, stations, selectedId]);

      useEffect(() => {
        if (!mapReady || !mapRef.current) return;
        bikeMarkersRef.current.forEach(marker => marker.setMap(null));
        bikeMarkersRef.current.clear();
        if (bikeInfoRef.current) bikeInfoRef.current.close();

        if (!showBikes) {
          setVisibleBikeCount(0);
          return;
        }

        const stationSet = new Set((stations || []).map(s => String(s.id)));
        const bounds = mapRef.current.getBounds();
        const zoom = mapRef.current.getZoom() || 14;
        const maxVisible = zoom >= 17 ? 150 : (zoom >= 15 ? 120 : 100);
        const prepared = (mapBikes || [])
          .filter(b => stationSet.has(String(b.stationId)))
          .filter(b => showActiveBikes || b.status !== "in_use")
          .map(b => ({ bike: b, pos: bikeDisplayPosition(b, activeBikeTickRef.current) }))
          .filter(item => item.pos)
          .filter(item => !bounds || bounds.contains(item.pos));

        const fallback = prepared.length ? prepared : (mapBikes || [])
          .filter(b => stationSet.has(String(b.stationId)))
          .filter(b => showActiveBikes || b.status !== "in_use")
          .map(b => ({ bike: b, pos: bikeDisplayPosition(b, activeBikeTickRef.current) }))
          .filter(item => item.pos);

        const visible = fallback.slice(0, maxVisible);
        setVisibleBikeCount(visible.length);

        visible.forEach(({ bike, pos }) => {
          const code = bike.bikeCode || bike.bike_code || `Bike ${bike.id}`;
          const marker = new google.maps.Marker({
            position: pos,
            map: mapRef.current,
            icon: bikeIcon(bike),
            title: `${code} - ${bikeLabel(bike.status)}`,
            zIndex: bike.status === "in_use" ? 260 : 220,
            optimized: false,
          });
          marker.__bike = bike;
          marker.addListener("click", () => {
            if (!bikeInfoRef.current) bikeInfoRef.current = new google.maps.InfoWindow();
            bikeInfoRef.current.setContent(buildBikeInfo(bike));
            bikeInfoRef.current.open({ map: mapRef.current, anchor: marker });
            google.maps.event.addListenerOnce(bikeInfoRef.current, "domready", () => {
              const button = document.getElementById(`map-bike-book-${bike.id}`);
              if (button) {
                button.addEventListener("click", () => {
                  if (bikeInfoRef.current) bikeInfoRef.current.close();
                  onBookBikeRef.current && onBookBikeRef.current(bike);
                });
              }
            });
          });
          bikeMarkersRef.current.set(String(bike.id), marker);
        });
      }, [mapReady, mapBikes, stations, showBikes, showActiveBikes, viewportTick]);

      useEffect(() => {
        if (!mapReady) return;
        const timer = setInterval(() => {
          activeBikeTickRef.current += 1;
          bikeMarkersRef.current.forEach((marker) => {
            const bike = marker.__bike;
            if (!bike || bike.status !== "in_use") return;
            const pos = bikeDisplayPosition(bike, activeBikeTickRef.current);
            if (pos) marker.setPosition(pos);
          });
        }, 2500);
        return () => clearInterval(timer);
      }, [mapReady]);

      const centerOnCbd = () => {
        if (!mapRef.current) return;
        mapRef.current.panTo(SYDNEY_CENTER);
        mapRef.current.setZoom(14);
      };
      const centerOnMe = () => {
        if (!mapRef.current) return;
        if (userLoc) {
          mapRef.current.panTo(userLoc);
          mapRef.current.setZoom(16);
        } else if (locStatus !== "denied" && locStatus !== "unsupported") {
          onRequestLocation && onRequestLocation();
        }
      };

      return (
        <div className="d-map-wrap">
          <div ref={mapEl} id="d-map"/>
          {status === "loading" && (
            <div className="d-map-loading">
              <div className="d-map-spin"/>
              <div>Loading the map...</div>
            </div>
          )}
          {status === "error" && (
            <div className="d-map-error">
              <Icon.alert/>
              <div style={{maxWidth: 380}}>
                We couldn't load Google Maps. Check that the Maps JavaScript API is enabled in Google Cloud Console, that billing is set up, and that the API key permits the frontend domain.
              </div>
            </div>
          )}
          {status === "ready" && (
            <div className="d-bike-map-controls" aria-label="Bike map controls">
              <label className="d-bike-toggle">
                <input type="checkbox" checked={showBikes} onChange={onToggleShowBikes}/>
                <span>Show bikes</span>
                <span className="d-bike-toggle-count">{visibleBikeCount}</span>
              </label>
              <label className="d-bike-toggle" aria-disabled={!showBikes}>
                <input type="checkbox" checked={showActiveBikes} disabled={!showBikes} onChange={onToggleActiveBikes}/>
                <span>Active bikes</span>
              </label>
            </div>
          )}
          {status === "ready" && (
            <div className="d-map-buttons">
              <button className="d-mapbtn" onClick={centerOnMe}
                title={userLoc ? "Centre on me" : (locStatus === "denied" ? "Location blocked - allow in your browser" : "Use my location")}
                disabled={locStatus === "denied" || locStatus === "unsupported"}>
                <Icon.target/> Me
              </button>
              <button className="d-mapbtn" onClick={centerOnCbd} title="Show Sydney CBD stations">
                <Icon.building/> CBD stations
              </button>
            </div>
          )}
          {status === "ready" && locStatus === "denied" && (
            <div className="d-loc-hint">
              <Icon.pin/>
              <div>
                <strong>Location blocked</strong>
                <div style={{opacity:.85, marginTop:2}}>We won't ask again. To see distances from you, allow location for this site in your browser, then reload.</div>
              </div>
            </div>
          )}
          <div className="d-legend">
            <h4>Legend</h4>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#22C55E"}}/>Station - high availability</div>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#84CC16"}}/>Station - medium</div>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#2D7FF9"}}/>You</div>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#1E5BC6"}}/>Your active ride</div>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#16A34A"}}/>Bike - available</div>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#3B82F6"}}/>Bike - in use</div>
            <div className="d-legend-row"><span className="d-legend-dot" style={{background:"#F59E0B"}}/>Bike - maintenance</div>
          </div>
        </div>
      );
    }

    /* Welcome Modal — shown once per session after login */
    function WelcomeModal({ firstName, onClose }) {
      // close on Esc
      useEffect(() => {
        const onKey = (e) => { if (e.key === "Escape") onClose(); };
        document.addEventListener("keydown", onKey);

      }, [onClose]);
      return (
        <div className="cbs-welcome-overlay" onClick={onClose} data-testid="welcome-overlay">

            <button className="cbs-welcome-close" onClick={onClose} aria-label="Close welcome" data-testid="welcome-close">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
            <div className="cbs-welcome-head">
              <div className="cbs-welcome-icon"><Icon.bike s={32}/></div>
              <h2 className="cbs-welcome-title" id="cbs-welcome-title">Welcome back, {firstName} <span style={{display:"inline-block", transform:"translateY(-2px)"}}>👋</span></h2>
              <p className="cbs-welcome-subtitle">Ready for your next campus ride?</p>
            </div>
            <div className="cbs-welcome-body">
              <div className="cbs-welcome-tip">
                <div className="ico"><Icon.map/></div>
                <div className="txt"><strong>Browse stations on the map</strong><span>See live bike availability around campus.</span></div>
              </div>
              <div className="cbs-welcome-tip">
                <div className="ico"><Icon.calendar/></div>
                <div className="txt"><strong>Book a bike in seconds</strong><span>Pick a time slot, pay, and you're set.</span></div>
              </div>
              <div className="cbs-welcome-tip">
                <div className="ico"><Icon.bike s={18}/></div>
                <div className="txt"><strong>Track your rides</strong><span>Check My Bookings and Ride History anytime.</span></div>
              </div>
            </div>
            <div className="cbs-welcome-foot">
              <button className="d-btn d-btn-primary" onClick={onClose} data-testid="welcome-start">
                <Icon.bike s={16}/> Let's ride
              </button>
            </div>
