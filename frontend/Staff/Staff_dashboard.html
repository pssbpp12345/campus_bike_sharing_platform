<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Dashboard — Campus Bike Sharing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="../../Login.css" />
  <style>
    body { background: linear-gradient(180deg, #F8FBFF 0%, #FFFFFF 100%); }
    .dash-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }
    .dash-card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 44px 40px 36px;
      box-shadow: var(--shadow-md);
      text-align: center;
    }
    .dash-checkmark {
      width: 72px; height: 72px;
      border-radius: 999px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--green), #16A34A);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 28px rgba(34, 197, 94, 0.30);
    }
    .dash-card h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin: 0 0 6px;
      color: var(--ink);
    }
    .dash-card .dash-sub {
      color: var(--muted);
      font-size: 15px;
      margin: 0 0 26px;
    }
    .dash-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 14px;
      margin-bottom: 12px;
      text-align: left;
    }
    .dash-row span.label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .dash-row strong { font-size: 15.5px; color: var(--ink); font-weight: 600; }
    .dash-role-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(139, 92, 246, 0.12);
      color: #7C3AED;
    }
    .dash-actions {
      margin-top: 22px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .dash-actions a, .dash-actions button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 20px;
      border-radius: 12px;
      font-size: 14.5px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink-soft);
      cursor: pointer;
      transition: border-color 0.15s ease, color 0.15s ease, transform 0.15s ease, filter 0.15s ease;
      font-family: inherit;
    }
    .dash-actions a:hover, .dash-actions button:hover {
      border-color: var(--blue);
      color: var(--blue);
    }
    .dash-actions .dash-logout {
      background: linear-gradient(135deg, var(--blue), var(--green));
      color: #fff !important;
      border: 0;
    }
    .dash-actions .dash-logout:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
      color: #fff !important;
    }
  </style>
</head>
<body>
  <main class="dash-wrap">
    <div class="dash-card">
      <div class="dash-checkmark">
        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <h1>Login successful!</h1>
      <p class="dash-sub">Staff dashboard — coming soon</p>

      <div class="dash-row">
        <div>
          <span class="label">Welcome</span>
          <strong id="dash-name">…</strong>
        </div>
        <div style="text-align:right;">
          <span class="label">Email</span>
          <strong id="dash-email">…</strong>
        </div>
      </div>

      <div class="dash-row" style="justify-content:center; padding: 12px 18px;">
        <span class="label" style="margin-right:10px; margin-bottom:0;">Your role is:</span>
        <span class="dash-role-badge" id="dash-role">STAFF</span>
      </div>

      <div class="dash-actions">
        <a href="../../index.html">Back to home</a>
        <button class="dash-logout" id="dash-logout">Log out</button>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var token = null, raw = null;
      try {
        token = localStorage.getItem("cbs_token");
        raw   = localStorage.getItem("cbs_user");
      } catch (_) {}

      // Auth guard
      if (!token || !raw) {
        window.location.replace("/login.html");
        return;
      }

      var user = {};
      try { user = JSON.parse(raw) || {}; } catch (_) { user = {}; }

      var nameEl  = document.getElementById("dash-name");
      var emailEl = document.getElementById("dash-email");
      var roleEl  = document.getElementById("dash-role");
      if (nameEl)  nameEl.textContent  = user.full_name || "Rider";
      if (emailEl) emailEl.textContent = user.email     || "—";
      if (roleEl)  roleEl.textContent  = (user.role || "STAFF").toUpperCase();

      var btn = document.getElementById("dash-logout");
      if (btn) btn.addEventListener("click", function () {
        try {
          localStorage.removeItem("cbs_token");
          localStorage.removeItem("cbs_user");
        } catch (_) {}
        window.location.href = "/login.html?loggedout=1";
      });
    })();
  </script>
</body>
</html>
