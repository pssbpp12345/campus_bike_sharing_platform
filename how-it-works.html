  <!-- Adds a subtle shadow + gradient hairline to the nav once scrolled,
       and scrolls to any #hash target once React has rendered it. -->
  <script>
    (function () {
      function update() {
        var nav = document.querySelector(".cbs-nav");
        if (nav) nav.classList.toggle("scrolled", window.scrollY > 8);
      }
      window.addEventListener("scroll", update, { passive: true });
      var tries = 0;
      var iv = setInterval(function () {
        if (document.querySelector(".cbs-nav") || ++tries > 30) { update(); clearInterval(iv); }
      }, 100);

      function scrollToHash() {
        var hash = window.location.hash;
        if (!hash || hash.length < 2) return;
        var attempts = 0;
        var poll = setInterval(function () {
          var el;
          try { el = document.querySelector(hash); } catch (_) { el = null; }
          if (el) {
            clearInterval(poll);
            // Defer one frame so layout is settled, then scroll.
            requestAnimationFrame(function () {
              el.scrollIntoView({ behavior: "smooth", block: "start" });
            });
          } else if (++attempts > 40) {
            clearInterval(poll);
          }
        }, 60);
      }
      // Run after the page (and React bundle) finishes loading.
      if (document.readyState === "complete") scrollToHash();
      else window.addEventListener("load", scrollToHash);
      window.addEventListener("hashchange", scrollToHash);
    })();
  </script>


  <!-- Floating back-to-top -->
  <button class="cbs-home-totop" id="cbs-home-totop" aria-label="Back to top">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
  </button>
  <script>
    (function () {
      var bar = document.getElementById("cbs-scroll-progress");
      var totop = document.getElementById("cbs-home-totop");
      var nav = document.querySelector(".cbs-nav");
      function onScroll() {
        var h = document.documentElement.scrollHeight - window.innerHeight;
        var sc = window.scrollY || window.pageYOffset;
        var pct = h > 0 ? (sc / h) * 100 : 0;
        if (bar) bar.style.width = pct + "%";
        if (nav) nav.classList.toggle("scrolled", sc > 8);
        if (totop) totop.classList.toggle("is-visible", sc > 600);
      }
      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();
      if (totop) totop.addEventListener("click", function () {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
      // Mobile hamburger menu toggle (event delegation — works even when
      // the nav is rendered by React after this script runs)
      document.addEventListener("click", function (e) {
        var toggle = e.target.closest && e.target.closest(".cbs-mobile-toggle");
        var navEl  = document.querySelector(".cbs-nav");
        var btn    = document.querySelector(".cbs-mobile-toggle");

        if (toggle) {
          e.stopPropagation();
          if (navEl) {
            var isOpen = navEl.classList.toggle("is-open");
            toggle.classList.toggle("is-open", isOpen);
            toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
            toggle.setAttribute("aria-label", isOpen ? "Close menu" : "Open menu");
          }
          return;
        }
        // Click on a nav link → close
        if (e.target.closest && e.target.closest(".cbs-nav-links a")) {
          if (navEl) navEl.classList.remove("is-open");
          if (btn)   btn.classList.remove("is-open");
          return;
        }
        // Click outside the nav → close
        if (navEl && navEl.classList.contains("is-open") && !navEl.contains(e.target)) {
          navEl.classList.remove("is-open");
          if (btn) btn.classList.remove("is-open");
        }
      });
     

      })();
  </script>
